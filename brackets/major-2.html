<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IronSight — Major 2 Bracket</title>
<style>
:root {
  --bg:#060b07; --s1:#0c1210; --s2:#121a12;
  --border:#1e3022; --border2:#2a4832;
  --accent:#00e840;
  --text:#dde0f0; --text2:#8890b8; --text3:#4a5080;
  --path:#ff3232; --path-glow:rgba(255,50,50,.5);
  --gold:#f5c542;
  --w-col:#00e840; --e-col:#f59e0b;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:'Segoe UI',system-ui,sans-serif;font-size:12px}

#viewport{
  width:100%; height:100%;
  overflow:hidden;
  position:relative;
  cursor:grab;
  background-image:radial-gradient(circle, #1a2f1a 1px, transparent 1px);
  background-size:28px 28px;
}
#viewport.dragging{cursor:grabbing}

#canvas{
  position:absolute;
  top:0; left:0;
  width:1200px; height:880px;
  will-change:transform;
}

#minimap{
  position:absolute; bottom:14px; right:14px;
  width:160px; height:90px;
  background:rgba(6,11,7,.85);
  border:1px solid var(--border2);
  border-radius:5px;
  overflow:hidden;
  pointer-events:none;
  z-index:100;
}
#mm-bracket{position:absolute;transform-origin:top left}
#mm-viewport{
  position:absolute;
  border:1px solid var(--accent);
  background:rgba(0,232,64,.07);
  border-radius:2px;
  pointer-events:none;
}

#zoom-controls{
  position:absolute; bottom:14px; left:14px;
  display:flex; flex-direction:column; gap:4px;
  z-index:100;
}
.zb{width:28px;height:28px;background:var(--s1);border:1px solid var(--border2);
  border-radius:4px;color:var(--text2);font-size:16px;line-height:1;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  user-select:none;transition:background .12s,color .12s}
.zb:hover{background:var(--border2);color:var(--text)}

#hint{
  position:absolute; top:12px; left:50%; transform:translateX(-50%);
  background:rgba(12,18,16,.9); border:1px solid var(--border2);
  border-radius:20px; padding:5px 16px; font-size:11px; color:var(--text2);
  pointer-events:none; z-index:100; white-space:nowrap;
  opacity:1; transition:opacity .4s;
}
#hint.fade{opacity:0}

/* ── bracket internals ── */
#bracket{position:absolute;top:20px;left:20px;width:1160px;height:840px;user-select:none}

svg.layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible}

.divider{position:absolute;left:0;right:0;top:540px;border-top:1px dashed var(--border2)}

.sec-label{position:absolute;font-size:9px;font-weight:800;letter-spacing:.13em;
  text-transform:uppercase;padding:2px 7px;border-radius:3px;border:1px solid;z-index:5}
.sec-w{color:var(--w-col);border-color:var(--w-col);background:rgba(0,232,64,.07);top:4px;left:10px}
.sec-e{color:var(--e-col);border-color:var(--e-col);background:rgba(245,158,11,.07);top:552px;left:10px}

.rl{position:absolute;font-size:9px;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:var(--text2);white-space:nowrap}

.mc{position:absolute;width:175px;background:var(--s1);border:1px solid var(--border);
    border-radius:5px;overflow:hidden;z-index:10;transition:border-color .2s}
.mc.on{border-color:rgba(255,50,50,.35)}

.tr{display:flex;align-items:center;padding:0 8px;height:28px;
    transition:background .12s;gap:5px}
.tr:first-child{border-bottom:1px solid var(--border)}
.tn{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px;
    color:var(--text);transition:color .12s;cursor:pointer}
.ts{font-size:12px;font-weight:700;min-width:14px;text-align:right;transition:color .12s}

.tr.win .tn{color:var(--text);font-weight:600}
.tr.win .ts{color:var(--accent)}
.tr.lose .tn{color:var(--text3)}
.tr.lose .ts{color:var(--text3)}
.tr.hi{background:rgba(255,50,50,.16)!important;border-left:3px solid var(--path)}
.tr.hi .tn,.tr.hi .ts{color:var(--text)}
.tr:hover:not(.hi){background:var(--s2)}

.champion{position:absolute;text-align:center;font-size:9px;font-weight:800;
  letter-spacing:.14em;text-transform:uppercase;color:var(--gold)}

@keyframes dash{to{stroke-dashoffset:0}}
.animated-path{stroke:var(--path);stroke-width:2.5;fill:none;
  stroke-dasharray:9 5;stroke-dashoffset:280;
  animation:dash 1.1s linear infinite;
  filter:drop-shadow(0 0 5px var(--path-glow))}
.sl{stroke:var(--border2);stroke-width:1.5;fill:none;stroke-linecap:round}
</style>
</head>
<body>
<div id="viewport">
  <div id="canvas">
    <div id="bracket">
      <div class="sec-label sec-w">Winners Bracket</div>
      <div class="sec-label sec-e">Elimination Bracket</div>
      <div class="divider"></div>
      <svg class="layer" id="svg-static"></svg>
      <svg class="layer" id="svg-path" style="z-index:20"></svg>
    </div>
  </div>

  <div id="zoom-controls">
    <button class="zb" id="zin"  title="Zoom in">+</button>
    <button class="zb" id="zout" title="Zoom out">−</button>
    <button class="zb" id="zrst" title="Reset" style="font-size:11px">⌖</button>
  </div>

  <div id="minimap">
    <div id="mm-bracket"></div>
    <div id="mm-viewport"></div>
  </div>

  <div id="hint">Drag to pan · Scroll to zoom · Hover a team to trace their path</div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════════
   LAYOUT
   Canvas: 1200×880  Bracket: 1160×840
   Divider @ y=540

   WINNERS (y=60..480):
     Left col (play-in + direct WR1): x=10  y=60,180,300,420
     WR1 proper:  x=240  y=120,360
     WR2:         x=470  y=60,300
     WF:          x=700  y=180
     GF:          x=930  y=420

   ELIMINATION (y=600..810):
     ER1:  x=10   y=600,840
     ER2:  x=240  y=630,870
     ER3:  x=470  y=750
     EF:   x=700  y=750
═══════════════════════════════════════════════════════════════════ */
const W=175, H=60, r1=14, r2=46;
const rx = x => x+W;

/* ─── MATCH DATA ─────────────────────────────────────────────────── */
const M = {
  /* ── Left col: direct WR1 + play-in ── */
  direct_1:{ x:10,  y:60,  t1:'Los Angeles Thieves', s1:2, t2:'FaZe Vegas',          s2:3, lbl:'Winners Round 1' },
  playin_1:{ x:10,  y:180, t1:'Carolina Royal Ravens',s1:1, t2:'Paris Gentle Mates',  s2:3, lbl:'Play-In'         },
  direct_2:{ x:10,  y:300, t1:'G2 Minnesota',         s1:3, t2:'Riyadh Falcons',      s2:0, lbl:''                },
  playin_2:{ x:10,  y:420, t1:'Toronto KOI',          s1:3, t2:'Vancouver Surge',     s2:1, lbl:''                },

  /* ── WR1 proper ── */
  wr1_1:{ x:240, y:120, t1:'Miami Heretics',    s1:1, t2:'Paris Gentle Mates',  s2:3, lbl:'Winners Round 1' },
  wr1_2:{ x:240, y:360, t1:'OpTic Texas',       s1:3, t2:'Toronto KOI',         s2:0, lbl:''                },

  /* ── WR2 ── */
  wr2_1:{ x:470, y:60,  t1:'Paris Gentle Mates', s1:0, t2:'FaZe Vegas',         s2:3, lbl:'Winners Round 2' },
  wr2_2:{ x:470, y:300, t1:'OpTic Texas',         s1:3, t2:'G2 Minnesota',       s2:0, lbl:''                },

  /* ── WF ── */
  wf:{    x:700, y:180, t1:'FaZe Vegas',          s1:1, t2:'OpTic Texas',        s2:3, lbl:'Winners Finals'  },

  /* ── GF ── */
  gf:{    x:930, y:420, t1:'OpTic Texas',         s1:1, t2:'FaZe Vegas',         s2:4, lbl:'Grand Finals'    },

  /* ── Elim ── */
  er1_1:{ x:10,  y:600, t1:'Toronto KOI',        s1:3, t2:'Riyadh Falcons',     s2:0, lbl:'Elim Round 1'    },
  er1_2:{ x:10,  y:840, t1:'Miami Heretics',      s1:0, t2:'Los Angeles Thieves',s2:3, lbl:''                },

  er2_1:{ x:240, y:630, t1:'Paris Gentle Mates', s1:1, t2:'Toronto KOI',        s2:3, lbl:'Elim Round 2'    },
  er2_2:{ x:240, y:870, t1:'G2 Minnesota',        s1:1, t2:'Los Angeles Thieves',s2:3, lbl:''                },

  er3:{   x:470, y:750, t1:'Los Angeles Thieves', s1:0, t2:'Toronto KOI',       s2:3, lbl:'Elim Round 3'    },
  ef:{    x:700, y:750, t1:'FaZe Vegas',          s1:3, t2:'Toronto KOI',        s2:1, lbl:'Elim Finals'     },
};

/* ─── STATIC CONNECTOR LINES ─────────────────────────────────────── */
/* [x1, y1, x2, y2, midX]  midX=null → straight  OR  x2<x1 → bezier loop */
const STATIC_LINES = [
  /* Play-in winners → WR1 proper */
  [rx(10), 180+r2, 240, 120+r2, 212],   // PGM playin_1 → wr1_1 s2  (226→166 up)
  [rx(10), 420+r1, 240, 360+r2, 212],   // TOR playin_2 → wr1_2 s2  (434→406 up)

  /* Direct WR1 winners skip to WR2 (over WR1 proper column) */
  [rx(10),  60+r2, 470,  60+r2, null],  // FAZ direct_1 → wr2_1 s2  (y=106 straight)
  [rx(10), 300+r1, 470, 300+r2, 412],   // G2  direct_2 → wr2_2 s2  (314→346 dn)

  /* WR1 proper winners → WR2 */
  [rx(240), 120+r2, 470,  60+r1, 442],  // PGM wr1_1 s2 → wr2_1 s1  (166→74  up)
  [rx(240), 360+r1, 470, 300+r1, 442],  // OTX wr1_2 s1 → wr2_2 s1  (374→314 up)

  /* WR2 winners → WF */
  [rx(470),  60+r2, 700, 180+r1, 672],  // FAZ wr2_1 s2 → wf s1  (106→194 dn)
  [rx(470), 300+r1, 700, 180+r2, 672],  // OTX wr2_2 s1 → wf s2  (314→226 up)

  /* WF winner → GF */
  [rx(700), 180+r2, 930, 420+r1, 902],  // OTX wf s2  → gf s1   (226→434 dn)

  /* ER1 winners → ER2 */
  [rx(10), 600+r1, 240, 630+r2, 212],   // TOR er1_1 s1 → er2_1 s2  (614→676 dn)
  [rx(10), 840+r2, 240, 870+r2, 212],   // LAT er1_2 s2 → er2_2 s2  (886→916 dn)

  /* ER2 winners → ER3 */
  [rx(240), 630+r2, 470, 750+r2, 442],  // TOR er2_1 s2 → er3 s2    (676→796 dn)
  [rx(240), 870+r2, 470, 750+r1, 442],  // LAT er2_2 s2 → er3 s1    (916→764 up)

  /* ER3 winner → EF  (straight: same y=796) */
  [rx(470), 750+r2, 700, 750+r2, null], // TOR er3 s2 → ef s2

  /* EF winner → GF */
  [rx(700), 750+r1, 930, 420+r2, 902],  // FAZ ef s1  → gf s2        (764→466 up)
];

/* ─── HOVER PATH DEFINITIONS ─────────────────────────────────────── */
/* [fromId, fromSlot, toId, toSlot, midX]  null midX = bezier or straight */
const TEAM_PATHS = {
  'FaZe Vegas': [
    ['direct_1', 2, 'wr2_1', 2, null],   // straight y=106
    ['wr2_1',    2, 'wf',    1, 672],
    ['wf',       1, 'ef',    1, null],   // bezier loop WF→EF
    ['ef',       1, 'gf',    2, 902],
  ],
  'Los Angeles Thieves': [
    ['direct_1', 1, 'er1_2', 2, null],   // bezier same col (→elim)
    ['er1_2',    2, 'er2_2', 2, 212],
    ['er2_2',    2, 'er3',   1, 442],
  ],
  'Paris Gentle Mates': [
    ['playin_1', 2, 'wr1_1', 2, 212],
    ['wr1_1',    2, 'wr2_1', 1, 442],
    ['wr2_1',    1, 'er2_1', 1, null],   // bezier WR2→ER2
  ],
  'Carolina Royal Ravens': [],            // eliminated at play-in
  'G2 Minnesota': [
    ['direct_2', 1, 'wr2_2', 2, 412],
    ['wr2_2',    2, 'er2_2', 1, null],   // bezier WR2→ER2
  ],
  'Riyadh Falcons': [
    ['direct_2', 2, 'er1_1', 2, null],   // bezier same col
  ],
  'Miami Heretics': [
    ['wr1_1',    1, 'er1_2', 1, null],   // bezier wr1→er1
  ],
  'OpTic Texas': [
    ['wr1_2',    1, 'wr2_2', 1, 442],
    ['wr2_2',    1, 'wf',    2, 672],
    ['wf',       2, 'gf',    1, 902],
  ],
  'Toronto KOI': [
    ['playin_2', 1, 'wr1_2', 2, 212],
    ['wr1_2',    2, 'er1_1', 1, null],   // bezier wr1→er1
    ['er1_1',    1, 'er2_1', 2, 212],
    ['er2_1',    2, 'er3',   2, 442],
    ['er3',      2, 'ef',    2, null],   // straight y=796
  ],
  'Vancouver Surge': [],                  // eliminated at play-in
};

/* ─── PATH HELPERS ───────────────────────────────────────────────── */
function bezierLoop(x1,y1,x2,y2){
  const cx=x1+85;
  return `M${x1},${y1} C${cx},${y1} ${cx},${y2} ${x2},${y2}`;
}
function elbow(x1,y1,x2,y2,mid){
  if(x2<x1) return bezierLoop(x1,y1,x2,y2);
  if(mid===null) return `M${x1},${y1} H${x2}`;
  return `M${x1},${y1} H${mid} V${y2} H${x2}`;
}

/* ─── BUILD STATIC SVG ───────────────────────────────────────────── */
document.getElementById('svg-static').innerHTML =
  STATIC_LINES.map(([x1,y1,x2,y2,mid])=>`<path class="sl" d="${elbow(x1,y1,x2,y2,mid)}"/>`).join('');

/* ─── BUILD DOM ──────────────────────────────────────────────────── */
const bracket = document.getElementById('bracket');
const svgPath = document.getElementById('svg-path');

for(const [id,m] of Object.entries(M)){
  if(m.lbl){
    const el=document.createElement('div');
    el.className='rl'; el.textContent=m.lbl;
    el.style.cssText=`left:${m.x}px;top:${m.y-16}px`;
    bracket.appendChild(el);
  }
  const w1=m.s1>m.s2;
  const card=document.createElement('div');
  card.className='mc'; card.id='mc-'+id;
  card.style.cssText=`left:${m.x}px;top:${m.y}px`;
  [1,2].forEach(slot=>{
    const win=slot===1?w1:!w1, name=slot===1?m.t1:m.t2, score=slot===1?m.s1:m.s2;
    const row=document.createElement('div');
    row.className=`tr ${win?'win':'lose'}`;
    row.dataset.team=name;
    row.innerHTML=`<span class="tn">${name}</span><span class="ts">${score}</span>`;
    row.querySelector('.tn').addEventListener('mouseenter',()=>hiTeam(name));
    row.querySelector('.tn').addEventListener('mouseleave',clrTeam);
    card.appendChild(row);
  });
  bracket.appendChild(card);
}

const gf=M.gf;
const badge=document.createElement('div');
badge.className='champion'; badge.textContent='🏆 Champion';
badge.style.cssText=`left:${gf.x}px;top:${gf.y+H+6}px;width:${W}px`;
bracket.appendChild(badge);

/* ─── HIGHLIGHT ──────────────────────────────────────────────────── */
let activeTeam=null;
function hiTeam(team){
  if(activeTeam===team) return;
  activeTeam=team;
  document.querySelectorAll('.tr').forEach(el=>el.classList.toggle('hi',el.dataset.team===team));
  document.querySelectorAll('.mc').forEach(card=>{
    card.classList.toggle('on',[...card.querySelectorAll('.tr')].some(r=>r.dataset.team===team));
  });
  svgPath.innerHTML=(TEAM_PATHS[team]||[]).map(([fId,fS,tId,tS,mid])=>{
    const fm=M[fId],tm=M[tId];
    return `<path class="animated-path" d="${elbow(rx(fm.x),fm.y+(fS===1?r1:r2),tm.x,tm.y+(tS===1?r1:r2),mid)}"/>`;
  }).join('');
}
function clrTeam(){
  activeTeam=null;
  document.querySelectorAll('.tr').forEach(el=>el.classList.remove('hi'));
  document.querySelectorAll('.mc').forEach(el=>el.classList.remove('on'));
  svgPath.innerHTML='';
}

/* ═══════════════════════════════════════════════════════════════════
   PAN & ZOOM
═══════════════════════════════════════════════════════════════════ */
const viewport = document.getElementById('viewport');
const canvas   = document.getElementById('canvas');

const CANVAS_W=1200, CANVAS_H=880;
const ZOOM_MIN=0.35, ZOOM_MAX=1.6, ZOOM_STEP=0.12;

let scale=1, tx=0, ty=0;
let dragging=false, startX=0, startY=0, startTx=0, startTy=0;

function clamp(v,lo,hi){ return Math.max(lo,Math.min(hi,v)); }

function applyTransform(animate){
  const vw=viewport.clientWidth, vh=viewport.clientHeight;
  tx=clamp(tx, Math.min(0,vw-CANVAS_W*scale), 0);
  ty=clamp(ty, Math.min(0,vh-CANVAS_H*scale), 0);
  canvas.style.transition=animate?'transform .2s ease':'none';
  canvas.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;
  canvas.style.transformOrigin='0 0';
  updateMinimap();
}

function resetView(){
  scale=1;
  const vw=viewport.clientWidth;
  tx=clamp(Math.round((vw-CANVAS_W)/2), Math.min(0,vw-CANVAS_W), 0);
  ty=0;
  applyTransform(true);
}

/* Mouse drag */
viewport.addEventListener('mousedown',e=>{
  if(e.target.classList.contains('tn')) return;
  dragging=true;
  startX=e.clientX; startY=e.clientY; startTx=tx; startTy=ty;
  viewport.classList.add('dragging');
  e.preventDefault();
});
window.addEventListener('mousemove',e=>{
  if(!dragging) return;
  tx=startTx+(e.clientX-startX);
  ty=startTy+(e.clientY-startY);
  applyTransform(false);
});
window.addEventListener('mouseup',()=>{ dragging=false; viewport.classList.remove('dragging'); });

/* Touch drag */
let t0=null;
viewport.addEventListener('touchstart',e=>{
  if(e.touches.length===1) t0={x:e.touches[0].clientX,y:e.touches[0].clientY,tx,ty};
},{passive:true});
viewport.addEventListener('touchmove',e=>{
  if(!t0||e.touches.length!==1) return;
  tx=t0.tx+(e.touches[0].clientX-t0.x);
  ty=t0.ty+(e.touches[0].clientY-t0.y);
  applyTransform(false);
  e.preventDefault();
},{passive:false});
viewport.addEventListener('touchend',()=>{ t0=null; });

/* Scroll zoom */
viewport.addEventListener('wheel',e=>{
  e.preventDefault();
  const rect=viewport.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  const delta=e.deltaY<0?ZOOM_STEP:-ZOOM_STEP;
  const ns=clamp(scale+delta,ZOOM_MIN,ZOOM_MAX);
  const ratio=ns/scale;
  tx=mx-(mx-tx)*ratio;
  ty=my-(my-ty)*ratio;
  scale=ns;
  applyTransform(false);
},{passive:false});

/* Zoom buttons */
function zoomAt(delta){
  const ns=clamp(scale+delta,ZOOM_MIN,ZOOM_MAX);
  const ratio=ns/scale;
  const vw=viewport.clientWidth, vh=viewport.clientHeight;
  tx=(vw/2)-(vw/2-tx)*ratio;
  ty=(vh/2)-(vh/2-ty)*ratio;
  scale=ns;
  applyTransform(true);
}
document.getElementById('zin') .addEventListener('click',()=>zoomAt( ZOOM_STEP));
document.getElementById('zout').addEventListener('click',()=>zoomAt(-ZOOM_STEP));
document.getElementById('zrst').addEventListener('click',resetView);

/* ═══════════════════════════════════════════════════════════════════
   MINI-MAP
═══════════════════════════════════════════════════════════════════ */
const mm        = document.getElementById('minimap');
const mmBracket = document.getElementById('mm-bracket');
const mmVp      = document.getElementById('mm-viewport');
const MM_W=160, MM_H=90;
const mmSX=MM_W/CANVAS_W, mmSY=MM_H/CANVAS_H;

(function buildMinimap(){
  const clone=bracket.cloneNode(true);
  mmBracket.appendChild(clone);
  mmBracket.style.transform=`scale(${mmSX},${mmSY})`;
  mmBracket.style.transformOrigin='top left';
  mmBracket.style.width=CANVAS_W+'px';
  mmBracket.style.height=CANVAS_H+'px';
})();

function updateMinimap(){
  const vw=viewport.clientWidth, vh=viewport.clientHeight;
  const l =clamp(-tx/scale,         0, CANVAS_W)*mmSX;
  const t2=clamp(-ty/scale,         0, CANVAS_H)*mmSY;
  const w =clamp((-tx+vw)/scale,    0, CANVAS_W)*mmSX - l;
  const h =clamp((-ty+vh)/scale,    0, CANVAS_H)*mmSY - t2;
  mmVp.style.cssText=`left:${l}px;top:${t2}px;width:${w}px;height:${h}px`;
}

/* ─── INIT ───────────────────────────────────────────────────────── */
resetView();

const hint=document.getElementById('hint');
setTimeout(()=>hint.classList.add('fade'),4500);
setTimeout(()=>hint.remove(),5000);
</script>
</body>
</html>
