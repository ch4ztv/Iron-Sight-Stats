<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IronSight — Tournament Bracket</title>
<style>
:root {
  --bg:#060b07; --s1:#0c1210; --s2:#121a12;
  --border:#1e3022; --border2:#2a4832;
  --accent:#00e840;
  --text:#dde0f0; --text2:#8890b8; --text3:#4a5080;
  --path:#ff3232; --path-glow:rgba(255,50,50,.5);
  --gold:#f5c542;
  --w-col:#00e840; --e-col:#f59e0b;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:'Segoe UI',system-ui,sans-serif;font-size:12px}

/* ── VIEWPORT: fills whatever container this page sits in ── */
#viewport{
  width:100%; height:100%;
  overflow:hidden;
  position:relative;
  cursor:grab;
  /* subtle dot-grid so the panning feels grounded */
  background-image:radial-gradient(circle, #1a2f1a 1px, transparent 1px);
  background-size:28px 28px;
}
#viewport.dragging{cursor:grabbing}

/* ── CANVAS: the thing we translate ── */
#canvas{
  position:absolute;
  top:0; left:0;
  width:1400px; height:1140px;  /* content size — larger than any viewport */
  will-change:transform;
  /* no transition here — instant follow feels best for drag */
}

/* ── MINI-MAP ── */
#minimap{
  position:absolute; bottom:14px; right:14px;
  width:160px; height:90px;
  background:rgba(6,11,7,.85);
  border:1px solid var(--border2);
  border-radius:5px;
  overflow:hidden;
  pointer-events:none;
  z-index:100;
}
#mm-bracket{
  position:absolute;
  transform-origin:top left;
  /* scale set by JS */
}
#mm-viewport{
  position:absolute;
  border:1px solid var(--accent);
  background:rgba(0,232,64,.07);
  border-radius:2px;
  pointer-events:none;
}

/* ── ZOOM CONTROLS ── */
#zoom-controls{
  position:absolute; bottom:14px; left:14px;
  display:flex; flex-direction:column; gap:4px;
  z-index:100;
}
.zb{width:28px;height:28px;background:var(--s1);border:1px solid var(--border2);
  border-radius:4px;color:var(--text2);font-size:16px;line-height:1;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  user-select:none;transition:background .12s,color .12s}
.zb:hover{background:var(--border2);color:var(--text)}
.zb-wide{width:40px;font-size:10px;font-weight:800;letter-spacing:.08em}

/* ── HINT ── */
#hint{
  position:absolute; top:12px; left:50%; transform:translateX(-50%);
  background:rgba(12,18,16,.9); border:1px solid var(--border2);
  border-radius:20px; padding:5px 16px; font-size:11px; color:var(--text2);
  pointer-events:none; z-index:100; white-space:nowrap;
  opacity:1; transition:opacity .4s;
}
#hint.fade{opacity:0}

/* ── BRACKET INTERNALS ── */
#bracket{position:absolute;top:20px;left:20px;width:1360px;height:1100px;user-select:none}

svg.layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible}

.divider{position:absolute;left:0;right:0;top:540px;border-top:1px dashed var(--border2)}

.sec-label{position:absolute;font-size:9px;font-weight:800;letter-spacing:.13em;
  text-transform:uppercase;padding:2px 7px;border-radius:3px;border:1px solid;z-index:5}
.sec-w{color:var(--w-col);border-color:var(--w-col);background:rgba(0,232,64,.07);top:4px;left:10px}
.sec-e{color:var(--e-col);border-color:var(--e-col);background:rgba(245,158,11,.07);top:552px;left:10px}

.rl{position:absolute;font-size:9px;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:var(--text2);white-space:nowrap}

.mc{position:absolute;width:175px;background:var(--s1);border:1px solid var(--border);
    border-radius:5px;overflow:hidden;z-index:10;transition:border-color .2s}
.mc.on{border-color:rgba(255,50,50,.35)}

.tr{display:flex;align-items:center;padding:0 8px;height:28px;
    transition:background .12s;gap:5px}
.tr:first-child{border-bottom:1px solid var(--border)}
.tn{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px;
    color:var(--text);transition:color .12s}
.ts{font-size:12px;font-weight:700;min-width:14px;text-align:right;transition:color .12s}

.tr.win .tn{color:var(--text);font-weight:600}
.tr.win .ts{color:var(--accent)}
.tr.lose .tn{color:var(--text3)}
.tr.lose .ts{color:var(--text3)}
.tr.hi{background:rgba(255,50,50,.16)!important;border-left:3px solid var(--path)}
.tr.hi .tn,.tr.hi .ts{color:var(--text)}

/* cursor: grab on background, pointer on rows */
.tr{cursor:default}
.tn{cursor:pointer}

.tr:hover:not(.hi){background:var(--s2)}

.champion{position:absolute;text-align:center;font-size:9px;font-weight:800;
  letter-spacing:.14em;text-transform:uppercase;color:var(--gold)}

@keyframes dash{to{stroke-dashoffset:0}}
.animated-path{stroke:var(--path);stroke-width:2.5;fill:none;
  stroke-dasharray:9 5;stroke-dashoffset:280;
  animation:dash 1.1s linear infinite;
  filter:drop-shadow(0 0 5px var(--path-glow))}
.sl{stroke:var(--border2);stroke-width:1.5;fill:none;stroke-linecap:round}
</style>
</head>
<body>

<div id="viewport">
  <div id="canvas">
    <div id="bracket">
      <div class="sec-label sec-w">Winners Bracket</div>
      <div class="sec-label sec-e">Elimination Bracket</div>
      <div class="divider"></div>
      <svg class="layer" id="svg-static"></svg>
      <svg class="layer" id="svg-path" style="z-index:20"></svg>
    </div>
  </div>

  <!-- Zoom buttons -->
  <div id="zoom-controls">
    <button class="zb" id="zin"  title="Zoom in">+</button>
    <button class="zb" id="zout" title="Zoom out">−</button>
    <button class="zb" id="zrst" title="Reset" style="font-size:11px">⌖</button>
    <button class="zb zb-wide" id="zfull" title="Expand bracket">FS</button>
  </div>

  <!-- Mini-map -->
  <div id="minimap">
    <div id="mm-bracket"></div>
    <div id="mm-viewport"></div>
  </div>

  <div id="hint">Drag to pan · Scroll to zoom · Hover a team to trace their path</div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════════
   BRACKET DATA
═══════════════════════════════════════════════════════════════════ */
const W=175, H=60, r1=14, r2=46;
const rx = x => x+W;

const M = {
  wr1_1:{x:10,  y:60,  t1:'Paris Gentle Mates',   s1:3, t2:'Toronto KOI',        s2:1, lbl:'Winners Round 1'},
  wr1_2:{x:10,  y:180, t1:'Carolina Royal Ravens', s1:0, t2:'Los Angeles Thieves',s2:3, lbl:''},
  wr1_3:{x:10,  y:300, t1:'Riyadh Falcons',        s1:0, t2:'OpTic Texas',        s2:3, lbl:''},
  wr1_4:{x:10,  y:420, t1:'FaZe Vegas',            s1:0, t2:'G2 Minnesota',       s2:3, lbl:''},
  wr2_1:{x:240, y:120, t1:'Paris Gentle Mates',   s1:3, t2:'Los Angeles Thieves',s2:0, lbl:'Winners Round 2'},
  wr2_2:{x:240, y:360, t1:'OpTic Texas',           s1:3, t2:'G2 Minnesota',       s2:0, lbl:''},
  wf:   {x:470, y:240, t1:'Paris Gentle Mates',   s1:0, t2:'OpTic Texas',        s2:3, lbl:'Winners Finals'},
  er1_1:{x:10,  y:600, t1:'Riyadh Falcons',        s1:3, t2:'Cloud9 New York',   s2:1, lbl:'Elim Round 1'},
  er1_2:{x:10,  y:720, t1:'FaZe Vegas',            s1:3, t2:'Boston Breach',     s2:1, lbl:''},
  er1_3:{x:10,  y:840, t1:'Carolina Royal Ravens', s1:1, t2:'Vancouver Surge',   s2:3, lbl:''},
  er1_4:{x:10,  y:960, t1:'Toronto KOI',           s1:2, t2:'Miami Heretics',    s2:3, lbl:''},
  er2_1:{x:240, y:660, t1:'Riyadh Falcons',        s1:2, t2:'FaZe Vegas',        s2:3, lbl:'Elim Round 2'},
  er2_2:{x:240, y:900, t1:'Vancouver Surge',       s1:0, t2:'Miami Heretics',    s2:3, lbl:''},
  er3_1:{x:470, y:660, t1:'Los Angeles Thieves',   s1:0, t2:'FaZe Vegas',        s2:3, lbl:'Elim Round 3'},
  er3_2:{x:470, y:840, t1:'G2 Minnesota',          s1:3, t2:'Miami Heretics',    s2:0, lbl:''},
  er4:  {x:700, y:750, t1:'FaZe Vegas',            s1:3, t2:'G2 Minnesota',      s2:2, lbl:'Elim Round 4'},
  ef:   {x:930, y:718, t1:'Paris Gentle Mates',   s1:3, t2:'FaZe Vegas',        s2:2, lbl:'Elim Finals'},
  gf:   {x:1160,y:480, t1:'OpTic Texas',           s1:3, t2:'Paris Gentle Mates',s2:4, lbl:'Grand Finals'},
};

const STATIC_LINES = [
  [rx(10), 60+r1,  240, 120+r1, 212],
  [rx(10), 180+r2, 240, 120+r2, 212],
  [rx(10), 300+r2, 240, 360+r1, 212],
  [rx(10), 420+r2, 240, 360+r2, 212],
  [rx(240),120+r1, 470, 240+r1, 442],
  [rx(240),360+r1, 470, 240+r2, 442],
  [rx(470),240+r2,1160, 480+r1, 902],
  [rx(10), 600+r1, 240, 660+r1, 212],
  [rx(10), 720+r1, 240, 660+r2, 212],
  [rx(10), 840+r2, 240, 900+r1, 212],
  [rx(10), 960+r2, 240, 900+r2, 212],
  [rx(240),660+r2, 470, 660+r2, null],
  [rx(240),900+r2, 470, 840+r2, 442],
  [rx(470),660+r2, 700, 750+r1, 672],
  [rx(470),840+r1, 700, 750+r2, 672],
  [rx(700),750+r1, 930, 718+r2, null],
  [rx(930),718+r1,1160, 480+r2,1132],
];

const TEAM_PATHS = {
  'Paris Gentle Mates':[['wr1_1',1,'wr2_1',1,212],['wr2_1',1,'wf',1,442],['wf',1,'ef',1,900],['ef',1,'gf',2,1132]],
  'Toronto KOI':[['wr1_1',2,'er1_4',1,null]],
  'Carolina Royal Ravens':[['wr1_2',1,'er1_3',1,null]],
  'Los Angeles Thieves':[['wr1_2',2,'wr2_1',2,212],['wr2_1',2,'er3_1',1,442]],
  'Riyadh Falcons':[['wr1_3',1,'er1_1',1,null],['er1_1',1,'er2_1',1,212]],
  'OpTic Texas':[['wr1_3',2,'wr2_2',1,212],['wr2_2',1,'wf',2,442],['wf',2,'gf',1,902]],
  'FaZe Vegas':[['wr1_4',1,'er1_2',1,null],['er1_2',1,'er2_1',2,212],['er2_1',2,'er3_1',2,null],['er3_1',2,'er4',1,672],['er4',1,'ef',2,null]],
  'G2 Minnesota':[['wr1_4',2,'wr2_2',2,212],['wr2_2',2,'er3_2',1,442],['er3_2',1,'er4',2,672]],
  'Cloud9 New York':[],'Boston Breach':[],
  'Vancouver Surge':[['er1_3',2,'er2_2',1,212]],
  'Miami Heretics':[['er1_4',2,'er2_2',2,212],['er2_2',2,'er3_2',2,442]],
};

/* ═══════════════════════════════════════════════════════════════════
   PATH HELPERS
═══════════════════════════════════════════════════════════════════ */
function bezierLoop(x1,y1,x2,y2){const cx=x1+85;return `M${x1},${y1} C${cx},${y1} ${cx},${y2} ${x2},${y2}`;}
function elbow(x1,y1,x2,y2,mid){
  if(x2<x1) return bezierLoop(x1,y1,x2,y2);
  if(mid===null) return `M${x1},${y1} H${x2}`;
  return `M${x1},${y1} H${mid} V${y2} H${x2}`;
}

/* ═══════════════════════════════════════════════════════════════════
   BUILD STATIC SVG
═══════════════════════════════════════════════════════════════════ */
document.getElementById('svg-static').innerHTML =
  STATIC_LINES.map(([x1,y1,x2,y2,mid])=>`<path class="sl" d="${elbow(x1,y1,x2,y2,mid)}"/>`).join('');

/* ═══════════════════════════════════════════════════════════════════
   BUILD DOM (cards + labels)
═══════════════════════════════════════════════════════════════════ */
const bracket = document.getElementById('bracket');
const svgPath = document.getElementById('svg-path');
const seen = new Set();

for(const [id,m] of Object.entries(M)){
  if(m.lbl && !seen.has(m.lbl)){
    seen.add(m.lbl);
    const el=document.createElement('div');
    el.className='rl'; el.textContent=m.lbl;
    el.style.cssText=`left:${m.x}px;top:${m.y-16}px`;
    bracket.appendChild(el);
  }
  const w1=m.s1>m.s2;
  const card=document.createElement('div');
  card.className='mc'; card.id='mc-'+id;
  card.style.cssText=`left:${m.x}px;top:${m.y}px`;
  [1,2].forEach(slot=>{
    const win=slot===1?w1:!w1, name=slot===1?m.t1:m.t2, score=slot===1?m.s1:m.s2;
    const row=document.createElement('div');
    row.className=`tr ${win?'win':'lose'}`;
    row.dataset.team=name;
    row.innerHTML=`<span class="tn">${name}</span><span class="ts">${score}</span>`;
    // hover only on the team name span, so dragging over a card doesn't accidentally trigger it
    row.querySelector('.tn').addEventListener('mouseenter',()=>hiTeam(name));
    row.querySelector('.tn').addEventListener('mouseleave',clrTeam);
    card.appendChild(row);
  });
  bracket.appendChild(card);
}

const gf=M.gf;
const badge=document.createElement('div');
badge.className='champion'; badge.textContent='🏆 Champion';
badge.style.cssText=`left:${gf.x}px;top:${gf.y+H+6}px;width:${W}px`;
bracket.appendChild(badge);

/* ═══════════════════════════════════════════════════════════════════
   HIGHLIGHT
═══════════════════════════════════════════════════════════════════ */
let activeTeam=null;
function hiTeam(team){
  if(activeTeam===team) return;
  activeTeam=team;
  document.querySelectorAll('.tr').forEach(el=>el.classList.toggle('hi',el.dataset.team===team));
  document.querySelectorAll('.mc').forEach(card=>{
    card.classList.toggle('on',[...card.querySelectorAll('.tr')].some(r=>r.dataset.team===team));
  });
  svgPath.innerHTML=(TEAM_PATHS[team]||[]).map(([fId,fS,tId,tS,mid])=>{
    const fm=M[fId],tm=M[tId];
    return `<path class="animated-path" d="${elbow(rx(fm.x),fm.y+(fS===1?r1:r2),tm.x,tm.y+(tS===1?r1:r2),mid)}"/>`;
  }).join('');
}
function clrTeam(){
  activeTeam=null;
  document.querySelectorAll('.tr').forEach(el=>el.classList.remove('hi'));
  document.querySelectorAll('.mc').forEach(el=>el.classList.remove('on'));
  svgPath.innerHTML='';
}

/* ═══════════════════════════════════════════════════════════════════
   PAN & ZOOM
═══════════════════════════════════════════════════════════════════ */
const viewport = document.getElementById('viewport');
const canvas   = document.getElementById('canvas');

const CANVAS_W = 1400, CANVAS_H = 1140;
const ZOOM_MIN = 0.35, ZOOM_MAX = 1.6, ZOOM_STEP = 0.12;

let scale = 1, tx = 0, ty = 0;
let dragging = false, startX = 0, startY = 0, startTx = 0, startTy = 0;
let didDrag = false;  // flag: distinguish click vs drag

function clamp(val,lo,hi){ return Math.max(lo,Math.min(hi,val)); }

function applyTransform(animate){
  // clamp so you can't drag the bracket fully off-screen
  const vw = viewport.clientWidth, vh = viewport.clientHeight;
  const minTx = Math.min(0, vw - CANVAS_W * scale);
  const minTy = Math.min(0, vh - CANVAS_H * scale);
  tx = clamp(tx, minTx, 0);
  ty = clamp(ty, minTy, 0);

  canvas.style.transition = animate ? 'transform .2s ease' : 'none';
  canvas.style.transform  = `translate(${tx}px,${ty}px) scale(${scale})`;
  canvas.style.transformOrigin = '0 0';
  updateMinimap();
}

/* ── Initial position: centre bracket horizontally ── */
function resetView(){
  scale = 1;
  const vw = viewport.clientWidth, vh = viewport.clientHeight;
  tx = clamp(Math.round((vw - CANVAS_W) / 2), Math.min(0, vw - CANVAS_W), 0);
  ty = 0;
  applyTransform(true);
}

/* ── Mouse drag ── */
viewport.addEventListener('mousedown', e=>{
  // Don't start drag on team name spans (let hover work)
  if(e.target.classList.contains('tn')) return;
  dragging=true; didDrag=false;
  startX=e.clientX; startY=e.clientY;
  startTx=tx; startTy=ty;
  viewport.classList.add('dragging');
  e.preventDefault();
});
window.addEventListener('mousemove', e=>{
  if(!dragging) return;
  const dx=e.clientX-startX, dy=e.clientY-startY;
  if(Math.abs(dx)>3||Math.abs(dy)>3) didDrag=true;
  tx=startTx+dx; ty=startTy+dy;
  applyTransform(false);
});
window.addEventListener('mouseup', ()=>{
  dragging=false;
  viewport.classList.remove('dragging');
});

/* ── Touch drag ── */
let t0=null;
viewport.addEventListener('touchstart', e=>{
  if(e.touches.length===1){
    t0={x:e.touches[0].clientX,y:e.touches[0].clientY,tx,ty};
  }
},{passive:true});
viewport.addEventListener('touchmove', e=>{
  if(!t0||e.touches.length!==1) return;
  tx=t0.tx+(e.touches[0].clientX-t0.x);
  ty=t0.ty+(e.touches[0].clientY-t0.y);
  applyTransform(false);
  e.preventDefault();
},{passive:false});
viewport.addEventListener('touchend',()=>{ t0=null; });

/* ── Wheel zoom (zoom toward cursor) ── */
viewport.addEventListener('wheel', e=>{
  e.preventDefault();
  const rect=viewport.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  const delta=e.deltaY<0?ZOOM_STEP:-ZOOM_STEP;
  const newScale=clamp(scale+delta,ZOOM_MIN,ZOOM_MAX);
  const ratio=newScale/scale;
  tx=mx-(mx-tx)*ratio;
  ty=my-(my-ty)*ratio;
  scale=newScale;
  applyTransform(false);
},{passive:false});

/* ── Zoom buttons ── */
function zoomAt(center,delta){
  const newScale=clamp(scale+delta,ZOOM_MIN,ZOOM_MAX);
  const ratio=newScale/scale;
  const vw=viewport.clientWidth, vh=viewport.clientHeight;
  tx=(vw/2)-(vw/2-tx)*ratio;
  ty=(vh/2)-(vh/2-ty)*ratio;
  scale=newScale;
  applyTransform(true);
}
document.getElementById('zin') .addEventListener('click',()=>zoomAt(null, ZOOM_STEP));
document.getElementById('zout').addEventListener('click',()=>zoomAt(null,-ZOOM_STEP));
document.getElementById('zrst').addEventListener('click',resetView);
const fullscreenButton=document.getElementById('zfull');
function updateFullscreenButton(fullscreen){
  const active=!!fullscreen;
  fullscreenButton.textContent=active?'RST':'FS';
  fullscreenButton.title=active?'Restore bracket':'Expand bracket';
}
fullscreenButton.addEventListener('click',()=>{
  if(window.parent && window.parent !== window){
    window.parent.postMessage({ type:'toggle-bracket-fullscreen' }, '*');
    return;
  }
  if(document.fullscreenElement){
    document.exitFullscreen?.();
    return;
  }
  document.documentElement.requestFullscreen?.();
});
window.addEventListener('message', event => {
  if(event.origin !== window.location.origin && event.origin !== 'null') return;
  if(event.data?.type === 'bracket-fullscreen-state'){
    updateFullscreenButton(event.data.fullscreen);
  }
});
document.addEventListener('fullscreenchange', () => {
  if(window.parent === window){
    updateFullscreenButton(Boolean(document.fullscreenElement));
  }
});
updateFullscreenButton(false);

/* ═══════════════════════════════════════════════════════════════════
   MINI-MAP
═══════════════════════════════════════════════════════════════════ */
const mm       = document.getElementById('minimap');
const mmBracket= document.getElementById('mm-bracket');
const mmVp     = document.getElementById('mm-viewport');
const MM_W=160, MM_H=90;
const mmScaleX = MM_W/CANVAS_W, mmScaleY = MM_H/CANVAS_H;

// Clone the bracket into the minimap (lightweight snapshot)
function buildMinimap(){
  const clone=bracket.cloneNode(true);
  // remove hover listeners from clone — they're pointless
  clone.querySelectorAll('.tn').forEach(el=>{
    el.replaceWith(el.cloneNode(true));
  });
  // strip animated paths and hit zones
  clone.querySelectorAll('#svg-path,#hint').forEach(el=>el.remove());
  mmBracket.appendChild(clone);
  mmBracket.style.transform=`scale(${mmScaleX},${mmScaleY})`;
  mmBracket.style.transformOrigin='top left';
  mmBracket.style.width=CANVAS_W+'px';
  mmBracket.style.height=CANVAS_H+'px';
}
buildMinimap();

function updateMinimap(){
  const vw=viewport.clientWidth, vh=viewport.clientHeight;
  // viewport rect in canvas-space
  const vpLeft  = -tx/scale;
  const vpTop   = -ty/scale;
  const vpRight = vpLeft  + vw/scale;
  const vpBottom= vpTop   + vh/scale;
  const l=clamp(vpLeft,  0, CANVAS_W)*mmScaleX;
  const t2=clamp(vpTop,   0, CANVAS_H)*mmScaleY;
  const w=clamp(vpRight,  0, CANVAS_W)*mmScaleX - l;
  const h=clamp(vpBottom, 0, CANVAS_H)*mmScaleY - t2;
  mmVp.style.cssText=`left:${l}px;top:${t2}px;width:${w}px;height:${h}px`;
}

/* ═══════════════════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════════════════ */
resetView();

const hint=document.getElementById('hint');
setTimeout(()=>hint.classList.add('fade'),4500);
setTimeout(()=>hint.remove(),5000);
</script>
</body>
</html>
