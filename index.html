<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Iron Sight Stats</title>
  <meta name="description" content="CDL stats, standings, matches, teams, betting tools, and brackets.">
  <link rel="icon" type="image/png" href="./assets/img/branding/logo.png">
  <link rel="stylesheet" href="./assets/css/app.css">
</head>
<body>
  <div class="app-shell">
    <header class="site-header">
      <div class="brand-wrap">
        <img class="brand-logo" src="./assets/img/branding/logo.png" alt="Iron Sight Stats logo">
        <div>
          <div class="eyebrow">Public Build</div>
          <h1>Iron Sight Stats</h1>
        </div>
      </div>
      <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Toggle navigation">☰</button>
      <nav class="site-nav" id="siteNav">
        <a href="#dashboard">Dashboard</a>
        <a href="#standings">Standings</a>
        <a href="#matches">Matches</a>
        <a href="#players">Players</a>
        <a href="#teams">Teams</a>
        <a href="#betting">Betting Lab</a>
        <a href="#brackets">Brackets</a>
        <a href="#matchup">Matchup</a>
      </nav>
    </header>

    <main class="site-main">
      <section id="dashboard" class="page-section active"></section>
      <section id="standings" class="page-section"></section>
      <section id="matches" class="page-section"></section>
      <section id="players" class="page-section"></section>
      <section id="teams" class="page-section"></section>
      <section id="betting" class="page-section"></section>
      <section id="brackets" class="page-section"></section>
      <section id="matchup" class="page-section"></section>
    </main>

    <footer class="site-footer">
      <span id="footerMeta">Loading data…</span>
    </footer>
  </div>

  <script type="module" src="./assets/js/app.js"></script>
</body>
</html>
