<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iron Sight Stats</title>
  <meta name="theme-color" content="#0b1320">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="./assets/img/branding/logo.png">
  <link rel="stylesheet" href="./assets/css/app.css">
  <link rel="stylesheet" href="./assets/css/responsive.css">
</head>
<body>
  <div class="app-shell">
    <header class="site-header">
      <div class="brand-wrap">
        <img class="brand-logo" src="./assets/img/branding/logo.png" alt="Iron Sight Stats logo">
        <div class="brand-copy">
          <div class="eyebrow">Public CDL Hub</div>
          <h1>Iron Sight Stats</h1>
          <p class="brand-subtitle">ISR rankings, matchup reads, standings, and team snapshots.</p>
        </div>
      </div>

      <button
        id="mobileMenuBtn"
        class="mobile-menu-btn"
        type="button"
        aria-controls="siteNav"
        aria-expanded="false"
      >
        Menu
      </button>

      <nav id="siteNav" class="site-nav" aria-label="Primary">
        <a href="#dashboard">Dashboard</a>
        <a href="#standings">Standings</a>
        <a href="#matches">Matches</a>
        <a href="#players">Players</a>
        <a href="#teams">Teams</a>
        <a href="#betting">Betting</a>
        <a href="#brackets">Brackets</a>
        <a href="#matchup">Matchup</a>
      </nav>
    </header>

    <div id="siteNavBackdrop" class="site-nav-backdrop" hidden></div>

    <main class="site-main">
      <section id="dashboard" class="page-section active"></section>
      <section id="standings" class="page-section"></section>
      <section id="matches" class="page-section"></section>
      <section id="players" class="page-section"></section>
      <section id="teams" class="page-section"></section>
      <section id="betting" class="page-section"></section>
      <section id="brackets" class="page-section"></section>
      <section id="matchup" class="page-section"></section>
    </main>

    <footer class="site-footer">
      <div id="footerMeta">Loading data package...</div>
    </footer>
  </div>

  <script type="module" src="./assets/js/app.js"></script>
</body>
</html>
