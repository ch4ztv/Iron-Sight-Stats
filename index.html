<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iron Sight Stats</title>
  <meta name="description" content="Iron Sight Stats public build" />
  <link rel="stylesheet" href="./assets/css/app.css" />
  <link rel="stylesheet" href="./assets/css/layout.css" />
  <link rel="stylesheet" href="./assets/css/components.css" />
  <link rel="stylesheet" href="./assets/css/responsive.css" />
</head>
<body>
  <div id="app" class="app-shell">
    <header class="site-header">
      <div class="site-header__inner app-container">
        <a class="brand" href="#dashboard" aria-label="Iron Sight Stats home">
          <div class="brand__mark">IS</div>
          <div class="brand__text">
            <span class="brand__title">Iron Sight Stats</span>
            <span class="brand__subtitle" id="app-version">Public Build</span>
          </div>
        </a>

        <button id="mobile-nav-toggle" class="mobile-nav-toggle" type="button" aria-expanded="false" aria-controls="mobile-nav">
          Menu
        </button>

        <nav class="site-nav" aria-label="Primary">
          <ul id="desktop-nav" class="nav-list"></ul>
        </nav>
      </div>

      <div id="mobile-nav" class="mobile-nav" hidden>
        <div class="app-container">
          <ul id="mobile-nav-list" class="nav-list nav-list--mobile"></ul>
        </div>
      </div>
    </header>

    <main class="app-main app-container">
      <section id="global-banner" class="global-banner" hidden></section>

      <section class="page-heading">
        <div>
          <p class="eyebrow">Call of Duty League</p>
          <h1 id="page-title">Dashboard</h1>
        </div>
        <div id="page-meta" class="page-meta"></div>
      </section>

      <div id="global-loading" class="global-loading" hidden>Loading data…</div>

      <section id="dashboard-section" class="app-section"></section>
      <section id="standings-section" class="app-section" hidden></section>
      <section id="matches-section" class="app-section" hidden></section>
      <section id="players-section" class="app-section" hidden></section>
      <section id="teams-section" class="app-section" hidden></section>
      <section id="betting-section" class="app-section" hidden></section>
      <section id="brackets-section" class="app-section" hidden></section>
      <section id="matchup-section" class="app-section" hidden></section>
    </main>

    <footer class="site-footer">
      <div class="app-container site-footer__inner">
        <span>Iron Sight Stats</span>
        <span id="footer-meta">Static public build</span>
      </div>
    </footer>
  </div>

  <script type="module" src="./assets/js/app.js"></script>
</body>
</html>
