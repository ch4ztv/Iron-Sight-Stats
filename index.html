<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iron Sight Stats</title>
  <meta name="theme-color" content="#06110f">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="./assets/img/branding/logo.png">
  <link rel="stylesheet" href="./assets/css/app.css">
  <link rel="stylesheet" href="./assets/css/responsive.css">
</head>
<body>
  <div class="app-shell">
    <header class="site-header">
      <div class="brand-wrap">
        <img class="brand-logo" src="./assets/img/branding/logo.png" alt="Iron Sight Stats logo">
        <div class="brand-copy">
          <div class="brand-line brand-line-main">IRON SIGHT</div>
          <div class="brand-line brand-line-sub">STATS</div>
        </div>
      </div>

      <button
        id="mobileMenuBtn"
        class="mobile-menu-btn"
        type="button"
        aria-controls="siteNav"
        aria-expanded="false"
      >
        Menu
      </button>

      <nav id="siteNav" class="site-nav" aria-label="Primary">
        <a href="#dashboard" class="site-nav-link">
          <span class="site-nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M4 19.5V11.5"></path>
              <path d="M10 19.5V6.5"></path>
              <path d="M16 19.5V14.5"></path>
              <path d="M20 19.5V4.5"></path>
            </svg>
          </span>
          <span class="site-nav-label">Dashboard</span>
        </a>
        <a href="#standings" class="site-nav-link">
          <span class="site-nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M8 4.5h8v2.5c0 2.2-1.8 4-4 4s-4-1.8-4-4z"></path>
              <path d="M8 6.5H5.5c0 2.2 1.3 3.8 3.2 4.5"></path>
              <path d="M16 6.5h2.5c0 2.2-1.3 3.8-3.2 4.5"></path>
              <path d="M12 11v4"></path>
              <path d="M9 19.5h6"></path>
              <path d="M8 15.5h8"></path>
            </svg>
          </span>
          <span class="site-nav-label">Standings</span>
        </a>
        <a href="#matches" class="site-nav-link">
          <span class="site-nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M7.5 8.5h9a3.5 3.5 0 0 1 3.4 4.3l-.7 3A2.5 2.5 0 0 1 16.8 18h-9.6a2.5 2.5 0 0 1-2.4-2.2l-.7-3a3.5 3.5 0 0 1 3.4-4.3z"></path>
              <path d="M9 8.5l1.4-2"></path>
              <path d="M15 8.5l-1.4-2"></path>
              <path d="M9 13h2.6"></path>
              <path d="M10.3 11.7v2.6"></path>
              <path d="M15.8 12.2h.1"></path>
              <path d="M17.4 13.8h.1"></path>
            </svg>
          </span>
          <span class="site-nav-label">Matches</span>
        </a>
        <a href="#players" class="site-nav-link">
          <span class="site-nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M12 12.3a3.8 3.8 0 1 0 0-7.6 3.8 3.8 0 0 0 0 7.6z"></path>
              <path d="M5.2 19.5a6.9 6.9 0 0 1 13.6 0"></path>
            </svg>
          </span>
          <span class="site-nav-label">Player Stats</span>
        </a>
        <a href="#betting" class="site-nav-link">
          <span class="site-nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M12 4.5v3"></path>
              <path d="M12 16.5v3"></path>
              <path d="M4.5 12h3"></path>
              <path d="M16.5 12h3"></path>
              <path d="M7 7l2.1 2.1"></path>
              <path d="M14.9 14.9L17 17"></path>
              <path d="M17 7l-2.1 2.1"></path>
              <path d="M9.1 14.9L7 17"></path>
              <circle cx="12" cy="12" r="5.2"></circle>
              <circle cx="12" cy="12" r="1.7"></circle>
            </svg>
          </span>
          <span class="site-nav-label">Betting Lab</span>
        </a>
        <a href="#matchup" class="site-nav-link">
          <span class="site-nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M8 5.5l10.5 10.5"></path>
              <path d="M15.4 4.8l3.8 3.8"></path>
              <path d="M6.5 17l-1.7 2.5 2.5-1.7 1.6-1.6-2.4-2.4z"></path>
              <path d="M16 5.5L5.5 16"></path>
              <path d="M8.6 4.8L4.8 8.6"></path>
              <path d="M17.5 17l1.7 2.5-2.5-1.7-1.6-1.6 2.4-2.4z"></path>
            </svg>
          </span>
          <span class="site-nav-label">Matchup</span>
        </a>
        <a href="#teams" class="site-nav-link">
          <span class="site-nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M4.5 18.5h15"></path>
              <path d="M6.5 18.5v-4.5"></path>
              <path d="M11 18.5v-6"></path>
              <path d="M15.5 18.5V14"></path>
              <path d="M4.5 12.5c1.8-3 4.5-4.5 7.5-4.5s5.7 1.5 7.5 4.5"></path>
            </svg>
          </span>
          <span class="site-nav-label">Teams</span>
        </a>
        <a href="#brackets" class="site-nav-link">
          <span class="site-nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M6 6.5h4"></path>
              <path d="M6 17.5h4"></path>
              <path d="M14 12h4"></path>
              <path d="M10 6.5v11"></path>
              <path d="M10 12h4"></path>
              <path d="M18 10v4"></path>
            </svg>
          </span>
          <span class="site-nav-label">Brackets</span>
        </a>
      </nav>
    </header>

    <div id="siteNavBackdrop" class="site-nav-backdrop" hidden></div>

    <main class="site-main">
      <section id="dashboard" class="page-section active"></section>
      <section id="standings" class="page-section"></section>
      <section id="matches" class="page-section"></section>
      <section id="players" class="page-section"></section>
      <section id="teams" class="page-section"></section>
      <section id="betting" class="page-section"></section>
      <section id="brackets" class="page-section"></section>
      <section id="matchup" class="page-section"></section>
    </main>

    <footer class="site-footer">
      <div id="footerMeta">Loading data package...</div>
    </footer>
  </div>

  <script type="module" src="./assets/js/app.js"></script>
</body>
</html>
