<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iron Sight Stats</title>
  <meta name="theme-color" content="#06110f">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="./assets/img/branding/logo.png">
  <link rel="stylesheet" href="./assets/css/app.css">

<body>
  <div class="app-shell">

        <div class="brand-copy">
          <div class="brand-line brand-line-main">IRON SIGHT</div>

              <path d="M8 6.5H5.3c0 2.4 1.3 4.2 3.4 5"></path>
              <path d="M16 6.5h2.7c0 2.4-1.3 4.2-3.4 5"></path>
              <path d="M12 11.5v3.6"></path>
              <path d="M8.5 19.5h7"></path>
              <path d="M9 15.5h6"></path>
            </svg>
          </span>
          <span class="site-nav-label">Standings</span>
        </a>
        <a href="#matches" class="site-nav-link">
          <span class="site-nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M7.5 8.7h9a3.6 3.6 0 0 1 3.5 4.4l-.7 2.8a2.6 2.6 0 0 1-2.5 2.1H7.2a2.6 2.6 0 0 1-2.5-2.1l-.7-2.8a3.6 3.6 0 0 1 3.5-4.4z"></path>

              <path d="M15.2 8.7l-1.3-2"></path>
              <path d="M8.9 13h3"></path>
              <path d="M10.4 11.5v3"></path>
              <circle cx="15.9" cy="12.2" r=".55"></circle>
              <circle cx="17.7" cy="13.9" r=".55"></circle>

          </span>
          <span class="site-nav-label">Matches</span>
        </a>
        <a href="#players" class="site-nav-link">
          <span class="site-nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M12 11.8a3.9 3.9 0 1 0 0-7.8 3.9 3.9 0 0 0 0 7.8z"></path>
              <path d="M5.2 19.5a6.9 6.9 0 0 1 13.6 0"></path>
              <path d="M17.8 7.2h2"></path>
              <path d="M17.8 10.2h2"></path>
            </svg>
          </span>

        </a>

        </a>
        <a href="#teams" class="site-nav-link">
          <span class="site-nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M4.5 18.5h15"></path>
              <path d="M6.5 18.5v-4.8"></path>
              <path d="M11 18.5v-6.2"></path>
              <path d="M15.5 18.5v-4.8"></path>

              <path d="M8 10.4h8"></path>

              <circle cx="5.5" cy="6.5" r="1.2"></circle>
              <circle cx="5.5" cy="17.5" r="1.2"></circle>
              <circle cx="18.5" cy="12" r="1.2"></circle>
              <path d="M6.7 6.5h3.8v11h3.8"></path>

              <path d="M10.5 12h6.8"></path>

      <section id="betting" class="page-section"></section>
      <section id="brackets" class="page-section"></section>
