// ── File handling ─────────────────────────────────────────────────
window.tspHandleDrop = function(e, teamId){
  e.preventDefault();
  document.getElementById(`ts-dz-${teamId}`)?.classList.remove('drag');
  tspHandleFiles(e.dataTransfer.files, teamId);
};

window.tspHandleFiles = function(fileList, teamId){
  // Accept anything that looks like an image by MIME or extension (drag-and-drop
  // from Windows Explorer often gives type="" for PNG files)
  const IMG_EXTS = /\.(png|jpg|jpeg|webp|gif|bmp)$/i;
  const files = Array.from(fileList).filter(f=>
    f.type.startsWith('image/') || IMG_EXTS.test(f.name)
  );
  if(!files.length) return;
  if(!TSP.images[teamId]) TSP.images[teamId]=[];

  let loaded = 0;
  files.forEach(file=>{
    const reader = new FileReader();
    reader.onload = ev=>{
      const dataUrl = ev.target.result;
      const type = detectStatType(file.name);
      const existing = TSP.images[teamId].findIndex(i=>i.type===type && type!=='unknown');
      if(existing>=0) TSP.images[teamId][existing]={file, dataUrl, type, label:file.name};
      else TSP.images[teamId].push({file, dataUrl, type, label:file.name});
      loaded++;
      if(loaded===files.length) tspUpdateParserDOM(teamId);
    };
    reader.onerror = ()=>{
      loaded++;
      if(loaded===files.length) tspUpdateParserDOM(teamId);
    };
    reader.readAsDataURL(file);
  });
};

window.tspRemoveImage = function(teamId, idx){
  if(TSP.images[teamId]) TSP.images[teamId].splice(idx,1);
  tspUpdateParserDOM(teamId);
};

window.tspClearImages = function(teamId){
  TSP.images[teamId]=[];
  tspUpdateParserDOM(teamId);
};

window.tspClearParsed = async function(teamId){
  if(!confirm(`Clear all parsed stats for ${TEAMS.find(t=>t.id===teamId)?.name||teamId}?`)) return;
  delete S.teamStats[teamId];
  await S.saveTeamStats();
  renderTeams();
};

// Targeted DOM update — never does a full renderTeams(), just patches
// the thumb row, count label, and button states in-place.
function tspUpdateParserDOM(teamId){
  const imgs = TSP.images[teamId] || [];

  // Thumb row
  const dzEl = document.getElementById(`ts-dz-${teamId}`);
  if(dzEl){
    let row = dzEl.querySelector('.ts-thumb-row');
    if(imgs.length === 0){
      if(row) row.remove();
    } else {
      if(!row){
        row = document.createElement('div');
        row.className = 'ts-thumb-row';
        dzEl.appendChild(row);
      }
      row.innerHTML = imgs.map((img,i)=>`
        <div class="ts-thumb" title="${U.escHTML(img.label)}">
          <img src="${img.dataUrl}" alt="${U.escHTML(img.label)}">
          <div class="ts-thumb-label">${U.escHTML(STAT_TYPE_LABELS[img.type]||img.label)}</div>
          <button class="ts-thumb-rm" onclick="tspRemoveImage('${teamId}',${i})" title="Remove">✕</button>
        </div>`).join('');
    }
  }

  // Parse button
  const btn = document.getElementById(`ts-btn-${teamId}`);
  if(btn) btn.disabled = imgs.length === 0 || TSP.parsing;

  // Count label — find it inside the parser card
  const card = document.getElementById(`ts-parser-${teamId}`);
  if(card){
    const lbl = card.querySelector('.ts-img-count');
    if(lbl) lbl.textContent = `${imgs.length} image${imgs.length!==1?'s':''} loaded`;

    // Show/hide the Clear button dynamically
    const clrBtn = card.querySelector('.ts-clear-btn');
    if(clrBtn) clrBtn.style.display = imgs.length>0 ? '' : 'none';
  }
}

// ── AI Parse orchestrator ─────────────────────────────────────────
window.tspRunParse = async function(teamId){
  if(TSP.parsing) return;
  const imgs = TSP.images[teamId]||[];
  if(imgs.length===0){ toast('Load at least one stat image first','err'); return; }

  const apiKey = await DB.getSetting('anthropic_api_key','');
  if(!apiKey){ toast('No API key — add it in Settings','err',5000); return; }

  TSP.parsing = true;
  const btn = document.getElementById(`ts-btn-${teamId}`);
  if(btn) btn.disabled=true;
  const progEl = document.getElementById(`ts-progress-${teamId}`);
  if(progEl) progEl.innerHTML = `<div class="ts-progress">🤖 Sending ${imgs.length} image${imgs.length>1?'s':''} to Claude Vision…</div>`;

  try {
    const team = TEAMS.find(t=>t.id===teamId);
    const roster = S.players.filter(p=>p.teamId===teamId).map(p=>p.name);

    // Build image blocks
    const imageBlocks = imgs.map(img=>{
      const [header, b64] = img.dataUrl.split(',');
      const mediaType = header.includes('png')?'image/png':header.includes('webp')?'image/webp':'image/jpeg';
      return { type:'image', source:{ type:'base64', media_type:mediaType, data:b64 } };
    });

    // Label block so Claude knows which image is which
    const imageLabels = imgs.map((img,i)=>`Image ${i+1}: ${STAT_TYPE_LABELS[img.type]||img.label} (detected type: ${img.type})`).join('\n');

    const systemPrompt = `You are a CDL (Call of Duty League) stat image parser. You extract structured data from BreakingPoint-style team stat screenshots with pixel-perfect accuracy.

Team being parsed: ${team?.name||teamId}
Known roster: ${roster.join(', ')||'unknown'}

You will receive one or more BreakingPoint team stats screenshots. Each image shows a specific stat category. Extract ALL numbers exactly as shown.

Image types you may see:
- OVERALL: columns = Player tag, K/D, Slayer Rating, Respawn KD, NTK%, BP Rating
- HARDPOINT: columns = Player tag, K/D, K/10m, DMG/10m, OBJ/10m, Eng/10m
- SEARCH & DESTROY: columns = Player tag, K/D, K/Round, Bloods, Plants/Defuses (shown as "X - Y"), Snipes, DMG/Round
- OVERLOAD/CONTROL: columns = Player tag, K/D, K/10m, DMG/10m, Goals/10m, Eng/10m
- MAP RECORDS: rows = Map name, columns = HP W, HP L, S&D W, S&D L, OVL W, OVL L (plus a Totals row)
- PICKS/VETOES: rows = Map name, columns = HP Pick, HP Veto, S&D Pick, S&D Veto, OVL Pick, OVL Veto

Return ONLY valid JSON. No markdown, no explanation.`;

    const userPrompt = `Parse these team stats images and return structured JSON.

${imageLabels}

Return this exact JSON structure (include only sections you can see, omit others):
{
  "overall": {
    "players": [
      { "player": "Name", "kd": "1.02", "slayerRating": "84.89", "respawnKd": "0.99", "ntkPct": "0.68", "bpRating": "1.11" }
    ]
  },
  "hardpoint": {
    "players": [
      { "player": "Name", "kd": "0.99", "k10m": "23.71", "dmg10m": "3309", "obj10m": "83.48", "eng10m": "58.70" }
    ]
  },
  "snd": {
    "players": [
      { "player": "Name", "kd": "1.06", "kRound": "0.68", "bloods": "31", "plants": "5", "defuses": "2", "snipes": "54", "dmgRound": "101.52" }
    ]
  },
  "overload": {
    "players": [
      { "player": "Name", "kd": "1.04", "k10m": "22.51", "dmg10m": "3085", "goals10m": "1.03", "eng10m": "55.53" }
    ]
  },
  "mapRecords": {
    "maps": [
      { "map": "Colossus", "hpW": 6, "hpL": 1, "sndW": null, "sndL": 1, "ovlW": null, "ovlL": null }
    ],
    "totals": { "hpW": 22, "hpL": 12, "sndW": 18, "sndL": 9, "ovlW": 17, "ovlL": 6 }
  },
  "picksVetos": {
    "maps": [
      { "map": "Colossus", "hpPick": 8, "hpVeto": 9, "sndPick": 1, "sndVeto": 20, "ovlPick": null, "ovlVeto": null }
    ]
  },
  "confidence": "high",
  "notes": "any issues"
}

Rules:
- Read every number exactly as shown — do not round or estimate
- For Plants/Defuses shown as "X - Y", split into plants=X, defuses=Y
- Use null for empty cells (not 0)
- Match player names to roster: ${roster.join(', ')}
- confidence = "high" if all values clearly readable, "medium" if some unclear, "low" if very unclear
- CRITICAL: Ignore the filename label — look at the ACTUAL CONTENT of each image to determine its type. A file named "Overload.PNG" might actually show a Picks/Vetoes table — parse it for what it IS, not what its filename says
- If an image contains a Picks/Vetoes table (columns: Map, HP Pick, HP Veto, S&D Pick, S&D Veto, OVL Pick, OVL Veto) then put it under "picksVetos" regardless of filename
- If an image shows player rows with K/D and Goals/10m columns, it is Overload — put it under "overload"
- In your notes, flag any case where the image content did not match its detected filename type`;

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key': apiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4000,
        system: systemPrompt,
        messages:[{
          role:'user',
          content:[...imageBlocks, {type:'text', text:userPrompt}]
        }]
      })
    });

    if(!response.ok){
      const err = await response.json().catch(()=>({}));
      throw new Error(err.error?.message || `API error ${response.status}`);
    }

    const apiData = await response.json();
    const rawText = apiData.content.map(b=>b.type==='text'?b.text:'').join('');

    // Parse JSON
    let parsed;
    try {
      const clean = rawText.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
      parsed = JSON.parse(clean);
    } catch(e){
      const match = rawText.match(/\{[\s\S]*\}/);
      if(match) parsed = JSON.parse(match[0]);
      else throw new Error('Could not parse Claude response as JSON');
    }

    // Store with metadata
    S.teamStats[teamId] = {
      ...parsed,
      teamId,
      teamName: team?.name,
      parsedAt: Date.now(),
      imageCount: imgs.length,
    };

    await S.saveTeamStats();

    // Clear loaded images after successful parse
    TSP.images[teamId] = [];

    if(progEl) progEl.innerHTML = `<div class="ts-progress" style="border-color:var(--green);color:var(--green)">✅ Parse complete! Confidence: ${parsed.confidence||'?'} ${parsed.notes?`· ${parsed.notes}`:''}</div>`;

    toast(`${team?.name||teamId} stats parsed & saved!`, 'ok', 4000);

    // Switch to the stats display view
    S.teamPage.section = 'media';
    setTimeout(()=>renderTeams(), 800);

  } catch(e){
    console.error('Team stats parse error:', e);
    if(progEl) progEl.innerHTML = `<div class="ts-progress" style="border-color:var(--red);color:var(--red)">⚠️ Parse failed: ${U.escHTML(e.message)}</div>`;
    toast('Parse failed: '+e.message,'err',6000);
  } finally {
    TSP.parsing = false;
    const btn2 = document.getElementById(`ts-btn-${teamId}`);
    if(btn2) btn2.disabled = (TSP.images[teamId]||[]).length===0;
  }
};

})();
</script>


<script>
(function(){
  if (typeof BRACKET_DEFS === 'undefined') return;

  function placementRank(place){
    const s = String(place||'');
    if(/^1/.test(s)) return 1;
    if(/^2/.test(s)) return 2;
    if(/^3/.test(s)) return 3;
    if(/^4/.test(s)) return 4;
    if(/^5/.test(s)) return 5;
    if(/^7/.test(s)) return 7;
    if(/^9/.test(s)) return 9;
    return 99;
  }

  function loserOfMatch(d){
    if(!d?.winner || !d.t1 || !d.t2) return '';
    return d.winner===d.t1 ? d.t2 : d.t1;
  }

  function derivePlacementRows(eventId){
    const def = BRACKET_DEFS[eventId];
    const bData = (typeof normalizeBracketState==='function') ? normalizeBracketState(eventId) : (S._bracketData?.[eventId] || {});
    const rows = [];
    const seen = new Set();
    for(const rule of (def?.placements || [])){
      const mids = rule.matches || (rule.match ? [rule.match] : []);
      for(const mid of mids){
        const d = bData[mid];
        if(!d?.winner || !d.t1 || !d.t2) continue;
        const teamId = rule.side==='winner' ? d.winner : loserOfMatch(d);
        if(!teamId) continue;
        const key = `${teamId}|${rule.place}|${mid}`;
        if(seen.has(key)) continue;
        seen.add(key);
        rows.push({
          teamId,
          place: rule.place || '',
          pts: Number(rule.pts || 0),
          matchId: mid,
          reason: rule.reason || `${rule.place || ''} Place`.trim()
        });
      }
    }
    rows.sort((a,b)=> placementRank(a.place)-placementRank(b.place) || String(U.team(a.teamId)?.name||a.teamId).localeCompare(String(U.team(b.teamId)?.name||b.teamId)));
    return rows;
  }

  function buildAwardPreviewHTML(eventId){
    const rows = derivePlacementRows(eventId);
    if(!rows.length) return '';
    const total = rows.reduce((sum,r)=> sum + (r.pts||0), 0);
    const body = rows.map(r => {
      const tm = U.team(r.teamId) || {name:r.teamId};
      return `<tr>
        <td><strong>${r.place}</strong></td>
        <td><div style="display:flex;align-items:center;gap:8px">${U.logoHTML(r.teamId)} <span>${tm.name}</span></div></td>
        <td>${U.escHTML(r.reason || '')}</td>
        <td style="text-align:right;font-family:var(--mono);font-weight:800;color:var(--gold)">+${r.pts}</td>
      </tr>`;
    }).join('');
    return `
      <div class="info-box text-sm" style="margin-bottom:12px">
        <strong>Validation preview</strong><br>
        Tournament placement points will be awarded from the completed bracket results below. Qualifier match-win points are tracked separately at <strong>10 points per online qualifier win</strong>.
      </div>
      <div style="overflow:auto;border:1px solid var(--border);border-radius:12px">
        <table>
          <thead><tr><th>Placement</th><th>Team</th><th>Source</th><th style="text-align:right">CDL Points</th></tr></thead>
          <tbody>${body}</tbody>
        </table>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px;gap:12px;flex-wrap:wrap">
        <div class="text-sm text-muted">${rows.length} team placement entries detected from the finished bracket.</div>
        <div class="pill pill-w" style="font-family:var(--mono)">Total event points awarded: ${total}</div>
      </div>`;
  }

  window.awardBracketPoints = function(eventId){
    const def = BRACKET_DEFS[eventId];
    if(!def) return toast('Unknown bracket event.','err');
    const ids = (typeof allMatchIds==='function') ? allMatchIds(def) : [...(def.winners||[]).flatMap(r=>r.matches.map(m=>m.id)), ...((def.losers||[]).flatMap(r=>r.matches.map(m=>m.id)))];
    const bData = (typeof normalizeBracketState==='function') ? normalizeBracketState(eventId) : (S._bracketData?.[eventId] || {});
    const unfilled = ids.filter(mid => !bData?.[mid]?.winner);
    if(unfilled.length) return toast(`${unfilled.length} match(es) still need results before points can be awarded.`, 'err', 4000);
    const already = S.points.some(p=>p.eventId===eventId && p.type==='bracket');
    if(already) return toast('Bracket points were already awarded for this event.', 'info');
    const previewHTML = buildAwardPreviewHTML(eventId);
    if(!previewHTML) return toast('Could not derive placements from the completed bracket.', 'err');
    Modal.open(`
      <div class="modal-hd"><h3>Award Points — ${U.event(eventId).name}</h3><button class="btn btn-ghost btn-xs" onclick="Modal.close()">✕</button></div>
      <div class="modal-bd">${previewHTML}</div>
      <div class="modal-ft">
        <button class="btn btn-ghost" onclick="Modal.close()">Cancel</button>
        <button class="btn btn-success" onclick="confirmAwardBracketPoints('${eventId}')">✅ Confirm & Award</button>
      </div>`);
    U.updateLogos();
  };

  window.confirmAwardBracketPoints = async function(eventId){
    const rows = derivePlacementRows(eventId);
    if(!rows.length) return toast('No placement rows were found to award.', 'err');
    Modal.close();
    for(const r of rows){
      await DB.add('points',{
        teamId:r.teamId,
        eventId,
        reason:r.reason || `${r.place} Place`,
        pts:r.pts,
        type:'bracket',
        ts:Date.now()
      });
    }
    await S.loadAll();
    if(typeof refreshBracketPanel==='function') refreshBracketPanel(eventId);
    if(typeof renderStandings==='function') renderStandings();
    toast(`Awarded ${rows.length} placement entries for ${U.event(eventId).name}.`,'ok',4000);
  };
})();
</script>


<script>
(function(){
  const OFFICIAL_MAJOR1 = {
    M1_WQF1:{t1:'pgm',t2:'toronto',score1:3,score2:1,winner:'pgm'},
    M1_WQF2:{t1:'ravens',t2:'lat',score1:0,score2:3,winner:'lat'},
    M1_WQF3:{t1:'faze',t2:'g2',score1:0,score2:3,winner:'g2'},
    M1_WQF4:{t1:'falcons',t2:'optic',score1:0,score2:3,winner:'optic'},
    M1_WSF1:{t1:'pgm',t2:'lat',score1:3,score2:0,winner:'pgm'},
    M1_WSF2:{t1:'g2',t2:'optic',score1:0,score2:3,winner:'optic'},
    M1_WF:{t1:'pgm',t2:'optic',score1:0,score2:3,winner:'optic'},
    M1_LR1A:{t1:'falcons',t2:'c9',score1:3,score2:1,winner:'falcons'},
    M1_LR1B:{t1:'faze',t2:'boston',score1:3,score2:1,winner:'faze'},
    M1_LR1C:{t1:'ravens',t2:'vancouver',score1:1,score2:3,winner:'vancouver'},
    M1_LR1D:{t1:'toronto',t2:'miami',score1:2,score2:3,winner:'miami'},
    M1_LR2A:{t1:'falcons',t2:'faze',score1:2,score2:3,winner:'faze'},
    M1_LR2B:{t1:'vancouver',t2:'miami',score1:0,score2:3,winner:'miami'},
    M1_LR3A:{t1:'lat',t2:'faze',score1:0,score2:3,winner:'faze'},
    M1_LR3B:{t1:'g2',t2:'miami',score1:3,score2:0,winner:'g2'},
    M1_LSF:{t1:'faze',t2:'g2',score1:3,score2:2,winner:'faze'},
    M1_LF:{t1:'pgm',t2:'faze',score1:3,score2:2,winner:'pgm'},
    M1_GF:{t1:'optic',t2:'pgm',score1:3,score2:4,winner:'pgm'}
  };

  window.exportData = async function(){
    const bracketData = {};
    if (typeof BRACKET_DEFS !== 'undefined') {
      for (const eid of Object.keys(BRACKET_DEFS)) {
        try {
          const raw = await DB.getSetting('bracket_'+eid, null);
          if(!raw){ bracketData[eid] = null; }
          else {
            try { bracketData[eid] = (typeof raw === 'string') ? JSON.parse(raw) : raw; }
            catch(_e){ bracketData[eid] = raw; }
          }
        } catch(e) {
          bracketData[eid] = null;
        }
      }
    }
    // Always reload teamStats fresh from DB so we have the latest
    const rawTS = await DB.getSetting('teamStats', null);
    const teamStats = rawTS ? JSON.parse(rawTS) : (S.teamStats || {});

    const data = {
      meta:{version:'1.1',exported:new Date().toISOString(),app:'IronSightStats'},
      matches: await DB.getAll('matches'),
      maps: await DB.getAll('maps'),
      pstats: await DB.getAll('pstats'),
      players: await DB.getAll('players'),
      points: await DB.getAll('points'),
      bprCoefficients: (typeof BPR_C !== 'undefined' ? BPR_C : {}),
      bracketData,
      teamStats,
    };
    const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=`IronSight_Backup_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    toast('Data exported with bracket data included.','ok');
  };

  window.importData = async function(input){
    const file = input.files && input.files[0];
    if(!file) return;
    if(!confirm('This will MERGE imported data with existing data. Continue?')) return;
    try{
      const text = await file.text();
      const data = JSON.parse(text);
      let imp = 0;
      const importStore = async(store, arr)=>{
        for(const item of (arr||[])){
          try{ await DB.put(store,item); imp++; }catch(e){}
        }
      };
      await importStore('matches', data.matches);
      await importStore('maps', data.maps);
      await importStore('pstats', data.pstats);
      await importStore('players', data.players);
      await importStore('points', data.points);
      if(data.bprCoefficients && typeof BPR_C !== 'undefined') Object.assign(BPR_C, data.bprCoefficients);

      // Restore teamStats
      if(data.teamStats && Object.keys(data.teamStats).length > 0){
        Object.assign(S.teamStats, data.teamStats);
        await S.saveTeamStats();
      }

      if (typeof BRACKET_DEFS !== 'undefined') {
        const incoming = data.bracketData || {};
        for (const eid of Object.keys(BRACKET_DEFS)) {
          if (incoming[eid]) {
            const payload = (typeof incoming[eid] === 'string') ? incoming[eid] : JSON.stringify(incoming[eid]);
            await DB.setSetting('bracket_'+eid, payload);
          }
        }
      }

      await S.loadAll();

      if (typeof loadBracketData === 'function') {
        await loadBracketData();
      }

      if ((!data.bracketData || !data.bracketData.M1T) && typeof DB !== 'undefined') {
        await DB.setSetting('bracket_M1T', JSON.stringify(OFFICIAL_MAJOR1));
        if(window.S){
          S._bracketData = S._bracketData || {};
          S._bracketData.M1T = OFFICIAL_MAJOR1;
        }
      }

      if (typeof refreshBracketPanel === 'function') {
        refreshBracketPanel('M1T');
        refreshBracketPanel('M2T');
      }

      toast(`Imported ${imp} records successfully${data.bracketData ? ' with bracket data' : ''}.`,'ok');
      IS.render(IS.tabs.current);
    } catch(e){
      toast('Import failed: '+e.message,'err',5000);
    } finally {
      try { input.value = ''; } catch(e) {}
    }
  };
})();
</script>

  }

    if(!window.S) return;
    const current = (S._bracketData && S._bracketData.M1T) ? S._bracketData.M1T : null;
    const filled = current ? Object.values(current).filter(v=>v && v.winner).length : 0;
    if(force || !current || filled < 18){

      if(typeof saveBracketData === 'function') saveBracketData('M1T');

    }
  }

  const oldLoadBracketData = window.loadBracketData;
  if(typeof oldLoadBracketData === 'function'){
    window.loadBracketData = async function(){
      await oldLoadBracketData();
      officialM1Maybe(false);
    };
  } else {
      window.addEventListener('load', function(){ setTimeout(function(){ officialM1Maybe(false); }, 250); });
  }

  const oldImportData = window.importData;
  if(typeof oldImportData === 'function'){
    window.importData = async function(input){

      officialM1Maybe(true);
      if(window.IS && IS.tabs && IS.tabs.current === 'teams' && typeof IS.render === 'function') IS.render('teams');

  function allIds(def){ return def.order || [...(def.winners||[]).flatMap(r=>r.matches||[]), ...(def.losers||[]).flatMap(r=>r.matches||[])].map(m=>m.id); }
  function teamName(tid){ return tid ? U.team(tid).name : 'TBD'; }
  function teamColor(tid){ return tid ? (U.team(tid).color || '#6c7380') : '#6c7380'; }
  function rowY(card, slot){ return card.y + (slot==='t2' ? 55 : 19); }
  function midY(card){ return card.y + 37; }
  function leftX(card){ return card.x; }
  function rightX(card){ return card.x + 250; }
  function routePath(fromCard, toCard, slot){
    const x1 = rightX(fromCard), y1 = midY(fromCard), x2 = leftX(toCard), y2 = rowY(toCard, slot);
    const dx = Math.max(34, (x2 - x1) / 2);
    const mx = x1 + dx;
    return `M ${x1} ${y1} H ${mx} V ${y2} H ${x2}`;
  }

  function renderCustomCard(eventId, matchId, data, pos){
    const d = data[matchId] || {};
    const t1 = d.t1 || '', t2 = d.t2 || '';
    const s1 = d.score1 ?? '', s2 = d.score2 ?? '';
    const w = d.winner || '';
    const c1 = hexToRGBA(teamColor(t1), .28), c2 = hexToRGBA(teamColor(t2), .28);
    return `<button class="iss-bcard ${(!t1&&!t2)?'iss-bplaceholder':''}" id="bm-${matchId}" style="left:${pos.x}px;top:${pos.y}px;--c1:${c1};--c2:${c2}" onclick="openBracketMatchEdit('${eventId}','${matchId}')" title="Edit bracket match">
      <div class="iss-brow ${w===t1?'win':''}">${t1?U.logoHTML(t1,'t-logo'):''}<span class="iss-bname">${U.escHTML(teamName(t1))}</span><span class="iss-bscore">${s1!==''?s1:' '}</span></div>
      <div class="iss-brow ${w===t2?'win':''}">${t2?U.logoHTML(t2,'t-logo'):''}<span class="iss-bname">${U.escHTML(teamName(t2))}</span><span class="iss-bscore">${s2!==''?s2:' '}</span></div>
    </button>`;
  }

  function renderCustomLayout(eventId){
    const def = BRACKET_DEFS[eventId];
    const layout = BRACKET_LAYOUTS[eventId];
    if(!def || !layout || typeof normalizeBracketState !== 'function') return null;
    const data = normalizeBracketState(eventId);
    const ids = allIds(def);
    const filled = ids.filter(id => data[id] && data[id].winner).length;
    const allFilled = ids.length && filled === ids.length;
    const ptAlready = S.points.some(p=>p.eventId===eventId && p.type==='bracket');
    const lines = (def.routes||[]).map(route => {
      const fromCard = layout.cards[route.from];
      if(!fromCard) return '';
      let out = '';
      if(route.winner && layout.cards[route.winner[0]]) out += `<path d="${routePath(fromCard, layout.cards[route.winner[0]], route.winner[1])}" />`;
      if(route.loser && layout.cards[route.loser[0]]) out += `<path d="${routePath(fromCard, layout.cards[route.loser[0]], route.loser[1])}" />`;
      return out;
    }).join('');
    const cards = Object.entries(layout.cards).map(([mid, pos]) => renderCustomCard(eventId, mid, data, pos)).join('');
    const labels = layout.labels.map(lbl => `<div class="iss-bracket-round" style="left:${lbl.x}px;top:${lbl.y}px">${lbl.text}</div>`).join('');
    const sections = layout.sections.map(sec => `<div class="iss-bracket-sec ${sec.cls||''}" style="left:${sec.x}px;top:${sec.y}px">${sec.text}</div>`).join('');
    return `<div class="card iss-bracket-shell">
      <div class="card-title">${def.name}<span style="font-size:10px;color:var(--text2);font-weight:400">${filled}/${ids.length} matches filled</span><div style="margin-left:auto;display:flex;gap:8px;flex-wrap:wrap"><button class="btn btn-ghost btn-xs" onclick="clearBracket('${eventId}')">Clear</button>${!ptAlready&&allFilled?`<button class="btn btn-success btn-sm" onclick="awardBracketPoints('${eventId}')">🏆 Award Points</button>`:''}</div></div>
      <div class="iss-bracket-help">Click any matchup card to edit teams or scores. Downstream slots redraw after every save.</div>
      <div class="iss-bracket-scroll"><div class="iss-bracket-stage" style="width:${layout.width}px;height:${layout.height}px">${sections}${labels}<svg class="iss-bracket-svg" width="${layout.width}" height="${layout.height}" viewBox="0 0 ${layout.width} ${layout.height}" preserveAspectRatio="none">${lines}</svg>${cards}</div></div>
    </div>`;
  }

    if(el){

<script>
(function(){
  const M1_URL = './brackets/major-1.html';
  const M2_URL = './brackets/major-2.html';
  function embeddedCard(title, url){
    return `<div class="card iss-bracket-shell">
      <div class="card-title" style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;">
        <span>${title}<span style="font-size:10px;color:var(--text2);font-weight:400;margin-left:6px;">interactive embedded bracket</span></span>
        <button type="button" class="btn ghost" onclick="window.toggleBracketFullscreen(this)" style="padding:6px 10px;font-size:11px;line-height:1.1;">⛶ Full screen</button>
      </div>
      <div class="iss-bracket-help">Drag to pan · Scroll to zoom · Hover a team to trace their path.</div>
      <div class="iss-embed-frame" data-bracket-embed style="position:relative;border:1px solid rgba(255,255,255,.08);border-radius:14px;overflow:hidden;background:#060b07;min-height:720px;box-shadow:0 16px 40px rgba(0,0,0,.28)">
        <iframe title="${title}" allowfullscreen style="display:block;width:100%;height:720px;border:0;background:#060b07;" src="${url}"></iframe>
      </div>
    </div>`;
  }
  window.toggleBracketFullscreen = async function(btn){
    const shell = btn && btn.closest('.iss-bracket-shell');
    const frame = shell && shell.querySelector('[data-bracket-embed]');
    if (!frame) return;
    try {
      if (document.fullscreenElement === frame) {
        await document.exitFullscreen();
      } else {
        await frame.requestFullscreen();
      }
    } catch (err) {
      console.warn('Fullscreen request failed', err);
    }
  };
  document.addEventListener('fullscreenchange', () => {
    document.querySelectorAll('.iss-bracket-shell').forEach(shell => {
      const frame = shell.querySelector('[data-bracket-embed]');
      const btn = shell.querySelector('button[onclick*="toggleBracketFullscreen"]');
      const active = frame && document.fullscreenElement === frame;
      if (btn) btn.textContent = active ? '× Exit full screen' : '⛶ Full screen';
      if (frame) {
        const ifr = frame.querySelector('iframe');
        if (active) {
          frame.style.borderRadius = '0';
          frame.style.minHeight = '100vh';
          if (ifr) ifr.style.height = '100vh';
        } else {
          frame.style.borderRadius = '14px';
          frame.style.minHeight = '720px';
          if (ifr) ifr.style.height = '720px';
        }
      }
    });
  });
  const original = window.renderBracketPanel;
  window.renderBracketPanel = function(eventId){
    if(eventId==='M1T') return embeddedCard('Major 1 Tournament', M1_URL);
    if(eventId==='M2T') return embeddedCard('Major 2 Tournament', M2_URL);
    return typeof original === 'function' ? original(eventId) : '';
  };
  function rerenderOpenBrackets(){
    try {
      if (typeof render === 'function') render();
    } catch(e) { console.warn('Bracket rerender patch warning', e); }
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', rerenderOpenBrackets, {once:true});
  } else {
    setTimeout(rerenderOpenBrackets, 0);
  }
  setTimeout(rerenderOpenBrackets, 150);
})();
</script>
