// PHASE 2 — AI SCREENSHOT PARSING
// ══════════════════════════════════════════════════════════════════

const AI = {
  screenshots: [], // [{file, dataUrl, label}]
  parsing: false,
  lastResults: null,
};

// ── FILE HANDLING ──────────────────────────────────────────────────
function handleScreenshotDrop(e){
  e.preventDefault();
  document.getElementById('ai-dropzone')?.classList.remove('drag');
  const files = Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith('image/'));
  if(files.length) ingestScreenshots(files);
}

function handleScreenshotFiles(fileList){
  const files = Array.from(fileList).filter(f=>f.type.startsWith('image/'));
  if(files.length) ingestScreenshots(files);
}

async function ingestScreenshots(files){
  for(const file of files){
    const dataUrl = await readFileAsDataURL(file);
    // Auto-label by filename
    const name = file.name.replace(/\.[^.]+$/,'').replace(/_/g,' ');
    AI.screenshots.push({file, dataUrl, name});
  }
  refreshScreenshotUI();
}

function readFileAsDataURL(file){
  return new Promise(res=>{
    const r=new FileReader();
    r.onload=e=>res(e.target.result);
    r.readAsDataURL(file);
  });
}

function refreshScreenshotUI(){
  const thumbRow = document.getElementById('ss-thumbs');
  const countEl  = document.getElementById('ai-file-count');
  const parseBtn = document.getElementById('ai-parse-btn');
  if(!thumbRow) return;

  if(AI.screenshots.length===0){
    thumbRow.style.display='none';
    thumbRow.innerHTML='';
    if(countEl) countEl.textContent='0 screenshots loaded';
    if(parseBtn) parseBtn.disabled=true;
    return;
  }

  thumbRow.style.display='flex';
  thumbRow.innerHTML = AI.screenshots.map((ss,i)=>`
    <div class="ai-thumb" title="${U.escHTML(ss.name)}">
      <img src="${ss.dataUrl}" alt="${U.escHTML(ss.name)}">
      <div class="ai-thumb-lbl">${U.escHTML(ss.name.slice(0,12))}</div>
      <button class="ai-thumb-rm" onclick="removeScreenshot(${i})">✕</button>
    </div>`).join('');

  if(countEl) countEl.textContent=`${AI.screenshots.length} screenshot${AI.screenshots.length!==1?'s':''} loaded`;
  if(parseBtn) parseBtn.disabled=false;
}

function removeScreenshot(i){
  AI.screenshots.splice(i,1);
  refreshScreenshotUI();
}

function clearScreenshots(){
  AI.screenshots=[];
  AI.lastResults=null;
  refreshScreenshotUI();
  const pa=document.getElementById('parse-progress-area');
  const ra=document.getElementById('parse-results-area');
  if(pa) pa.innerHTML='';
  if(ra) ra.innerHTML='';
}

// ── MAIN PARSE ORCHESTRATOR ────────────────────────────────────────
async function runAIParse(){
  if(AI.parsing || AI.screenshots.length===0) return;

  const apiKey = await DB.getSetting('anthropic_api_key','');
  if(!apiKey){
    toast('No API key set — go to Settings to add your Anthropic API key','err',5000);
    return;
  }

  AI.parsing=true;
  document.getElementById('ai-parse-btn').disabled=true;
  document.getElementById('parse-results-area').innerHTML='';

  const steps=[
    {id:'s1', label:'Reading screenshots with Claude Vision'},
    {id:'s2', label:'Extracting player stats & map data'},
    {id:'s3', label:'Matching players to CDL rosters'},
    {id:'s4', label:'Building form data'},
  ];
  showProgress(steps, 's1');

  try {
    // Build context about known teams/rosters for the prompt
    const rosterContext = TEAMS.map(t=>{
      const ps=S.players.filter(p=>p.teamId===t.id&&p.active).map(p=>p.name);
      return `${t.name} (${t.abbr}): ${ps.join(', ')}`;
    }).join('\n');

    const mapContext = Object.entries(MAPS).map(([mode,maps])=>
      `${MODE_LABEL[mode]}: ${maps.join(', ')}`).join('\n');

    const systemPrompt = `You are a CDL (Call of Duty League) 2026 stats analyst. You extract match data from CDL scoreboard screenshots with high accuracy.

KNOWN CDL 2026 TEAMS AND ACTIVE ROSTERS:
${rosterContext}

KNOWN MAP POOL:
${mapContext}

GAME MODES: HP (Hardpoint), SND (Search & Destroy), OL (Overload)

You will receive one or more CDL match screenshots. Extract ALL visible match data and return a single JSON object. Be precise with numbers — read them carefully from the image.`;

    const userPrompt = `Analyze these CDL match screenshot(s) and extract all match data.

Return ONLY valid JSON in this exact structure (no markdown, no explanation):
{
  "team1": { "name": "...", "id_guess": "..." },
  "team2": { "name": "...", "id_guess": "..." },
  "series_score": { "team1": 0, "team2": 0 },
  "maps": [
    {
      "map_num": 1,
      "mode": "HP",
      "map_name": "Hardpoint map name or null",
      "score_team1": 250,
      "score_team2": 180,
      "winner": "team1",
      "duration_minutes": null,
      "players": [
        { "name": "PlayerName", "team": "team1", "kills": 30, "deaths": 20, "damage": 4500, "assists": 2 }
      ]
    }
  ],
  "confidence": "high|medium|low",
  "notes": "any issues or uncertainties"
}

Rules:
- team must be "team1" or "team2" for each player
- mode must be exactly "HP", "SND", or "OL"
- If a stat isn't visible, use null
- Match player names to the known CDL rosters above
- If you see a series overview screenshot, extract all map results from it
- confidence = "high" if you can read all stats clearly, "medium" if some are unclear, "low" if very unclear`;

    // Prepare image content blocks
    const imageBlocks = AI.screenshots.map(ss=>{
      const [header, b64] = ss.dataUrl.split(',');
      const mediaType = header.includes('png')?'image/png':header.includes('webp')?'image/webp':'image/jpeg';
      return { type:'image', source:{ type:'base64', media_type:mediaType, data:b64 } };
    });

    setStep(steps,'s2');

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'x-api-key':apiKey, 'anthropic-version':'2023-06-01', 'anthropic-dangerous-direct-browser-access':'true' },
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:4000,
        system: systemPrompt,
        messages:[{
          role:'user',
          content:[
            ...imageBlocks,
            { type:'text', text: userPrompt }
          ]
        }]
      })
    });

    if(!response.ok){
      const err=await response.json().catch(()=>({}));
      throw new Error(err.error?.message || `API error ${response.status}`);
    }

    const data = await response.json();
    const rawText = data.content.map(b=>b.type==='text'?b.text:'').join('');

    setStep(steps,'s3');

    // Parse JSON — strip markdown fences if present
    let parsed;
    try {
      const clean = rawText.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
      parsed = JSON.parse(clean);
    } catch(e){
      // Try to extract JSON from the text
      const match = rawText.match(/\{[\s\S]*\}/);
      if(match) parsed=JSON.parse(match[0]);
      else throw new Error('Could not parse Claude response as JSON');
    }

    setStep(steps,'s4');

    // Match team IDs
    const resolveTeam=(nameGuess, idGuess)=>{
      if(idGuess){ const t=TEAMS.find(t=>t.id===idGuess); if(t) return t.id; }
      if(nameGuess){
        const q=nameGuess.toLowerCase();
        const t=TEAMS.find(t=>t.name.toLowerCase().includes(q)||q.includes(t.name.toLowerCase())||t.abbr.toLowerCase()===q);
        if(t) return t.id;
      }
      return null;
    };

    const t1id=resolveTeam(parsed.team1?.name, parsed.team1?.id_guess);
    const t2id=resolveTeam(parsed.team2?.name, parsed.team2?.id_guess);

    // Match players to roster IDs — include inactive, they still played matches
    const allPlayers=S.players;
    const matchPlayer=(name)=>{
      if(!name) return null;
      const q=name.toLowerCase().trim();
      // Exact match first, then partial
      return allPlayers.find(p=>p.name.toLowerCase()===q)
          || allPlayers.find(p=>p.name.toLowerCase().includes(q)||q.includes(p.name.toLowerCase()));
    };

    const result = {
      raw: parsed,
      t1id, t2id,
      t1name: parsed.team1?.name||'Team 1',
      t2name: parsed.team2?.name||'Team 2',
      series: parsed.series_score,
      confidence: parsed.confidence||'medium',
      notes: parsed.notes,
      maps: (parsed.maps||[]).map(m=>({
        ...m,
        players: (m.players||[]).map(p=>({
          ...p,
          resolvedPlayer: matchPlayer(p.name),
        }))
      }))
    };

    AI.lastResults = result;
    doneProgress(steps);
    showParsedResults(result);

  } catch(e){
    console.error('AI Parse error:', e);
    errorProgress(steps, e.message);
    toast('Parse failed: '+e.message,'err',6000);
  } finally {
    AI.parsing=false;
    const btn=document.getElementById('ai-parse-btn');
    if(btn) btn.disabled=AI.screenshots.length===0;
  }
}

function setStep(steps, activeId){
  steps.forEach(s=>{
    const el=document.getElementById('pstep-'+s.id);
    if(!el) return;
    if(s.id===activeId) el.className='parse-step active';
    else if(steps.indexOf(s)<steps.findIndex(st=>st.id===activeId)) el.className='parse-step done';
  });
}

function doneProgress(steps){
  steps.forEach(s=>{
    const el=document.getElementById('pstep-'+s.id);
    if(el) el.className='parse-step done';
  });
}

function errorProgress(steps, msg){
  steps.forEach(s=>{
    const el=document.getElementById('pstep-'+s.id);
    if(!el) return;
    if(el.className.includes('active')) el.className='parse-step err';

// ── APPLY PARSED DATA TO FORM ─────────────────────────────────────
function applyParsedData(teamsOnly=false){
  const result=AI.lastResults;
  if(!result){ toast('No parsed data to apply','err'); return; }

  const st=S.addMatch;

  // Apply teams
  if(result.t1id) st.team1=result.t1id;
  if(result.t2id) st.team2=result.t2id;

  if(teamsOnly){ renderAddMatch(); toast('Teams applied — fill in map data manually','info'); return; }

  // Apply maps
  if(result.maps && result.maps.length>0){
    st.maps=[];
    result.maps.forEach((m,i)=>{
      const mapEntry={
        mode: m.mode||'HP',
        mapName: m.map_name||'',
        score1: m.score_team1??null,
        score2: m.score_team2??null,
        duration: m.duration_minutes||null,
      };

      // Apply player stats
      (m.players||[]).forEach(p=>{
        if(!p.resolvedPlayer) return;
        const pid=p.resolvedPlayer.id;
        const inT1=p.resolvedPlayer.teamId===result.t1id;
        const side=inT1?'t1':'t2';
        if(p.kills!=null)   mapEntry[`${side}_${pid}_k`]=p.kills;
        if(p.deaths!=null)  mapEntry[`${side}_${pid}_d`]=p.deaths;
        if(p.damage!=null)  mapEntry[`${side}_${pid}_dmg`]=p.damage;
        if(p.assists!=null) mapEntry[`${side}_${pid}_ast`]=p.assists;
      });

      st.maps.push(mapEntry);
    });
  }

  renderAddMatch();

  const matchedPlayers=result.maps.flatMap(m=>m.players).filter(p=>p.resolvedPlayer).length;
  const totalPlayers=result.maps.flatMap(m=>m.players).length;
  const unmatched=totalPlayers-matchedPlayers;

  toast(`Applied! ${result.maps.length} maps · ${matchedPlayers}/${totalPlayers} players matched${unmatched>0?' · '+unmatched+' unmatched (enter manually)':''}`, 'ok', 5000);

  if(unmatched>0){
    setTimeout(()=>toast(`Unmatched players: check rosters or add them in Roster Management`,'info',5000),500);
  }
}

function handleBulkFolderDrop(e){

function handleBulkFolderInput(fileList){
  const files = Array.from(fileList).filter(f=>f.type.startsWith('image/'));
  ingestBulkFiles(files);
}

function ingestBulkFiles(files){
  // Group by immediate parent folder (using webkitRelativePath if available, else filename prefix)
  const groups = {};
  for(const file of files){
    let key, label;
    if(file.webkitRelativePath && file.webkitRelativePath.includes('/')){
      // Use everything except the filename as the folder key
      const parts = file.webkitRelativePath.split('/');
      const folderParts = parts.slice(0,-1);
      // Use innermost folder as label (the match folder)
      label = folderParts[folderParts.length-1];
      // Use full path minus filename as key for unique grouping
      key = folderParts.join('/');
    } else {
      // Dragged files without path — group into one "ungrouped" set
      key = 'ungrouped';
      label = 'Uploaded Files';
    }
    if(!groups[key]) groups[key]={label, files:[]};
    groups[key].files.push(file);
  }

  // Sort each group's files: Map 1, Map 2, ... then Overview last
  for(const g of Object.values(groups)){
    g.files.sort((a,b)=>{
      const an=a.name.toLowerCase(), bn=b.name.toLowerCase();
      const isOvA = an.includes('overview')||an.includes('series')||an.includes('match');
      const isOvB = bn.includes('overview')||bn.includes('series')||bn.includes('match');
      if(isOvA && !isOvB) return 1;
      if(isOvB && !isOvA) return -1;
      const numA = parseInt(an.match(/(\d+)/)?.[1]||'99');
      const numB = parseInt(bn.match(/(\d+)/)?.[1]||'99');
      return numA - numB;
    });
  }

  // Sort groups by key (alphabetical = date-ordered)
  const sortedKeys = Object.keys(groups).sort();

  // Merge into queue (skip already queued keys)
  const existingKeys = new Set(BULK.queue.map(q=>q.folderKey));
  let added = 0;
  for(const key of sortedKeys){
    if(existingKeys.has(key)) continue;
    BULK.queue.push({
      id: 'bq_'+Date.now()+'_'+(Math.random()*1e6|0),
      folderKey: key,
      folderLabel: groups[key].label,
      files: groups[key].files,
      status: 'pending',
      parsed: null,
      edited: null,
      error: null,
      validationError: null,
      isGrandFinal: BULK.grandFinalMode,
    });
    added++;
  }

  renderAddMatch();
  if(added > 0) toast(`${added} series loaded from folder`,'ok');
}

// ── WIN CONDITION VALIDATION ───────────────────────────────────────
function validateBulkSeries(parsed, isGrandFinal=false){
  const maps = parsed.maps || [];
  if(maps.length === 0) return {valid:false, error:'No maps found in parsed data'};
  const t1w = maps.filter(m=>m.winner==='team1').length;
  const t2w = maps.filter(m=>m.winner==='team2').length;
  const winsNeeded = isGrandFinal ? 4 : 3;
  const maxMaps   = isGrandFinal ? 7 : 5;
  const haswinner  = t1w===winsNeeded || t2w===winsNeeded;
  if(!haswinner) return {valid:false, error:`No winner yet — ${t1w}–${t2w} (need ${winsNeeded} wins)`};
  if(t1w>winsNeeded||t2w>winsNeeded) return {valid:false, error:`Too many wins — ${t1w}–${t2w}`};
  if(maps.length > maxMaps) return {valid:false, error:`Too many maps (${maps.length}) for ${isGrandFinal?'BO7':'BO5'}`};
  if(!parsed.t1id) return {valid:false, error:`Team 1 not matched to CDL roster — edit to assign`};
  if(!parsed.t2id) return {valid:false, error:`Team 2 not matched to CDL roster — edit to assign`};
  return {valid:true};
}

// ── BULK PARSE ORCHESTRATOR ────────────────────────────────────────
async function runBulkParse(){
  if(BULK.parsing) return;
  const apiKey = await DB.getSetting('anthropic_api_key','');
  if(!apiKey){ toast('No API key — go to Settings','err',5000); return; }
  if(!BULK.event){ toast('Select an event first','err'); return; }

  BULK.parsing = true;
  renderAddMatch();

  const pending = BULK.queue.filter(q=>q.status==='pending');
  let done = 0;
  const total = pending.length;

  for(const item of pending){
    if(!BULK.parsing) break; // user stopped

    item.status = 'parsing';
    refreshBQCard(item.id);
    showBulkProgress(done, total, item.folderLabel);

    try {
      const result = await parseSingleSeries(item, apiKey);
      const validation = validateBulkSeries(result, item.isGrandFinal);
      item.parsed = result;
      if(validation.valid){
        item.status = 'valid';
        item.validationError = null;
      } else {
        item.status = 'review';
        item.validationError = validation.error;
      }
    } catch(e){
      item.status = 'error';
      item.error = e.message || 'Parse failed';
    }

    done++;
    refreshBQCard(item.id);
    // Brief pause between API calls to avoid rate limiting
    if(done < total) await new Promise(r=>setTimeout(r, 600));
  }

  BULK.parsing = false;
  hideBulkProgress();
  renderAddMatch();
  const v=BULK.queue.filter(q=>q.status==='valid').length;
  const r=BULK.queue.filter(q=>q.status==='review').length;
  const err=BULK.queue.filter(q=>q.status==='error').length;
  toast(`Bulk parse complete: ${v} valid · ${r} need review · ${err} errors`, 'ok', 6000);
}

async function parseSingleSeries(item, apiKey){
  const rosterCtx = TEAMS.map(t=>{
    const ps=S.players.filter(p=>p.teamId===t.id&&p.active).map(p=>p.name);
    return `${t.name} (${t.abbr}): ${ps.join(', ')}`;
  }).join('\n');

  const mapCtx = Object.entries(MAPS).map(([mode,maps])=>`${MODE_LABEL[mode]}: ${maps.join(', ')}`).join('\n');
  const winsNeeded = item.isGrandFinal ? 4 : 3;
  const formatName = item.isGrandFinal ? 'Best of 7' : 'Best of 5';

  const systemPrompt = `You are a CDL 2026 stats analyst parsing match screenshots from ONE single series.

KNOWN TEAMS AND ROSTERS:
${rosterCtx}

MAP POOL:
${mapCtx}

GAME MODES: HP (Hardpoint), SND (Search & Destroy), OL (Overload)
MAP ORDER IN ${formatName}: ${item.isGrandFinal?'HP, SND, OL, HP, SND, OL, SND':'HP, SND, OL, HP, SND'}
WIN CONDITION: First to ${winsNeeded} map wins. Series ends when one team reaches ${winsNeeded} wins.

CRITICAL RULES:
- Only parse maps you can actually see screenshots for. Do NOT invent maps.
- Track wins as you go. Stop at ${winsNeeded} wins — do not add more maps after win condition is met.
- If you see a "Match Overview" or "Series Stats" screenshot, use it to verify scores but still parse individual maps.
- Return ONLY valid JSON, no markdown fences.`;

  const userPrompt = `Parse this ${formatName} CDL series. These ${item.files.length} screenshots are ALL from ONE match between TWO teams.

Return this exact JSON structure:
{
  "team1": {"name": "...", "id_guess": "..."},
  "team2": {"name": "...", "id_guess": "..."},
  "series_score": {"team1": 0, "team2": 0},
  "maps": [
    {
      "map_num": 1,
      "mode": "HP",
      "map_name": "...",
      "score_team1": 250,
      "score_team2": 180,
      "winner": "team1",
      "players": [
        {"name": "PlayerName", "team": "team1", "kills": 30, "deaths": 20, "damage": 4500, "assists": 0}
      ]
    }
  ],
  "confidence": "high|medium|low",
  "notes": "..."
}

Rules:
- winner must be "team1" or "team2" — whichever scored more (HP) or had more rounds won (SND/OL)
- Only include maps with visible screenshots
- Match all player names to the known CDL rosters above`;

  // Convert files to base64
  const imageBlocks = await Promise.all(item.files.map(async file=>{
    const dataUrl = await readFileAsDataURL(file);
    const [header, b64] = dataUrl.split(',');
    const mediaType = header.includes('png')?'image/png':header.includes('webp')?'image/webp':'image/jpeg';
    return {type:'image', source:{type:'base64', media_type:mediaType, data:b64}};
  }));

  const response = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key': apiKey,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true',
    },
    body: JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:4000,
      system: systemPrompt,
      messages:[{role:'user', content:[...imageBlocks,{type:'text',text:userPrompt}]}],
    })
  });

  if(!response.ok){
    const err=await response.json().catch(()=>({}));
    throw new Error(err.error?.message||`API error ${response.status}`);
  }

  const data = await response.json();
  const rawText = data.content.map(b=>b.type==='text'?b.text:'').join('');
  let parsed;
  try {
    const clean = rawText.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
    parsed = JSON.parse(clean);
  } catch {
    const match = rawText.match(/\{[\s\S]*\}/);
    if(match) parsed = JSON.parse(match[0]);
    else throw new Error('Could not parse Claude response as JSON');
  }

  // Resolve team IDs
  const resolveTeam=(nameGuess,idGuess)=>{
    if(idGuess){const t=TEAMS.find(t=>t.id===idGuess);if(t)return t.id;}
    if(nameGuess){
      const q=nameGuess.toLowerCase();
      return TEAMS.find(t=>t.name.toLowerCase().includes(q)||q.includes(t.name.toLowerCase())||t.abbr.toLowerCase()===q)?.id||null;
    }
    return null;
  };

  const allPlayers = S.players; // include inactive
  const matchPlayer=(name)=>{
    if(!name) return null;
    const q=name.toLowerCase().trim();
    return allPlayers.find(p=>p.name.toLowerCase()===q)||allPlayers.find(p=>p.name.toLowerCase().includes(q)||q.includes(p.name.toLowerCase()));
  };

  const t1id=resolveTeam(parsed.team1?.name,parsed.team1?.id_guess);
  const t2id=resolveTeam(parsed.team2?.name,parsed.team2?.id_guess);

  return {
    raw:parsed, t1id, t2id,
    t1name:parsed.team1?.name||'Team 1',
    t2name:parsed.team2?.name||'Team 2',
    confidence:parsed.confidence,
    notes:parsed.notes,
    maps:(parsed.maps||[]).map(m=>({
      ...m,
      players:(m.players||[]).map(p=>({...p, resolvedPlayer:matchPlayer(p.name)})),
    })),
  };
}

  try {
    await commitBQItem(item);
    item.status='saved';

// ── SAVE ALL VALID ─────────────────────────────────────────────────
async function bulkSaveAll(){
  const valid = BULK.queue.filter(q=>q.status==='valid');
  if(valid.length===0){ toast('No valid series to save','err'); return; }
  if(!confirm(`Save all ${valid.length} validated series? This cannot be undone.`)) return;
  let saved=0, failed=0;
  for(const item of valid){
    try {
      await commitBQItem(item);
      item.status='saved';
      refreshBQCard(item.id);
      saved++;
    } catch(e){
      item.status='error'; item.error=e.message;
      refreshBQCard(item.id);
      failed++;
    }
  }
  await S.loadAll();
  renderAddMatch();
  toast(`Saved ${saved} series${failed>0?` · ${failed} failed`:''}`, saved>0?'ok':'err', 5000);
}

async function commitBQItem(item){
  const p = item.edited || item.parsed;
  const maps = p.maps || [];

  // Commit to DB
  const matchId = await DB.add('matches',{
    eventId: BULK.event,
    date: item.folderKey.match(/\d{4}-\d{2}-\d{2}/)?.[0] || new Date().toISOString().slice(0,10),
    format: item.isGrandFinal ? 'BO7' : 'BO5',
    team1Id: p.t1id,
    team2Id: p.t2id,
    ts: Date.now(),
  });

  for(let i=0;i<maps.length;i++){
    const m = maps[i];
    const s1=m.score_team1||0, s2=m.score_team2||0;
    const winner = m.winner==='team1'?p.t1id:m.winner==='team2'?p.t2id:null;
    const mapId = await DB.add('maps',{
      matchId, mapNum:i+1, mode:m.mode||'HP',
      mapName:m.map_name||'Unknown', score1:s1, score2:s2,
      winner, duration:null, ts:Date.now(),
    });
    // Player stats
    for(const pl of (m.players||[])){
      if(!pl.resolvedPlayer) continue;
      const side = pl.team==='team1'?p.t1id:p.t2id;
      const k=pl.kills||0, d=pl.deaths||0;
      if(k||d) await DB.add('pstats',{mapId, playerId:pl.resolvedPlayer.id, teamId:side, kills:k, deaths:d, damage:pl.damage||null, assists:pl.assists||null, ts:Date.now()});
    }
  }

  // Auto-award qualifier stage wins
  const ev = U.event(BULK.event);
  if(ev.type==='qualifiers'){
    const t1w=maps.filter(m=>m.winner==='team1').length;
    const t2w=maps.filter(m=>m.winner==='team2').length;
    const winsNeeded = item.isGrandFinal?4:3;
    const winnerId = t1w===winsNeeded?p.t1id:t2w===winsNeeded?p.t2id:null;
    if(winnerId){
      await DB.add('points',{teamId:winnerId,eventId:BULK.event,reason:'Qualifier Stage Win',pts:10,type:'qualWin',ts:Date.now()});
    }
  }
}

function refreshBracketPanel(eventId){
  const el = document.getElementById('bp-'+eventId);
  if(!el) return;
  // re-render using the renderBracketPanel function from inside renderStandings context

  const allMatchIds = [...def.winners.flatMap(r=>r.matches),...(def.losers||[]).flatMap(r=>r.matches)].map(m=>m.id);

  const ptAlreadyAwarded = S.points.some(p=>p.eventId===eventId&&p.type==='bracket');

  const renderBracketMatch=(m)=>{
    const d=bData[m.id]||{};
    const t1=d.t1||null,t2=d.t2||null,w=d.winner||null;

        <span class="bt-score" style="color:${w===t1?'var(--green)':w?'var(--text3)':'var(--text2)'}">${t1score!==''?t1score:'—'}</span>
      </div>
      <div class="bt ${w===t2?'bw':w&&w!==t2?'bl':''}" style="border-left:2px solid ${t2col}">
        <span class="bt-name" style="color:${t2col}">${t2?U.logoHTML(t2,'t-logo')+'&nbsp;':''}<span style="font-size:11px">${t2name}</span></span>

      ${r.matches.map(renderBracketMatch).join('')}

      ${r.matches.map(()=>'<div style="height:2px;background:var(--border)"></div>').join('')}
    </div>`).join('');

  el.innerHTML=`<div class="card">
    <div class="card-title">${def.name}
      <span style="font-size:10px;color:var(--text2);font-weight:400">${filledCount}/${allMatchIds.length} matches filled</span>
      <div style="margin-left:auto;display:flex;gap:8px">
        <button class="btn btn-ghost btn-xs" onclick="clearBracket('${eventId}')">Clear</button>
        ${!ptAlreadyAwarded&&allFilled?`<button class="btn btn-success btn-sm" onclick="awardBracketPoints('${eventId}')">🏆 Award Points</button>`:''}
        ${ptAlreadyAwarded?`<span class="pill pill-w" style="font-size:10px">✓ Points Awarded</span>`:''}
      </div>
    </div>
    <div class="info-box text-sm" style="margin-bottom:12px">Click any match slot to enter teams and results · Points are awarded once all matches are filled</div>
    <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--cyan);padding:4px 0 8px">WINNERS BRACKET</div>
    <div class="bracket-scroll"><div class="bracket">${buildCols(def.winners)}</div></div>
    ${def.losers&&def.losers.length?`
    <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--red);padding:12px 0 6px">LOSERS BRACKET</div>
    <div class="bracket-scroll"><div class="bracket">${buildCols(def.losers)}</div></div>`:''}
  </div>`;
  U.updateLogos();

function openBracketMatchEdit(eventId, matchId){
  if(!S._bracketData) S._bracketData={};
  if(!S._bracketData[eventId]) S._bracketData[eventId]={};
  const d = S._bracketData[eventId][matchId]||{};
  const def = BRACKET_DEFS[eventId];
  // Find the match label
  const allMatches = [...def.winners.flatMap(r=>r.matches),...(def.losers||[]).flatMap(r=>r.matches)];
  const matchDef = allMatches.find(m=>m.id===matchId)||{label:matchId};
  const isGF = matchDef.isGF||false;

  const teamOpts=(sel='')=>`<option value="">— TBD —</option>`+TEAMS.map(t=>`<option value="${t.id}" ${t.id===sel?'selected':''}>${t.name}</option>`).join('');
  const winsNeeded = isGF?4:3;
  const maxScore = isGF?7:5;

  Modal.open(`
    <div class="modal-hd">
      <h3>Match: ${matchDef.label} ${isGF?'(Grand Finals – BO7)':'(BO5)'}</h3>
      <button class="btn btn-ghost btn-xs" onclick="Modal.close()">✕</button>
    </div>
    <div class="modal-bd">
      <div class="g2">
        <div class="fg"><label>Team 1</label><select id="bme-t1">${teamOpts(d.t1)}</select></div>
        <div class="fg"><label>Team 2</label><select id="bme-t2">${teamOpts(d.t2)}</select></div>
      </div>
      <div class="g2">
        <div class="fg"><label>Team 1 Map Wins</label>
          <input type="number" id="bme-s1" min="0" max="${maxScore}" value="${d.score1??''}" placeholder="0–${winsNeeded}">
        </div>
        <div class="fg"><label>Team 2 Map Wins</label>
          <input type="number" id="bme-s2" min="0" max="${maxScore}" value="${d.score2??''}" placeholder="0–${winsNeeded}">
        </div>
      </div>
      <div class="fg"><label>Winner</label>
        <select id="bme-winner">
          <option value="">— Select Winner —</option>
          <option value="t1" ${d.winner&&d.winner===d.t1?'selected':''}>Team 1 (left)</option>
          <option value="t2" ${d.winner&&d.winner===d.t2?'selected':''}>Team 2 (right)</option>
        </select>
      </div>
      <div class="text-sm text-muted">Win condition: first to ${winsNeeded} map wins${isGF?' (Grand Finals)':''}</div>
      <div id="bme-error" class="text-sm" style="color:var(--red);margin-top:6px"></div>
    </div>
    <div class="modal-ft">
      <button class="btn btn-ghost" onclick="Modal.close()">Cancel</button>
      <button class="btn btn-danger btn-xs" onclick="clearBracketMatch('${eventId}','${matchId}')">Clear</button>
      <button class="btn btn-primary" onclick="saveBracketMatch('${eventId}','${matchId}',${isGF})">Save</button>
    </div>`);
}

async function saveBracketMatch(eventId, matchId, isGF){
  const t1sel = document.getElementById('bme-t1').value;
  const t2sel = document.getElementById('bme-t2').value;
  const s1 = parseInt(document.getElementById('bme-s1').value)||0;
  const s2 = parseInt(document.getElementById('bme-s2').value)||0;
  const winnerSel = document.getElementById('bme-winner').value;
  const errEl = document.getElementById('bme-error');
  const winsNeeded = isGF?4:3;

  // Validation
  if(!t1sel||!t2sel){ errEl.textContent='Select both teams'; return; }
  if(t1sel===t2sel){ errEl.textContent='Teams must be different'; return; }
  if(!winnerSel){ errEl.textContent='Select a winner'; return; }
  const winnerId = winnerSel==='t1'?t1sel:t2sel;
  const w1=winnerSel==='t1'?s1:s2, w2=winnerSel==='t2'?s1:s2;
  const maxWins=Math.max(w1,w2);
  if(maxWins!==winsNeeded){ errEl.textContent=`Winner must have exactly ${winsNeeded} wins (got ${maxWins})`; return; }
  if(Math.min(w1,w2)<0){ errEl.textContent='Scores cannot be negative'; return; }

  if(!S._bracketData) S._bracketData={};
  if(!S._bracketData[eventId]) S._bracketData[eventId]={};
  S._bracketData[eventId][matchId]={t1:t1sel,t2:t2sel,score1:s1,score2:s2,winner:winnerId};
  await saveBracketData(eventId);
  Modal.close();
  refreshBracketPanel(eventId);
  toast(`Match saved!`,'ok');
}

async function clearBracketMatch(eventId, matchId){
  if(!S._bracketData?.[eventId]) return;
  delete S._bracketData[eventId][matchId];
  await saveBracketData(eventId);
  Modal.close();
  refreshBracketPanel(eventId);
}

async function clearBracket(eventId){
  if(!confirm(`Clear all matches for ${BRACKET_DEFS[eventId]?.name||eventId}?`)) return;
  if(S._bracketData) S._bracketData[eventId]={};
  await saveBracketData(eventId);
  refreshBracketPanel(eventId);
  toast('Bracket cleared','info');
}


function deriveBracketPlacements(def, bData){
  const placements=[];
  const addPlacement=(teamId, pts, place, reason)=>{
    if(!teamId) return;
    if(placements.find(p=>p.teamId===teamId && p.reason===reason)) return;
    placements.push({teamId, pts, place, reason});
  };
  const loserOf=(md)=> md ? (md.winner===md.t1 ? md.t2 : md.t1) : '';
  if(Array.isArray(def.placements) && def.placements.length){
    for(const rule of def.placements){
      const ids = rule.match ? [rule.match] : (rule.matches||[]);
      for(const id of ids){
        const md = bData[id];
        if(!md || !md.winner || !md.t1 || !md.t2) continue;
        const teamId = rule.side==='winner' ? md.winner : loserOf(md);
        addPlacement(teamId, rule.pts ?? 0, rule.place || '', rule.reason || rule.place || 'Bracket Placement');
      }
    }
    return placements;
  }
  return placements;
}

async function awardBracketPoints(eventId){
  const def = BRACKET_DEFS[eventId];
  const bData = S._bracketData?.[eventId]||{};

  if(!def){ toast('Unknown event','err'); return; }

  // Verify all matches filled
  const allMatchIds = [...def.winners.flatMap(r=>r.matches),...(def.losers||[]).flatMap(r=>r.matches)].map(m=>m.id);
  const unfilled = allMatchIds.filter(mid=>!bData[mid]?.winner);
  if(unfilled.length>0){
    toast(`${unfilled.length} match(es) still need results before awarding points`,'err',4000);
    return;
  }
  const placements = deriveBracketPlacements(def, bData);
  if(placements.length===0){ toast('Could not derive any placements from bracket','err'); return; }

  const preview = placements.map(p=>`<div class="pa-row" style="padding:6px 0">
    ${U.logoHTML(p.teamId)} <strong>${U.team(p.teamId).name}</strong>
    <span class="text-muted">·</span> ${p.reason}
    <span class="pa-pts" style="margin-left:auto">+${p.pts} pts</span>
  </div>`).join('');

  Modal.open(`
    <div class="modal-hd"><h3>Award Bracket Points — ${U.event(eventId).name}</h3><button class="btn btn-ghost btn-xs" onclick="Modal.close()">✕</button></div>
    <div class="modal-bd">
      <p class="text-sm text-muted" style="margin-bottom:12px">The following CDL points will be awarded based on bracket results:</p>
      ${preview}
    </div>
    <div class="modal-ft">
      <button class="btn btn-ghost" onclick="Modal.close()">Cancel</button>
      <button class="btn btn-success" onclick="confirmAwardBracketPoints('${eventId}')">✅ Confirm & Award</button>
    </div>`);
  U.updateLogos();
}

async function confirmAwardBracketPoints(eventId){
  const def = BRACKET_DEFS[eventId];
  const bData = S._bracketData?.[eventId]||{};
  Modal.close();
  const placements = deriveBracketPlacements(def, bData);

  for(const p of placements){
    await DB.add('points',{teamId:p.teamId,eventId,reason:p.reason,pts:p.pts,type:'bracket',ts:Date.now()});
  }

  await S.loadAll();
  refreshBracketPanel(eventId);
  renderStandings(); // refresh standings table
  toast(`${placements.length} placements awarded for ${U.event(eventId).name}!`,'ok',4000);
}

boot();

  function winnerId(d){ return d?.winner || ''; }
  function loserId(d){ if(!d?.winner || !d.t1 || !d.t2) return ''; return d.winner===d.t1 ? d.t2 : d.t1; }
  function requiredWins(def, matchId){ const m=matchMap(def)[matchId]||{}; return m.isGF?4:3; }
  function allMatchIds(def){ return def.order ? def.order.slice() : matchDefs(def).map(m=>m.id); }

  function normalizeBracketState(eventId){
    const def = BRACKET_DEFS[eventId];
    if(!def) return {};
    const prev = (S._bracketData && S._bracketData[eventId]) ? structuredClone(S._bracketData[eventId]) : {};
    const next = {};
    for(const id of allMatchIds(def)) next[id] = {};

    for(const [mid, seed] of Object.entries(def.initial||{})){
      next[mid].t1 = seed.t1 || '';
      next[mid].t2 = seed.t2 || '';
    }

    const seededMatches = new Set(Object.keys(def.initial||{}));
    for(const mid of allMatchIds(def)){
      const p = prev[mid] || {};
      const cur = next[mid];
      // Only preserve manually selected teams on seeded/entry matches.
      // Downstream matches should be fully route-driven so stale team names cannot stick.
      if(seededMatches.has(mid)){
        if(!cur.t1 && p.t1) cur.t1 = p.t1;
        if(!cur.t2 && p.t2) cur.t2 = p.t2;
      }
      if(cur.t1===p.t1 && cur.t2===p.t2 && p.winner){
        cur.score1 = p.score1;
        cur.score2 = p.score2;
        cur.winner = p.winner;
      }
    }

    for(const route of def.routes||[]){
      const src = next[route.from] || {};
      if(route.winner){
        const [toId, slot] = route.winner;
        const value = winnerId(src);
        if(value) next[toId][slot] = value;
      }
      if(route.loser){
        const [toId, slot] = route.loser;
        const value = loserId(src);
        if(value) next[toId][slot] = value;
      }
    }

    for(const mid of allMatchIds(def)){
      const p = prev[mid] || {};
      const cur = next[mid];
      if(cur.t1===p.t1 && cur.t2===p.t2 && p.winner){
        cur.score1 = p.score1;
        cur.score2 = p.score2;
        cur.winner = p.winner;
      } else {
        delete cur.score1; delete cur.score2; delete cur.winner;
      }
    }

    if(!S._bracketData) S._bracketData = {};
    S._bracketData[eventId] = next;
    return next;
  }

  function bracketSummaryCards(eventId, def, bData){
    const gfId = def.winners?.flatMap(r=>r.matches).find(m=>m.isGF)?.id;
    if(!gfId) return '';
    const gf = bData[gfId] || {};
    const runnerUp = loserId(gf);
    const champion = winnerId(gf);
    const lastLoserMatch = (def.losers||[]).length ? def.losers[def.losers.length-1].matches[0]?.id : '';
    const penultimateLoserMatch = (def.losers||[]).length > 1 ? def.losers[def.losers.length-2].matches[0]?.id : '';
    const lf = bData[lastLoserMatch] || {};
    const esf = bData[penultimateLoserMatch] || {};
    const third = loserId(lf);
    const fourth = loserId(esf);
    return `<div style="display:flex;gap:10px;flex-wrap:wrap;margin:8px 0 14px">
      ${placementCard('Champion', champion, champion ? 'Click to jump to Grand Final' : 'Save the Grand Final to fill this box', eventId, gfId)}
      ${placementCard('Runner-Up', runnerUp, runnerUp ? 'Click to jump to Grand Final' : 'Filled from the Grand Final loser', eventId, gfId)}
      ${placementCard('3rd Place', third, third ? 'Click to jump to Elimination Final' : 'Filled from the elimination final loser', eventId, lastLoserMatch)}
      ${placementCard('4th Place', fourth, fourth ? 'Click to jump to Elimination Semi' : 'Filled from the elimination semi loser', eventId, penultimateLoserMatch)}
    </div>`;
  }

  window.renderBracketPanel = function(eventId){
    const def = BRACKET_DEFS[eventId];
    if(!def) return '';
    const bData = normalizeBracketState(eventId);
    const ids = allMatchIds(def);
    const filledCount = ids.filter(mid => !!bData[mid]?.winner).length;
    const allFilled = ids.every(mid => !!bData[mid]?.winner);
    const ptAlreadyAwarded = S.points.some(p=>p.eventId===eventId && p.type==='bracket');
    const buildCols = (rounds) => rounds.map(r=>`
      <div class="bracket-col">
        <div class="bracket-col-lbl">${r.round}</div>
        ${r.matches.map(m=>renderBracketMatchCard(eventId,m,bData)).join('')}
      </div>
      <div style="display:flex;flex-direction:column;justify-content:space-around;width:16px;min-width:16px">
        ${r.matches.map(()=>'<div style="height:2px;background:var(--border)"></div>').join('')}
      </div>`).join('');

    return `<div class="card" style="margin-top:14px">
      <div class="card-title">${def.name}
        <span style="font-size:10px;color:var(--text2);font-weight:400">${filledCount}/${ids.length} matches filled</span>
        <div style="margin-left:auto;display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-ghost btn-xs" onclick="clearBracket('${eventId}')">Clear</button>
          ${!ptAlreadyAwarded && allFilled ? `<button class="btn btn-success btn-sm" onclick="awardBracketPoints('${eventId}')">🏆 Award Points</button>` : ''}
          ${ptAlreadyAwarded ? `<span class="pill pill-w" style="font-size:10px">✓ Points Awarded</span>` : ''}
        </div>
      </div>
      <div class="info-box text-sm" style="margin-bottom:12px">Fill scores for the played match, pick the winner, and the next rounds auto-advance. Major 2 play-in winners auto-feed into the bracket. The placement boxes below update from the final rounds and you can click them to jump straight to that match.</div>
      ${bracketSummaryCards(eventId, def, bData)}
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--cyan);padding:4px 0 8px">WINNERS BRACKET</div>
      <div class="bracket-scroll"><div class="bracket">${buildCols(def.winners)}</div></div>
      ${(def.losers&&def.losers.length)?`<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--red);padding:12px 0 6px">ELIMINATION BRACKET</div><div class="bracket-scroll"><div class="bracket">${buildCols(def.losers)}</div></div>`:''}
    </div>`;
  };

  window.refreshBracketPanel = function(eventId){
    const el = document.getElementById('bp-'+eventId);
    if(!el) return;
    el.innerHTML = window.renderBracketPanel(eventId);
    U.updateLogos();
  };

  window.switchBracketPanel = function(eventId){
    const wrap = document.getElementById('st-brackets');
    if(!wrap) return;
    wrap.querySelectorAll('[data-bracket-btn]').forEach(btn => btn.classList.toggle('on', btn.dataset.bracketBtn===eventId));
    wrap.querySelectorAll('[data-bracket-panel]').forEach(p => p.classList.toggle('on', p.dataset.bracketPanel===eventId));
    refreshBracketPanel(eventId);
  };

  window.openBracketMatchEdit = function(eventId, matchId){
    normalizeBracketState(eventId);
    const def = BRACKET_DEFS[eventId];
    const data = S._bracketData?.[eventId]?.[matchId] || {};
    const mDef = matchMap(def)[matchId] || {label:matchId};
    const isGF = !!mDef.isGF;
    const winsNeeded = requiredWins(def, matchId);
    const teamOpts = (sel='') => `<option value="">— TBD —</option>` + TEAMS.map(t=>`<option value="${t.id}" ${t.id===sel?'selected':''}>${t.name}</option>`).join('');
    Modal.open(`
      <div class="modal-hd"><h3>${def.name} · ${mDef.label}</h3><button class="btn btn-ghost btn-xs" onclick="Modal.close()">✕</button></div>
      <div class="modal-bd">
        <div class="g2">
          <div class="fg"><label>Team 1</label><select id="bme-t1">${teamOpts(data.t1||'')}</select></div>
          <div class="fg"><label>Team 2</label><select id="bme-t2">${teamOpts(data.t2||'')}</select></div>
          <div class="fg"><label>Team 1 Score</label><input id="bme-s1" type="number" min="0" max="${isGF?4:3}" value="${data.score1 ?? ''}"></div>
          <div class="fg"><label>Team 2 Score</label><input id="bme-s2" type="number" min="0" max="${isGF?4:3}" value="${data.score2 ?? ''}"></div>
        </div>
        <div class="fg"><label>Winner</label><select id="bme-winner">
          <option value="">— Select Winner —</option>
          <option value="t1" ${data.winner && data.winner===data.t1 ? 'selected' : ''}>Team 1</option>
          <option value="t2" ${data.winner && data.winner===data.t2 ? 'selected' : ''}>Team 2</option>
        </select></div>
        <div class="text-sm text-muted">Win condition: first to ${winsNeeded} map wins${isGF ? ' (BO7 Grand Final)' : ' (BO5)'}</div>
        <div id="bme-error" class="text-sm" style="color:var(--red);margin-top:6px"></div>
      </div>
      <div class="modal-ft">
        <button class="btn btn-ghost" onclick="Modal.close()">Cancel</button>
        <button class="btn btn-danger btn-xs" onclick="clearBracketMatch('${eventId}','${matchId}')">Clear Match</button>
        <button class="btn btn-primary" onclick="saveBracketMatch('${eventId}','${matchId}',${isGF})">Save & Advance</button>
      </div>`);
  };

  window.saveBracketMatch = async function(eventId, matchId, isGF){
    const errEl = document.getElementById('bme-error');
    const t1 = document.getElementById('bme-t1').value;
    const t2 = document.getElementById('bme-t2').value;
    const s1 = parseInt(document.getElementById('bme-s1').value || '0', 10);
    const s2 = parseInt(document.getElementById('bme-s2').value || '0', 10);
    const winnerSlot = document.getElementById('bme-winner').value;
    const winsNeeded = isGF ? 4 : 3;
    if(!t1 || !t2) return errEl.textContent = 'Select both teams.';
    if(t1===t2) return errEl.textContent = 'Teams must be different.';
    if(!winnerSlot) return errEl.textContent = 'Select a winner.';
    if(Math.max(s1,s2)!==winsNeeded) return errEl.textContent = `Winner must have exactly ${winsNeeded} wins.`;
    if(s1===s2) return errEl.textContent = 'Scores cannot be tied.';
    const winner = winnerSlot==='t1' ? t1 : t2;
    const expectedWinner = s1>s2 ? t1 : t2;
    if(winner!==expectedWinner) return errEl.textContent = 'Winner must match the higher score.';

    if(!S._bracketData) S._bracketData = {};
    if(!S._bracketData[eventId]) S._bracketData[eventId] = {};
    S._bracketData[eventId][matchId] = {t1,t2,score1:s1,score2:s2,winner};
    normalizeBracketState(eventId);
    await saveBracketData(eventId);
    Modal.close();
    refreshBracketPanel(eventId);
    toast('Bracket updated and teams advanced.','ok');
  };

  window.clearBracketMatch = async function(eventId, matchId){
    if(!S._bracketData?.[eventId]) return;
    delete S._bracketData[eventId][matchId];
    normalizeBracketState(eventId);
    await saveBracketData(eventId);
    Modal.close();
    refreshBracketPanel(eventId);
    toast('Match cleared. Downstream rounds were recalculated.','info');
  };

  window.clearBracket = async function(eventId){
    const def = BRACKET_DEFS[eventId];
    if(!def) return;
    if(!confirm(`Clear every saved result for ${def.name}?`)) return;
    S._bracketData[eventId] = {};
    normalizeBracketState(eventId);
    await saveBracketData(eventId);
    refreshBracketPanel(eventId);
    toast('Bracket cleared.','info');
  };

  function derivePlacements(eventId){
    const def = BRACKET_DEFS[eventId];
    const bData = normalizeBracketState(eventId);
    const placements = [];
    const seen = new Set();
    const readSide = (mid, side) => {
      const d = bData[mid];
      if(!d?.winner || !d.t1 || !d.t2) return '';
      return side==='winner' ? d.winner : (d.winner===d.t1 ? d.t2 : d.t1);
    };
    for(const rule of def.placements || []){
      const mids = rule.matches || [rule.match];
      for(const mid of mids){
        const teamId = readSide(mid, rule.side);
        if(teamId && !seen.has(teamId)){
          seen.add(teamId);
          placements.push({teamId, pts:rule.pts, reason:`${rule.place} Place`, place:rule.place});
        }
      }
    }
    return placements;
  }

  window.awardBracketPoints = function(eventId){
    const def = BRACKET_DEFS[eventId];
    if(!def) return;
    normalizeBracketState(eventId);
    const ids = allMatchIds(def);
    const unfilled = ids.filter(mid => !S._bracketData?.[eventId]?.[mid]?.winner);
    if(unfilled.length) return toast(`${unfilled.length} match(es) still need results before points can be awarded.`, 'err', 4000);
    const already = S.points.some(p=>p.eventId===eventId && p.type==='bracket');
    if(already) return toast('Bracket points were already awarded for this event.', 'info');
    const placements = derivePlacements(eventId);
    if(!placements.length) return toast('Could not derive placements from the completed bracket.', 'err');
    const preview = placements.map(p=>`<div class="pa-row" style="padding:6px 0">${U.logoHTML(p.teamId)} <strong>${U.team(p.teamId).name}</strong><span class="text-muted">·</span> ${p.reason}<span class="pa-pts" style="margin-left:auto">+${p.pts}</span></div>`).join('');
    Modal.open(`
      <div class="modal-hd"><h3>Award Points — ${U.event(eventId).name}</h3><button class="btn btn-ghost btn-xs" onclick="Modal.close()">✕</button></div>
      <div class="modal-bd"><p class="text-sm text-muted" style="margin-bottom:12px">These placements will be written to the points ledger:</p>${preview}</div>
      <div class="modal-ft"><button class="btn btn-ghost" onclick="Modal.close()">Cancel</button><button class="btn btn-success" onclick="confirmAwardBracketPoints('${eventId}')">✅ Confirm & Award</button></div>`);
    U.updateLogos();
  };

  window.confirmAwardBracketPoints = async function(eventId){
    const placements = derivePlacements(eventId);
    Modal.close();
    for(const p of placements){
      await DB.add('points',{teamId:p.teamId,eventId,reason:p.reason,pts:p.pts,type:'bracket',ts:Date.now()});
    }
    await S.loadAll();
    refreshBracketPanel(eventId);
    renderStandings();
    toast(`Awarded ${placements.length} bracket placements for ${U.event(eventId).name}.`,'ok',4000);
  };

  function bracketTabsHTML(){
    const keys = ['M1T','M2T'].filter(k=>BRACKET_DEFS[k]);
    return `
      <div class="stabs" style="margin-top:14px">${keys.map((k,i)=>`<button class="stb ${i===0?'on':''}" data-bracket-btn="${k}" onclick="switchBracketPanel('${k}')">${BRACKET_DEFS[k].name.split('·')[0].trim()}</button>`).join('')}</div>
      ${keys.map((k,i)=>`<div id="bp-${k}" class="stpanel ${i===0?'on':''}" data-bracket-panel="${k}">${renderBracketPanel(k)}</div>`).join('')}`;
  }

  function enhanceBracketUI(){
    const host = document.getElementById('st-brackets');
    if(!host) return;
    host.innerHTML = bracketTabsHTML();
    U.updateLogos();
  }

  const _renderStandings = window.renderStandings;
  window.renderStandings = function(){
    _renderStandings.apply(this, arguments);
    enhanceBracketUI();
  };

  try {
    if(typeof S !== 'undefined'){
      if(!S._bracketData) S._bracketData = {};
      normalizeBracketState('M1T');
      normalizeBracketState('M2T');
    }
    if(document.getElementById('tab-standings')) renderStandings();
  } catch (e) {
    console.error('Bracket patch init failed', e);
  }
})();
</script>

  `;

  function teamStatsBase(team){
    return `./assets/img/team-stats/${team.id}`;
  }
  function playerImageSrc(team, playerName){
    return `./assets/img/players/${team.id}/${playerName}.png`;
  }
  function playerImageHTML(team, playerName, cssClass, initials, color){
    const base = `./assets/img/players/${team.id}/${playerName}`;
    // Try png → webp → jpg → initials fallback via onerror chain
    return `<img src="${base}.png" class="${cssClass}" alt="${playerName}"
      onerror="if(this.src.endsWith('.png')){this.src=this.src.replace('.png','.webp')}
               else if(this.src.endsWith('.webp')){this.src=this.src.replace('.webp','.jpg')}
               else{this.style.display='none';this.nextElementSibling.style.display='flex'}">`;
  }
  function eventShort(eid){
    return ({M1Q:'M1 Qualifiers',M1T:'M1 Tournament',M2Q:'M2 Qualifiers',M2T:'M2 Tournament',M3Q:'M3 Qualifiers',M4Q:'M4 Qualifiers',CHAMPS:'Champs'})[eid] || eid;
  }
  function parseMatchDateTime(dateStr, timeStr=''){
    if(!dateStr) return Number.NaN;
    if(typeof timeStr!=='string' || !timeStr.trim()){
      const dt = Date.parse(`${dateStr}T12:00:00`);
      return Number.isNaN(dt) ? Number.NaN : dt;
    }
    const m = timeStr.trim().match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/i);
    if(m){
      let hh = parseInt(m[1], 10);
      const mm = parseInt(m[2], 10);
      const ap = m[3].toUpperCase();
      if(ap==='PM' && hh!==12) hh += 12;
      if(ap==='AM' && hh===12) hh = 0;
      const iso = `${dateStr}T${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}:00`;
      const dt = Date.parse(iso);
      return Number.isNaN(dt) ? Number.NaN : dt;
    }
    const fallback = Date.parse(`${dateStr}T${timeStr}`);
    return Number.isNaN(fallback) ? Number.NaN : fallback;
  }
  function matchSortValue(m){
    if(Number.isFinite(m?.ts)) return m.ts;
    if(m?.date){
      const dt = parseMatchDateTime(m.date, m.time || '');
      if(!Number.isNaN(dt)) return dt;
    }
    return 0;
  }
  window.matchSortValue = matchSortValue;
  function matchDateLabel(m){
    const d = m.date ? U.fmtDate(m.date) : 'Undated';
    return m.time ? `${d} · ${m.time}` : d;
  }
  window.matchDateLabel = matchDateLabel;
  function seriesScore(m){
    if(Number.isFinite(m.seriesScore1) && Number.isFinite(m.seriesScore2)) return [m.seriesScore1, m.seriesScore2];
    const maps=S.maps.filter(mp=>mp.matchId===m.id);
    return [maps.filter(mp=>mp.winner===m.team1Id).length, maps.filter(mp=>mp.winner===m.team2Id).length];
  }
  window.seriesScore = seriesScore;
  function teamMatches(tid, eventId=''){ return S.matches.filter(m=>(m.team1Id===tid||m.team2Id===tid)&&(!eventId||m.eventId===eventId)); }
  function teamMaps(tid, eventId=''){ return S.maps.filter(mp=>{ const m=S.matches.find(mm=>mm.id===mp.matchId); return m && (m.team1Id===tid||m.team2Id===tid) && (!eventId || m.eventId===eventId); }); }
  function teamSeriesSummary(tid, eventId=''){
    const ms=teamMatches(tid,eventId); const maps=teamMaps(tid,eventId);
    let mw=0, ml=0;
    ms.forEach(m=>{ const [a,b]=seriesScore(m); const isT1 = m.team1Id===tid; const mine=isT1?a:b; const opp=isT1?b:a; if(mine>opp) mw++; else if(opp>mine) ml++; });
    const mapW=maps.filter(mp=>mp.winner===tid).length; const mapL=maps.filter(mp=>mp.winner && mp.winner!==tid).length;
    return {seriesW:mw, seriesL:ml, mapW, mapL, matches:ms.length, mapDiff:mapW-mapL};
  }
  function teamLastFive(tid){
    return [...teamMatches(tid)].sort((a,b)=>matchSortValue(b)-matchSortValue(a)).slice(0,5).map(m=>{ const [a,b]=seriesScore(m); const isT1=m.team1Id===tid; const mine=isT1?a:b; const opp=isT1?b:a; const oppId=isT1?m.team2Id:m.team1Id; return {match:m, oppId, mine, opp, won:mine>opp}; });
  }
  function teamPlacements(tid){

      secHTML=`<div class="g2" style="margin-bottom:12px"><div class="card"><div class="card-title">Trophy Case</div><div class="team-trophies">${placementBadges}</div></div><div class="card"><div class="card-title">Recent Form</div><div class="team-recent-list">${recentForm}</div></div></div><div class="card"><div class="card-title">${S.teamPage.showInactive?'Roster':'Active Roster'}</div><div class="team-roster-tools"><button class="roster-toggle ${S.teamPage.showInactive?'on':''}" onclick="S.teamPage.showInactive=!S.teamPage.showInactive;window.renderTeams()">${S.teamPage.showInactive?'Hide Inactive':'Show Inactive'}</button></div><div class="team-roster-strip">${rosterHTML||'<div class="text-sm text-muted">No players.</div>'}</div></div>`;

    } else if(S.teamPage.section==='matches'){

  window.editMatchFromCard = function(matchId){
    const m=S.matches.find(x=>x.id===matchId); if(!m) return toast('Match not found','err');
    const maps=S.maps.filter(mp=>mp.matchId===matchId).sort((a,b)=>a.mapNum-b.mapNum);
    const edited = { maps:[], team1:m.team1Id, team2:m.team2Id, event:m.eventId, format:m.format||'BO5', date:m.date||'', time:m.time||'' };
    for(const mp of maps){
      const item={mode:mp.mode,mapName:mp.mapName,score1:mp.score1,score2:mp.score2,duration:mp.duration||null};
      const stats=S.pstats.filter(ps=>ps.mapId===mp.id);
      for(const ps of stats){
        const side = ps.teamId===m.team1Id ? 't1' : 't2';
        item[`${side}_${ps.playerId}_k`] = ps.kills ?? '';
        item[`${side}_${ps.playerId}_d`] = ps.deaths ?? '';
        item[`${side}_${ps.playerId}_dmg`] = ps.damage ?? '';
        item[`${side}_${ps.playerId}_ast`] = ps.assists ?? '';
      }
      edited.maps.push(item);
    }
    S.addMatch = edited;
    S.editingMatchId = matchId;
    IS.tabs.goto('addmatch');
  };

  const baseRenderAddMatch = renderAddMatch;
  renderAddMatch = function(){
    baseRenderAddMatch();
    const tab=document.getElementById('tab-addmatch'); if(!tab) return;
    const title=tab.querySelector('.sh-title');
    const sub=tab.querySelector('.sh-sub');
    if(title) title.textContent = 'Match Entry Disabled';
    if(sub) sub.textContent = S.editingMatchId ? `Editing match #${S.editingMatchId} · update date, time, teams, maps, and player stats` : 'Log a new CDL match result · AI screenshot parsing enabled';
    const detailsCard=[...tab.querySelectorAll('.card')].find(c=>c.textContent.includes('MATCH DETAILS'));
    if(detailsCard){
      const firstGrid=detailsCard.querySelector('.g3');
      if(firstGrid && !detailsCard.querySelector('#match-time-input')){
        firstGrid.classList.remove('g3'); firstGrid.classList.add('g4');
        const fg=document.createElement('div'); fg.className='fg';
        fg.innerHTML=`<label>Time</label><input id="match-time-input" type="time" value="${S.addMatch.time||''}">`;
        firstGrid.appendChild(fg);
        fg.querySelector('input').addEventListener('change',e=>S.addMatch.time=e.target.value);
      }
    }
    const actionRow=[...tab.querySelectorAll('button')].find(b=>b.textContent.includes('Save Match'))?.parentElement;
    if(actionRow){
      const saveBtn=[...actionRow.querySelectorAll('button')].find(b=>b.textContent.includes('Save Match') || b.textContent.includes('Save Changes'));
      if(saveBtn) saveBtn.textContent = S.editingMatchId ? '💾 Save Changes' : '💾 Save Match';
      const resetBtn=[...actionRow.querySelectorAll('button')].find(b=>b.textContent.includes('Reset Form'));
      if(resetBtn) resetBtn.textContent = S.editingMatchId ? 'Cancel Edit' : 'Reset Form';
      if(resetBtn) resetBtn.setAttribute('onclick', 'resetAddMatchForm()');
    }
  };

  async function deleteMatchChildren(matchId){
    const maps=S.maps.filter(mp=>mp.matchId===matchId);
    for(const mp of maps){
      for(const ps of S.pstats.filter(s=>s.mapId===mp.id)) await DB.del('pstats', ps.id);
      await DB.del('maps', mp.id);
    }
  }

  saveMatch = async function(){
    const st=S.addMatch;
    if(!st.team1||!st.team2) return toast('Select both teams','err');
    if(st.team1===st.team2) return toast('Teams must be different','err');
    if(!st.event) return toast('Select an event','err');
    if(!st.date) return toast('Enter a date','err');
    if(!st.maps || st.maps.length===0) return toast('Add at least one map','err');
    try{
      let matchId=S.editingMatchId || null;
      const payload={ id:matchId||undefined, eventId:st.event, date:st.date, time:st.time||'', format:st.format, team1Id:st.team1, team2Id:st.team2, seriesScore1:st.maps.filter(m=>(+m.score1||0)>(+m.score2||0)).length, seriesScore2:st.maps.filter(m=>(+m.score2||0)>(+m.score1||0)).length, ts: Date.now() };
      if(matchId){
        await DB.put('matches', payload);
        await deleteMatchChildren(matchId);
      } else {
        delete payload.id;
        matchId = await DB.add('matches', payload);
      }
      for(let i=0;i<st.maps.length;i++){
        const mp=st.maps[i];
        const s1=+mp.score1||0, s2=+mp.score2||0;
        const winner=s1>s2?st.team1:s2>s1?st.team2:null;
        const mapId = await DB.add('maps',{matchId, mapNum:i+1, mode:mp.mode||'HP', mapName:mp.mapName||'Unknown', score1:s1, score2:s2, winner, duration:mp.duration||null, ts:Date.now()});
        for(const p of S.teamRoster(st.team1,true)){
          const k=mp[`t1_${p.id}_k`], d=mp[`t1_${p.id}_d`], dmg=mp[`t1_${p.id}_dmg`], ast=mp[`t1_${p.id}_ast`];
          if(k!=null || d!=null || dmg!=null || ast!=null) await DB.add('pstats',{mapId, playerId:p.id, teamId:st.team1, kills:+k||0, deaths:+d||0, damage:dmg===''?null:(dmg==null?null:+dmg||0), assists:ast===''?null:(ast==null?null:+ast||0), ts:Date.now()});
        }
        for(const p of S.teamRoster(st.team2,true)){
          const k=mp[`t2_${p.id}_k`], d=mp[`t2_${p.id}_d`], dmg=mp[`t2_${p.id}_dmg`], ast=mp[`t2_${p.id}_ast`];
          if(k!=null || d!=null || dmg!=null || ast!=null) await DB.add('pstats',{mapId, playerId:p.id, teamId:st.team2, kills:+k||0, deaths:+d||0, damage:dmg===''?null:(dmg==null?null:+dmg||0), assists:ast===''?null:(ast==null?null:+ast||0), ts:Date.now()});
        }
      }
      await S.loadAll();
      const msg=S.editingMatchId ? 'Match updated successfully' : 'Match saved successfully';
      S.editingMatchId=null;
      S.addMatch={maps:[],team1:null,team2:null,event:null,format:'BO5',date:'',time:''};
      toast(msg,'ok');
      IS.tabs.goto('matches');
    } catch(e){ console.error(e); toast('Error saving match: '+e.message,'err',5000); }
  };

  function matchDefs(def){ return [...(def.winners||[]).flatMap(r=>r.matches||[]), ...(def.losers||[]).flatMap(r=>r.matches||[])]; }
  function mMap(def){ return Object.fromEntries(matchDefs(def).map(m=>[m.id,m])); }
  function allIds(def){ return def.order || matchDefs(def).map(m=>m.id); }
  function winOf(d){ return d?.winner || ''; }
  function loseOf(d){ return d?.winner && d.t1 && d.t2 ? (d.winner===d.t1?d.t2:d.t1) : ''; }

  function normalizeBracketState(eventId){
    const def=BRACKET_DEFS[eventId]; if(!def) return {};
    const prev=(S._bracketData&&S._bracketData[eventId])?JSON.parse(JSON.stringify(S._bracketData[eventId])):{};
    const next={}; for(const id of allIds(def)) next[id]={...(prev[id]||{})};
    for(const [mid,seed] of Object.entries(def.initial||{})){
      if(seed.t1) next[mid].t1 = seed.t1;
      if(seed.t2) next[mid].t2 = seed.t2;
    }
    for(const route of def.routes||[]){
      const src=next[route.from]||{};
      if(route.winner){ const [toId,slot]=route.winner; const val=winOf(src); if(val) next[toId][slot]=val; else if((next[toId]||{})[slot]===winOf(prev[route.from]||{})) delete next[toId][slot]; }
      if(route.loser){ const [toId,slot]=route.loser; const val=loseOf(src); if(val) next[toId][slot]=val; else if((next[toId]||{})[slot]===loseOf(prev[route.from]||{})) delete next[toId][slot]; }
    }
    for(const id of allIds(def)){
      const cur=next[id];
      if(cur.winner && (cur.winner!==cur.t1 && cur.winner!==cur.t2)){ delete cur.winner; delete cur.score1; delete cur.score2; }
      if(cur.score1!=null && cur.score2!=null && cur.score1===cur.score2){ delete cur.winner; }
    }
    S._bracketData=S._bracketData||{}; S._bracketData[eventId]=next; return next;
  }
  window.loadBracketData = async function(){ S._bracketData=S._bracketData||{}; for(const eid of Object.keys(BRACKET_DEFS)){ const saved=await DB.getSetting('bracket_'+eid, null); S._bracketData[eid]=saved?JSON.parse(saved):{}; normalizeBracketState(eid);} };
  window.saveBracketData = async function(eventId){ normalizeBracketState(eventId); await DB.setSetting('bracket_'+eventId, JSON.stringify(S._bracketData[eventId]||{})); };
  function bracketRenderCard(eventId, m, data){ const d=data[m.id]||{}; const t1=d.t1||''; const t2=d.t2||''; const s1=d.score1 ?? '–'; const s2=d.score2 ?? '–'; const w=d.winner||''; const n1=t1?U.team(t1).name:'TBD'; const n2=t2?U.team(t2).name:'TBD'; return `<div class="bm" id="bm-${m.id}" onclick="openBracketMatchEdit('${eventId}','${m.id}')" style="cursor:pointer" title="Edit bracket match"><div class="bm-side ${w===t1?'win':''}">${t1?U.logoHTML(t1,'t-logo'):''}<span>${n1}</span><strong>${s1}</strong></div><div class="bm-side ${w===t2?'win':''}">${t2?U.logoHTML(t2,'t-logo'):''}<span>${n2}</span><strong>${s2}</strong></div></div>`; }
  window.renderBracketPanel = function(eventId){ const def=BRACKET_DEFS[eventId]; if(!def) return '<div class="empty">No bracket loaded.</div>'; const data=normalizeBracketState(eventId); const ids=allIds(def); const filled=ids.filter(id=>data[id]?.winner).length; const allFilled=filled===ids.length; const ptAlready=S.points.some(p=>p.eventId===eventId&&p.type==='bracket'); const buildCols=(rounds)=>rounds.map((r,idx)=>`<div class="bracket-col"><div class="bracket-col-lbl">${r.round}</div>${r.matches.map(m=>bracketRenderCard(eventId,m,data)).join('')}${idx<rounds.length-1?'<div class="bracket-connector"></div>':''}</div>`).join(''); return `<div class="card"><div class="card-title">${def.name}<span style="font-size:10px;color:var(--text2);font-weight:400">${filled}/${ids.length} matches filled</span><div style="margin-left:auto;display:flex;gap:8px;flex-wrap:wrap"><button class="btn btn-ghost btn-xs" onclick="clearBracket('${eventId}')">Clear</button>${!ptAlready&&allFilled?`<button class="btn btn-success btn-sm" onclick="awardBracketPoints('${eventId}')">🏆 Award Points</button>`:''}</div></div><div class="text-sm text-muted" style="margin-bottom:12px">You can edit any match, correct the teams, and the downstream slots will update after you save a winner.</div><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--cyan);padding:4px 0 8px">WINNERS BRACKET</div><div class="bracket-scroll"><div class="bracket">${buildCols(def.winners||[])}</div></div>${(def.losers&&def.losers.length)?`<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--red);padding:12px 0 6px">ELIMINATION BRACKET</div><div class="bracket-scroll"><div class="bracket">${buildCols(def.losers)}</div></div>`:''}</div>`; };
  window.refreshBracketPanel = function(eventId){ const el=document.getElementById('bp-'+eventId); if(el){ el.innerHTML=window.renderBracketPanel(eventId); U.updateLogos(); } };
  window.openBracketMatchEdit = function(eventId, matchId){ const def=BRACKET_DEFS[eventId]; const data=normalizeBracketState(eventId)[matchId]||{}; const isGF=!!(mMap(def)[matchId]||{}).isGF; const winsNeeded=isGF?4:3; const opts=`<option value="">— TBD —</option>`+TEAMS.map(t=>`<option value="${t.id}" ${data.t1===t.id||data.t2===t.id?'':' '}></option>`).join(''); const teamOpts=(sel='')=>`<option value="">— TBD —</option>`+TEAMS.map(t=>`<option value="${t.id}" ${t.id===sel?'selected':''}>${t.name}</option>`).join(''); Modal.open(`<div class="modal-hd"><h3>${def.name} · ${matchId}</h3><button class="btn btn-ghost btn-xs" onclick="Modal.close()">✕</button></div><div class="modal-bd"><div class="g2"><div class="fg"><label>Team 1</label><select id="bme-t1">${teamOpts(data.t1||'')}</select></div><div class="fg"><label>Team 2</label><select id="bme-t2">${teamOpts(data.t2||'')}</select></div><div class="fg"><label>Team 1 Score</label><input id="bme-s1" type="number" min="0" max="${winsNeeded}" value="${data.score1 ?? ''}"></div><div class="fg"><label>Team 2 Score</label><input id="bme-s2" type="number" min="0" max="${winsNeeded}" value="${data.score2 ?? ''}"></div></div><div class="fg"><label>Winner</label><select id="bme-winner"><option value="">— Select Winner —</option><option value="t1" ${(data.winner && data.winner===data.t1)?'selected':''}>Team 1</option><option value="t2" ${(data.winner && data.winner===data.t2)?'selected':''}>Team 2</option></select></div><div class="text-sm text-muted">Winner must have exactly ${winsNeeded} wins.</div><div id="bme-error" style="color:var(--red);margin-top:6px"></div></div><div class="modal-ft"><button class="btn btn-ghost" onclick="Modal.close()">Cancel</button><button class="btn btn-danger btn-xs" onclick="clearBracketMatch('${eventId}','${matchId}')">Clear</button><button class="btn btn-primary" onclick="saveBracketMatch('${eventId}','${matchId}',${isGF})">Save & Advance</button></div>`); };
  window.saveBracketMatch = async function(eventId, matchId, isGF){ const err=document.getElementById('bme-error'); const t1=document.getElementById('bme-t1').value; const t2=document.getElementById('bme-t2').value; const s1=parseInt(document.getElementById('bme-s1').value||'0',10); const s2=parseInt(document.getElementById('bme-s2').value||'0',10); const wSlot=document.getElementById('bme-winner').value; const need=isGF?4:3; if(!t1||!t2) return err.textContent='Select both teams.'; if(t1===t2) return err.textContent='Teams must be different.'; if(!wSlot) return err.textContent='Pick a winner.'; if(Math.max(s1,s2)!==need) return err.textContent=`Winner must have exactly ${need} wins.`; if(s1===s2) return err.textContent='Scores cannot tie.'; const winner=wSlot==='t1'?t1:t2; if((s1>s2?t1:t2)!==winner) return err.textContent='Winner must match the higher score.'; S._bracketData=S._bracketData||{}; S._bracketData[eventId]=S._bracketData[eventId]||{}; S._bracketData[eventId][matchId]={...(S._bracketData[eventId][matchId]||{}), t1,t2,score1:s1,score2:s2,winner}; normalizeBracketState(eventId); await saveBracketData(eventId); Modal.close(); refreshBracketPanel(eventId); toast('Bracket updated. Teams advanced automatically.','ok'); };
  window.clearBracketMatch = async function(eventId, matchId){ if(!S._bracketData?.[eventId]) return; delete S._bracketData[eventId][matchId]; normalizeBracketState(eventId); await saveBracketData(eventId); Modal.close(); refreshBracketPanel(eventId); toast('Bracket match cleared.','info'); };
  window.clearBracket = async function(eventId){ if(!confirm(`Clear every saved result for ${BRACKET_DEFS[eventId]?.name||eventId}?`)) return; S._bracketData[eventId]={}; normalizeBracketState(eventId); await saveBracketData(eventId); refreshBracketPanel(eventId); toast('Bracket cleared.','info'); };

  ensureTeamTab();
  setTimeout(()=>{ ensureTeamTab(); if(IS.tabs.current==='addmatch') renderAddMatch(); if(IS.tabs.current==='matches') renderMatches(); if(IS.tabs.current==='teams') renderTeams(); }, 50);
})();
</script>

  function officialMajor1State(){

<script>

// ── Per-team parser state ─────────────────────────────────────────
const TSP = {
  images: {}, // teamId -> [{file, dataUrl, label}]
  parsing: false,
};

window.TSP = TSP;

// Stat image type detection — match filename keywords
function detectStatType(filename){
  const f = filename.toLowerCase();
  if(f.includes('overall'))                        return 'overall';
  if(f.includes('hardpoint') || f.includes(' hp')) return 'hardpoint';
  if(f.includes('search') || f.includes('snd') || f.includes('s&d') || f.includes('destroy')) return 'snd';
  if(f.includes('overload') || f.includes('ovl') || f.includes('control')) return 'overload';
  if(f.includes('map record') || f.includes('records')) return 'maprecords';
  if(f.includes('pick') || f.includes('veto'))     return 'picksvetos';
  return 'unknown';
}

const STAT_TYPE_LABELS = {
  overall:'Overall', hardpoint:'Hardpoint', snd:'S&D',
  overload:'Control/OVL', maprecords:'Map Records', picksvetos:'Picks/Vetoes', unknown:'Unknown'
};

// ── Render the parser UI inside the team hero area ────────────────

        <div onclick="document.getElementById('ts-file-${teamId}').click()">
