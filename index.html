<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iron Sight Stats</title>
  <meta name="description" content="Iron Sight Stats public build" />
  <link rel="stylesheet" href="./assets/css/app.css" />
  <link rel="stylesheet" href="./assets/css/layout.css" />
  <link rel="stylesheet" href="./assets/css/components.css" />
  <link rel="stylesheet" href="./assets/css/responsive.css" />
  <script type="module" src="./assets/js/app.js"></script>
</head>
<body>
  <div id="app" class="iss-app">
    <header class="iss-topbar">
      <div class="iss-banner shell">
        <a href="#dashboard" class="iss-brand" aria-label="Iron Sight Stats home">
          <div class="iss-brand-mark">
            <img src="./assets/img/branding/logo.png" alt="Iron Sight Stats" />
          </div>
          <div class="iss-brand-text">
            <div class="iss-brand-title"><span>IRON SIGHT</span></div>
            <div class="iss-brand-subtitle">STATS</div>
          </div>
        </a>

        <button id="mobile-nav-toggle" class="iss-mobile-toggle" type="button" aria-label="Toggle navigation">
          ☰
        </button>

        <nav id="primary-nav" class="iss-nav" aria-label="Primary">
          <a href="#dashboard" data-route="dashboard">Dashboard</a>
          <a href="#standings" data-route="standings">Standings</a>
          <a href="#matches" data-route="matches">Matches</a>
          <a href="#players" data-route="players">Players</a>
          <a href="#teams" data-route="teams">Teams</a>
          <a href="#betting" data-route="betting">Betting Lab</a>
          <a href="#brackets" data-route="brackets">Brackets</a>
          <a href="#matchup" data-route="matchup">Matchup</a>
        </nav>
      </div>
    </header>

    <main class="iss-main shell">
      <section id="dashboard-section" class="iss-section"></section>
      <section id="standings-section" class="iss-section" hidden></section>
      <section id="matches-section" class="iss-section" hidden></section>
      <section id="players-section" class="iss-section" hidden></section>
      <section id="teams-section" class="iss-section" hidden></section>
      <section id="betting-section" class="iss-section" hidden></section>
      <section id="brackets-section" class="iss-section" hidden></section>
      <section id="matchup-section" class="iss-section" hidden></section>
    </main>
  </div>
</body>
</html>
