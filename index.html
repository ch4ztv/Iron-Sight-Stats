<meta name="theme-color" content="#06110f">
<style>
:root {
  --bg:        #060b07;
  --s1:        #0c1210;
  --s2:        #121a12;
  --s3:        #1a251a;
  --border:    #1e3022;
  --border2:   #2a4832;
  --accent:    #00e840;
  --accent-lo: rgba(0,232,64,0.11);
  --accent-md: rgba(0,232,64,0.22);
  --cyan:      #00c8ff;
  --cyan-lo:   rgba(0,200,255,0.1);
  --gold:      #f5c542;
  --silver:    #a0aec0;
  --bronze:    #c97d3a;
  --green:     #22c55e;
  --green-lo:  rgba(34,197,94,0.12);
  --red:       #ef4444;
  --red-lo:    rgba(239,68,68,0.12);
  --amber:     #f59e0b;
  --text:      #dde0f0;
  --text2:     #8890b8;
  --text3:     #4a5080;
  --font:      'Segoe UI', 'SF Pro Display', system-ui, sans-serif;
  --mono:      'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  --r:         6px;
  --r2:        10px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;display:flex;flex-direction:column}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--s1)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── HEADER ── */
#hdr{display:flex;align-items:center;gap:22px;padding:0 24px;min-height:124px;background:radial-gradient(circle at 12% 38%, rgba(0,232,64,.22) 0%, rgba(0,232,64,.07) 20%, rgba(6,11,7,0) 42%), linear-gradient(180deg, #04100c 0%, #050b09 100%);border-bottom:1px solid rgba(0,232,64,.28);flex-shrink:0;z-index:50;box-shadow:inset 0 -1px 0 rgba(0,232,64,.18)}
#hdr-logo{height:108px;width:auto;max-width:none;cursor:pointer;object-fit:contain;image-rendering:auto;filter:drop-shadow(0 0 14px rgba(0,255,102,.18));display:block;flex-shrink:0}
#hdr-title{display:flex !important;flex-direction:column;justify-content:center;gap:2px;line-height:1}
#hdr-title .line1{font-size:clamp(34px,3.4vw,58px);font-weight:900;letter-spacing:.07em;text-transform:uppercase;color:#f5f7fb;text-shadow:0 2px 10px rgba(0,0,0,.32)}
#hdr-title .line2{display:flex;align-items:center;gap:18px;font-size:clamp(20px,2vw,36px);font-weight:900;letter-spacing:.09em;text-transform:uppercase;color:var(--accent);text-shadow:0 0 16px rgba(0,232,64,.2)}
#hdr-title .line2::before,#hdr-title .line2::after{content:'';display:block;width:60px;max-width:8vw;height:1px;background:linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,.18), rgba(255,255,255,0))}
.hdr-right{margin-left:auto;display:none;align-items:center;gap:10px}
.badge-season{background:var(--accent-lo);border:1px solid var(--accent);color:var(--accent);padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.1em}
.badge-db{background:var(--cyan-lo);border:1px solid var(--cyan);color:var(--cyan);padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.06em}

/* ── NAV ── */
#nav{display:flex;background:var(--s1);border-bottom:1px solid var(--border);padding:0 12px;overflow-x:auto;flex-shrink:0}
#nav::-webkit-scrollbar{height:2px}
.nb{background:none;border:none;color:var(--text2);padding:12px 14px;cursor:pointer;font-family:var(--font);font-size:12px;font-weight:600;letter-spacing:.05em;white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s;text-transform:uppercase}
.nb:hover{color:var(--text)}
.nb.on{color:var(--accent);border-bottom-color:var(--accent)}

/* ── MAIN SCROLL ── */
#main{flex:1;overflow-y:auto;overflow-x:hidden}
.tab{display:none;padding:20px;max-width:1440px;margin:0 auto}
.tab.on{display:block}

/* ── CARDS ── */
.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);padding:18px;margin-bottom:14px}
.card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--text2);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.card-title span{color:var(--text)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r);border:none;cursor:pointer;font-family:var(--font);font-size:12px;font-weight:600;transition:all .15s;white-space:nowrap;letter-spacing:.03em}
.btn-primary{background:var(--accent);color:#000}.btn-primary:hover{background:#00c035}
.btn-secondary{background:var(--s3);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{background:var(--border)}
.btn-cyan{background:var(--cyan);color:#000}.btn-cyan:hover{opacity:.85}
.btn-ghost{background:none;color:var(--text2);border:1px solid var(--border)}.btn-ghost:hover{color:var(--text);background:var(--s2)}
.btn-danger{background:var(--red);color:#fff}.btn-danger:hover{opacity:.85}
.btn-success{background:var(--green);color:#fff}.btn-success:hover{opacity:.85}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-xs{padding:2px 7px;font-size:10px}

/* ── FORMS ── */
.fg{margin-bottom:12px}
.fg label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text2);margin-bottom:5px}
input,select,textarea{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);padding:7px 11px;font-family:var(--font);font-size:12px;transition:border-color .15s;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
select option{background:var(--s2)}
input[type=number]{-moz-appearance:textfield}
input[type=checkbox]{width:auto}

/* ── TABLES ── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:var(--s2);padding:9px 12px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text2);white-space:nowrap;cursor:pointer;user-select:none;border-bottom:1px solid var(--border)}
thead th:hover{color:var(--text)}
thead th.sa::after{content:' ▲';color:var(--accent);font-size:9px}
thead th.sd::after{content:' ▼';color:var(--accent);font-size:9px}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:hover{background:var(--s2)}
tbody td{padding:9px 12px;vertical-align:middle}
.tbl-num{font-family:var(--mono);font-size:12px}

/* ── GRID ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.g14{display:grid;grid-template-columns:1fr 4fr;gap:14px}
@media(max-width:900px){.g3,.g4{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.g2,.g3,.g4{grid-template-columns:1fr}.tab{padding:12px}}

/* ── KPI WIDGETS ── */
.kpi{background:var(--s2);border:1px solid var(--border);border-radius:var(--r2);padding:16px;text-align:center}
.kpi-val{font-size:26px;font-weight:800;color:var(--accent);font-family:var(--mono);line-height:1;margin-bottom:4px}
.kpi-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text2)}
.kpi-sub{font-size:11px;color:var(--text2);margin-top:3px}

/* ── TEAM ── */
.team-tag{display:inline-flex;align-items:center;gap:7px;font-weight:700}
.t-logo{width:22px;height:22px;object-fit:contain;flex-shrink:0}
.t-logo-md{width:32px;height:32px;object-fit:contain}
.t-logo-lg{width:48px;height:48px;object-fit:contain}
.bp-team-logo{width:64px;height:64px;object-fit:contain;flex-shrink:0}

/* ── RANKS ── */
.rnk{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;font-weight:800;font-size:11px}
.r1{background:var(--gold);color:#000}
.r2{background:var(--silver);color:#000}
.r3{background:var(--bronze);color:#fff}
.rd{background:var(--s3);color:var(--text2)}

/* ── PILLS ── */
.pill{display:inline-flex;align-items:center;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:700;letter-spacing:.04em}
.pill-w{background:var(--green-lo);color:var(--green)}
.pill-l{background:var(--red-lo);color:var(--red)}
.pill-n{background:var(--s3);color:var(--text2)}
.pill-hp{background:rgba(96,165,250,.15);color:#60a5fa}
.pill-snd{background:rgba(249,115,22,.15);color:#f97316}
.pill-ol{background:rgba(167,139,250,.15);color:#a78bfa}

/* ── MODE COLOR ── */
.m-hp{color:#60a5fa}.m-snd{color:#f97316}.m-ol{color:#a78bfa}

/* ── MATCH CARD ── */
.mc{background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:8px;overflow:hidden}
.mc:hover{border-color:var(--border2)}
.mc-hd{display:flex;align-items:center;padding:11px 14px;cursor:pointer;gap:12px;background:var(--s2)}
.mc-teams{flex:1;display:flex;align-items:center;gap:10px}
.mc-score{font-size:20px;font-weight:800;font-family:var(--mono)}
.mc-score .sw{color:var(--green)}.mc-score .sl{color:var(--red)}
.mc-meta{font-size:10px;color:var(--text2);text-align:right;line-height:1.7}
.mc-bd{display:none;border-top:1px solid var(--border)}
.mc-bd.open{display:block}
.mc-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border)}
.mc-row:last-child{border-bottom:none}

/* ── SERIES VIEWER ── */
.sv-nav{display:flex;border-bottom:1px solid var(--border);padding:0 14px;gap:2px;overflow-x:auto;background:var(--s1)}
.sv-nav::-webkit-scrollbar{height:2px}
.svt{background:none;border:none;color:var(--text2);padding:10px 13px;cursor:pointer;font-family:var(--font);font-size:11px;font-weight:700;letter-spacing:.05em;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;white-space:nowrap;text-transform:uppercase}
.svt:hover{color:var(--text)}.svt.on{color:var(--cyan);border-bottom-color:var(--cyan)}
.svt.map-w{color:var(--green)}.svt.map-w.on{color:var(--green);border-bottom-color:var(--green)}
.svt.map-l{color:var(--text3)}.svt.map-l.on{color:var(--text3);border-bottom-color:var(--text3)}
.sv-panel{display:none;padding:14px}.sv-panel.on{display:block}
.series-tbl table{font-size:12px}
.series-tbl th{font-size:9px;padding:7px 10px}
.series-tbl td{padding:7px 10px;vertical-align:middle}
.team-sect-hd td{background:var(--s2);font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;padding:6px 10px;color:var(--text2)}
.map-score-banner{display:flex;align-items:center;justify-content:center;gap:16px;padding:14px;background:var(--s2);border-radius:var(--r);margin-bottom:12px;border:1px solid var(--border)}
.map-score-team{display:flex;flex-direction:column;align-items:center;gap:4px}
.map-score-name{font-size:11px;font-weight:700;color:var(--text2)}
.map-score-val{font-size:30px;font-weight:800;font-family:var(--mono);line-height:1}
.map-score-val.w{color:var(--green)}.map-score-val.l{color:var(--red)}.map-score-val.d{color:var(--text2)}
.map-score-sep{font-size:18px;font-weight:800;color:var(--border2);padding:0 4px}
.kd-bar-wrap{height:3px;background:var(--s3);border-radius:2px;overflow:hidden;margin-top:2px;width:60px}
.kd-bar{height:100%;border-radius:2px}

/* ── PLAYER ROW ── */
.pr{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--border)}
.pr:last-child{border-bottom:none}
.pr.inactive{opacity:.45}
.pr-name{font-weight:700;font-size:13px}
.pr-sub{font-size:10px;color:var(--text2);margin-top:1px}

/* ── KD COLORS ── */
.kd-pos{color:var(--green)}.kd-neg{color:var(--red)}.kd-n{color:var(--text2)}
.bpr-e{color:var(--gold)}.bpr-g{color:var(--green)}.bpr-a{color:var(--text)}.bpr-b{color:var(--text2)}.bpr-p{color:var(--red)}

/* ── SECTION ── */
.sh{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;gap:12px}
.sh-title{font-size:18px;font-weight:800;color:var(--text);line-height:1.1}
.sh-sub{font-size:12px;color:var(--text2);margin-top:3px}

/* ── SUB TABS ── */
.stabs{display:flex;gap:2px;margin-bottom:14px;border-bottom:1px solid var(--border)}
.stb{background:none;border:none;color:var(--text2);padding:7px 13px;cursor:pointer;font-family:var(--font);font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.stb:hover{color:var(--text)}.stb.on{color:var(--cyan);border-bottom-color:var(--cyan)}
.stpanel{display:none}.stpanel.on{display:block}

/* ── MAP ENTRY BLOCK ── */
.meb{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
.meb-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px}
.meb-lbl{font-size:12px;font-weight:800;color:var(--accent);letter-spacing:.05em}
.psg{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;gap:6px;align-items:end;margin-bottom:4px}
.psg-hd{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;gap:6px;margin-bottom:4px}
.psg-hd span{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);padding:0 4px}
.team-divider{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text2);padding:6px 0 4px;border-top:1px solid var(--border);margin-top:8px}

/* ── MATCHUP ── */
.mu-grid{display:grid;grid-template-columns:1fr 60px 1fr;gap:12px;align-items:start}
.vs-div{display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:var(--accent);padding-top:28px}
.team-sel-card{background:var(--s2);border:1px solid var(--border);border-radius:var(--r2);padding:14px}
.stat-cmp{display:grid;grid-template-columns:1fr 80px 1fr;gap:6px;align-items:center;margin-bottom:6px}
.scl{text-align:right;font-weight:700;font-size:13px}
.scr{text-align:left;font-weight:700;font-size:13px}
.sc-lbl{text-align:center;font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.08em}
.h2h-bar{height:6px;background:var(--s3);border-radius:3px;overflow:hidden;margin-bottom:2px}

/* ── ROSTER GRID ── */
.roster-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.rtc{background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.rtc-hd{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--s2);border-bottom:1px solid var(--border)}
.rtc-name{font-weight:800;font-size:13px}
.rtc-abbr{font-size:10px;color:var(--text2);margin-top:1px}

/* ── BRACKET ── */
.bracket-scroll{overflow-x:auto;padding:10px 0}
.bracket{display:flex;gap:0;align-items:center}
.bracket-col{display:flex;flex-direction:column;min-width:190px}
.bracket-col-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text2);text-align:center;padding:8px;border-bottom:1px solid var(--border);margin-bottom:8px}
.bm{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);margin:4px 6px;min-width:178px}
.bt{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;gap:8px}
.bt:first-child{border-bottom:1px solid var(--border)}
.bt.bw{background:var(--green-lo)}.bt.bl{opacity:.5}
.bt-name{font-weight:700;font-size:12px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bt-score{font-family:var(--mono);font-weight:700;font-size:13px;min-width:16px;text-align:right}
.bracket-connector{width:20px;height:2px;background:var(--border);flex-shrink:0}

/* ── POINTS AWARD ── */
.pa-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.pa-row:last-child{border-bottom:none}
.pa-pts{font-family:var(--mono);font-weight:800;font-size:15px;color:var(--gold);min-width:40px;text-align:right}

/* ── FILTER BAR ── */
.fbar{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;margin-bottom:14px}
.fbar .fg{margin-bottom:0;min-width:120px;flex:1}

/* ── UPLOAD ZONE ── */
.upz{border:2px dashed var(--border);border-radius:var(--r2);padding:28px;text-align:center;cursor:pointer;transition:all .2s;color:var(--text2)}
.upz:hover,.upz.drag{border-color:var(--accent);background:var(--accent-lo);color:var(--text)}
.upz-ico{font-size:28px;margin-bottom:8px}

/* ── TOAST ── */
#toast{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:10px 16px;font-size:12px;min-width:220px;pointer-events:auto;animation:tin .25s ease}
.toast.ok{border-left:3px solid var(--green)}
.toast.err{border-left:3px solid var(--red)}
.toast.info{border-left:3px solid var(--cyan)}
@keyframes tin{from{transform:translateX(60px);opacity:0}to{transform:none;opacity:1}}

/* ── MODAL ── */
#mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;align-items:center;justify-content:center;padding:20px}
#mo.open{display:flex}
#modal{background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);max-width:580px;width:100%;max-height:90vh;overflow-y:auto}
.modal-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border)}
.modal-hd h3{font-size:15px;font-weight:800}
.modal-bd{padding:18px}
.modal-ft{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}

/* ── MISC ── */
.divider{height:1px;background:var(--border);margin:14px 0}
.empty{text-align:center;padding:50px 20px;color:var(--text2)}
.empty-ico{font-size:40px;margin-bottom:10px;opacity:.4}
.empty-lbl{font-size:14px;font-weight:600;color:var(--text3);margin-bottom:6px}
.num{font-family:var(--mono)}
.text-muted{color:var(--text2)}
.text-sm{font-size:11px}
.bold{font-weight:700}
.accent{color:var(--accent)}
.cyan{color:var(--cyan)}
.gold{color:var(--gold)}
.green{color:var(--green)}
.red{color:var(--red)}
.amber{color:var(--amber)}
.flex{display:flex;align-items:center;gap:8px}
.flex-between{display:flex;align-items:center;justify-content:space-between;gap:8px}
.phase2-note{background:rgba(245,197,66,.07);border:1px solid rgba(245,197,66,.3);border-radius:var(--r);padding:10px 14px;font-size:11px;color:var(--amber);margin-bottom:14px}
.ph2-ico{font-size:14px;margin-right:6px}
.info-box{background:var(--cyan-lo);border:1px solid rgba(0,200,255,.25);border-radius:var(--r);padding:10px 14px;font-size:11px;color:var(--cyan);margin-bottom:14px}
.pts-big{font-size:22px;font-weight:800;font-family:var(--mono);color:var(--gold)}

/* ── BULK IMPORT ── */
.bulk-folder-zone{border:2px dashed var(--cyan);border-radius:var(--r2);padding:28px;text-align:center;cursor:pointer;transition:all .2s;color:var(--text2);position:relative}
.bulk-folder-zone:hover,.bulk-folder-zone.drag{border-color:var(--accent);background:var(--accent-lo);color:var(--text)}
.bulk-queue{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px;margin-top:14px}
.bq-card{background:var(--s2);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;transition:border-color .15s}
.bq-card.valid{border-color:var(--green)}
.bq-card.review{border-color:var(--amber)}
.bq-card.error{border-color:var(--red)}
.bq-card.saved{border-color:var(--text3);opacity:.6}
.bq-card.parsing{border-color:var(--cyan);animation:bqpulse 1s ease infinite}
@keyframes bqpulse{0%,100%{border-color:var(--cyan)}50%{border-color:var(--border)}}
.bq-hd{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--s1);border-bottom:1px solid var(--border)}
.bq-title{font-weight:700;font-size:12px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bq-status{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;white-space:nowrap}
.bq-status.valid{background:var(--green-lo);color:var(--green)}
.bq-status.review{background:rgba(245,158,11,.15);color:var(--amber)}
.bq-status.error{background:var(--red-lo);color:var(--red)}
.bq-status.saved{background:var(--s3);color:var(--text3)}
.bq-status.parsing{background:var(--cyan-lo);color:var(--cyan)}
.bq-status.pending{background:var(--s3);color:var(--text3)}
.bq-body{padding:10px 12px}
.bq-score{font-size:22px;font-weight:800;font-family:var(--mono);text-align:center;margin:6px 0}
.bq-maps{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;margin-bottom:8px}
.bq-map-dot{font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px}
.bq-err{color:var(--red);font-size:11px;padding:4px 0}
.bulk-progress{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin:10px 0}
.bulk-prog-bar{height:6px;background:var(--s3);border-radius:3px;overflow:hidden;margin-top:8px}
.bulk-prog-fill{height:100%;background:var(--cyan);border-radius:3px;transition:width .3s ease}
.bq-edit-form{padding:12px;border-top:1px solid var(--border);background:var(--s1)}
.ai-zone{border:2px dashed var(--cyan);border-radius:var(--r2);padding:0;background:var(--cyan-lo);transition:all .2s;position:relative;overflow:hidden}
.ai-zone.drag{background:rgba(0,200,255,.18);border-style:solid}
.ai-zone-inner{padding:22px;text-align:center;cursor:pointer}
.ai-zone-ico{font-size:32px;margin-bottom:8px;line-height:1}
.ai-zone-lbl{font-size:13px;font-weight:700;color:var(--cyan);margin-bottom:4px}
.ai-zone-sub{font-size:11px;color:var(--text2)}
.ai-thumb-row{display:flex;gap:8px;flex-wrap:wrap;padding:12px;border-top:1px solid rgba(0,200,255,.2)}
.ai-thumb{position:relative;width:90px;height:60px;border-radius:var(--r);overflow:hidden;border:1px solid var(--border);flex-shrink:0;cursor:pointer}
.ai-thumb img{width:100%;height:100%;object-fit:cover}
.ai-thumb-lbl{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.7);font-size:9px;font-weight:700;color:#fff;padding:2px 4px;text-align:center}
.ai-thumb-rm{position:absolute;top:2px;right:2px;background:var(--red);color:#fff;border:none;border-radius:50%;width:16px;height:16px;font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.ai-parse-btn{background:linear-gradient(135deg,#00c8ff,#0080ff);color:#fff;border:none;border-radius:var(--r);padding:10px 22px;font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;letter-spacing:.05em;transition:opacity .15s;display:flex;align-items:center;gap:8px}
.ai-parse-btn:disabled{opacity:.5;cursor:not-allowed}
.ai-parse-btn:not(:disabled):hover{opacity:.85}
.parse-progress{background:var(--s2);border:1px solid var(--border);border-radius:var(--r2);padding:16px;margin-top:12px}
.parse-step{display:flex;align-items:center;gap:10px;padding:6px 0;font-size:12px}
.parse-step .ico{width:20px;text-align:center;flex-shrink:0}
.parse-step.done .ico::before{content:'✓';color:var(--green)}
.parse-step.active .ico::before{content:'⟳';color:var(--cyan);display:inline-block;animation:spin .8s linear infinite}
.parse-step.wait .ico::before{content:'○';color:var(--text3)}
.parse-step.err .ico::before{content:'✗';color:var(--red)}
@keyframes spin{to{transform:rotate(360deg)}}
.parsed-card{background:var(--s2);border:1px solid var(--border2);border-radius:var(--r2);padding:14px;margin-top:10px}
.parsed-card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.parsed-card-lbl{font-size:12px;font-weight:800;color:var(--cyan);letter-spacing:.06em}
.conf-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px}
.conf-high{background:var(--green-lo);color:var(--green)}
.conf-med{background:rgba(245,158,11,.15);color:var(--amber)}
.conf-low{background:var(--red-lo);color:var(--red)}
.player-match{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px}
.player-match:last-child{border-bottom:none}
.pm-name{font-weight:700;min-width:90px}
.pm-stat{font-family:var(--mono);min-width:36px;text-align:right}
.pm-stat.k{color:var(--green)}
.pm-stat.d{color:var(--red)}
.pm-stat.dmg{color:var(--amber)}
.unmatched{color:var(--amber);font-style:italic}
.ai-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.ai-badge{background:linear-gradient(135deg,rgba(0,200,255,.2),rgba(0,128,255,.2));border:1px solid var(--cyan);color:var(--cyan);padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.06em}


/* ── BETTING LAB ── */
.bet-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:14px}
.bet-grid-2{display:grid;grid-template-columns:1fr;gap:14px}
.bet-panel{background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);padding:14px}
.bet-market-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.bet-chip{padding:9px 12px;border-radius:999px;border:1px solid var(--border);background:var(--s2);color:var(--text);font-size:12px;font-weight:800;letter-spacing:.03em;cursor:pointer;transition:.15s}
.bet-chip:hover{border-color:var(--cyan);color:var(--cyan)}
.bet-chip.on{background:linear-gradient(135deg,rgba(120,44,242,.35),rgba(0,189,255,.12));border-color:rgba(120,44,242,.7);color:#fff;box-shadow:0 0 0 1px rgba(120,44,242,.2) inset}
.bet-kpis{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;margin:14px 0}
.bet-kpi{background:linear-gradient(180deg,var(--s2),rgba(5,10,14,.95));border:1px solid var(--border);border-radius:var(--r);padding:12px}
.bet-kpi .v{font-size:24px;font-weight:900;color:var(--text)}
.bet-kpi .l{font-size:10px;color:var(--text2);font-weight:800;letter-spacing:.08em;text-transform:uppercase;margin-top:4px}
.bet-mini{font-size:11px;color:var(--text2)}
.bet-last5{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px}
.bet-game{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:10px;min-height:108px}
.bet-game.hit{border-color:rgba(0,200,80,.5);box-shadow:0 0 0 1px rgba(0,200,80,.18) inset}
.bet-game.miss{border-color:rgba(255,74,74,.45);box-shadow:0 0 0 1px rgba(255,74,74,.16) inset}
.bet-game .top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}
.bet-game .res{font-size:10px;font-weight:900;letter-spacing:.08em}
.bet-game.hit .res{color:var(--green)}
.bet-game.miss .res{color:var(--red)}
.bet-game .val{font-size:24px;font-weight:900;line-height:1;color:var(--text)}
.bet-game .meta{font-size:10px;color:var(--text2);margin-top:6px;line-height:1.45}
.bet-table-note{font-size:11px;color:var(--text2);margin-top:8px}
.bet-flex{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.bet-subtle{color:var(--text2);font-size:11px}
.bet-empty{padding:22px;border:1px dashed var(--border);border-radius:var(--r);text-align:center;color:var(--text2);background:rgba(255,255,255,.01)}
.player-link-btn{background:none;border:none;color:inherit;font:inherit;font-weight:800;cursor:pointer;padding:0;text-align:left}
.player-link-btn:hover{color:var(--cyan)}
.bet-form-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.bet-hero{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.bet-hero-id{display:flex;align-items:center;gap:10px}
.bet-hero-name{font-size:24px;font-weight:900}
.bet-hero-sub{font-size:12px;color:var(--text2);margin-top:4px}
.bet-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:999px;background:var(--s2);border:1px solid var(--border);font-size:11px;font-weight:800;color:var(--cyan);letter-spacing:.06em;text-transform:uppercase}
@media (max-width:1100px){.bet-grid{grid-template-columns:1fr}.bet-kpis{grid-template-columns:repeat(2,minmax(0,1fr))}.bet-last5{grid-template-columns:repeat(2,minmax(0,1fr))}.bet-form-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media (max-width:680px){.bet-kpis,.bet-last5,.bet-form-grid{grid-template-columns:1fr}}


.match-day-group{margin:18px 0 22px}
.match-day-heading{display:flex;align-items:center;justify-content:center;gap:14px;margin:10px 0 12px;color:var(--text2);font-weight:800;letter-spacing:.02em;font-size:15px}
.match-day-heading:before,.match-day-heading:after{content:"";height:1px;flex:1;background:linear-gradient(90deg,transparent,var(--line),transparent)}
.match-day-stack{display:grid;gap:12px}
.match-day-sub{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.12em;text-align:center;margin-top:-4px;margin-bottom:6px}

.match-day{margin:18px 0 22px}
.match-day-hd{font-size:22px;font-weight:900;color:var(--text);padding:8px 2px 10px;opacity:.96}
.match-day-list{display:flex;flex-direction:column;gap:10px}
.mc-actions{display:flex;gap:6px;align-items:center}
.mc.open{border-color:rgba(0,229,255,.3);box-shadow:0 0 0 1px rgba(0,229,255,.06) inset}
.mc-hd{justify-content:space-between}
.mc-meta strong{font-size:11px;letter-spacing:.06em;text-transform:uppercase}
@media (max-width: 900px){
  .mc-hd{flex-wrap:wrap;align-items:flex-start}
  .mc-meta{order:3;width:100%;text-align:left}
  .mc-actions{margin-left:auto}
  .match-day-hd{font-size:18px}
}

  HP:  {b1:1.05, b2:0.95, sigma:5.5},
  SND: {b1:1.10, b2:0.90, sigma:1.5},
  OL:  {b1:1.00, b2:1.00, sigma:5.0},

// ── DATABASE ──────────────────────────────────────────────────────
const DB = {
  db: null,
  async open() {
    return new Promise((res,rej) => {
      const r = indexedDB.open('IronSightDB', 2);
      r.onupgradeneeded = e => {
        const d = e.target.result;
        const mk = (name, opts, idx) => {
          if(!d.objectStoreNames.contains(name)){
            const s = d.createObjectStore(name, opts);
            (idx||[]).forEach(({k,u})=>s.createIndex(k,k,{unique:u||false}));
          }
        };
        mk('players',   {keyPath:'id'});
        mk('matches',   {keyPath:'id',autoIncrement:true}, [{k:'eventId'},{k:'date'}]);
        mk('maps',      {keyPath:'id',autoIncrement:true}, [{k:'matchId'}]);
        mk('pstats',    {keyPath:'id',autoIncrement:true}, [{k:'mapId'},{k:'playerId'}]);
        mk('points',    {keyPath:'id',autoIncrement:true}, [{k:'teamId'},{k:'eventId'}]);
        mk('settings',  {keyPath:'key'});
        mk('images',    {keyPath:'id'});
      };
      r.onsuccess = e => { this.db = e.target.result; res(); };
      r.onerror   = e => rej(e.target.error);
    });
  },
  _r(store, mode, fn) {
    return new Promise((res,rej) => {
      const tx = this.db.transaction(store, mode);
      const s  = typeof store === 'string' ? tx.objectStore(store) : store.map(n=>tx.objectStore(n));
      const rq = fn(s, tx);
      if(rq && rq.onsuccess !== undefined) {
        rq.onsuccess = () => res(rq.result);
        rq.onerror   = () => rej(rq.error);
      } else {
        tx.oncomplete = () => res(rq);
        tx.onerror    = () => rej(tx.error);
      }
    });
  },
  getAll(store, idx, val) {
    return new Promise((res,rej) => {
      const tx = this.db.transaction(store,'readonly');
      const s  = tx.objectStore(store);
      const rq = idx ? s.index(idx).getAll(val) : s.getAll();
      rq.onsuccess = () => res(rq.result);
      rq.onerror   = () => rej(rq.error);
    });
  },
  get(store, key) {
    return new Promise((res,rej) => {
      const tx = this.db.transaction(store,'readonly');
      const rq = tx.objectStore(store).get(key);
      rq.onsuccess = () => res(rq.result);
      rq.onerror   = () => rej(rq.error);
    });
  },
  put(store, data) {
    return new Promise((res,rej) => {
      const tx = this.db.transaction(store,'readwrite');
      const rq = tx.objectStore(store).put(data);
      rq.onsuccess = () => res(rq.result);
      rq.onerror   = () => rej(rq.error);
    });
  },
  add(store, data) {
    return new Promise((res,rej) => {
      const tx = this.db.transaction(store,'readwrite');
      const rq = tx.objectStore(store).add(data);
      rq.onsuccess = () => res(rq.result);
      rq.onerror   = () => rej(rq.error);
    });
  },
  del(store, key) {
    return new Promise((res,rej) => {
      const tx = this.db.transaction(store,'readwrite');
      const rq = tx.objectStore(store).delete(key);
      rq.onsuccess = () => res();
      rq.onerror   = () => rej(rq.error);
    });
  },
  async getSetting(k, def=null) {
    const r = await this.get('settings', k);
    return r ? r.value : def;
  },
  async setSetting(k, v) { await this.put('settings',{key:k,value:v}); },
};

const U = {
  team(id)  { return TEAMS.find(t=>t.id===id) || {name:'Unknown',abbr:'???',color:'#666',id}; },
  event(id) { return EVENTS.find(e=>e.id===id) || {name:id}; },
  modeLabel(m){ return MODE_LABEL[m]||m; },
  modePill(m){ const cls={HP:'pill-hp',SND:'pill-snd',OL:'pill-ol'}; return `<span class="pill ${cls[m]||''}">${m}</span>`; },
  fmtDate(d) { if(!d) return '—'; const dt=new Date(d+'T12:00:00'); return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); },
  fmtKD(k,d){ if(!d) return '—'; const r=(k/d).toFixed(2); const c=r>=1?'kd-pos':r<1?'kd-neg':'kd-n'; return `<span class="num ${c}">${r}</span>`; },
  fmtBPR(v){ if(v==null||isNaN(v)) return '<span class="text-muted">—</span>'; const n=+v.toFixed(2); const c=n>=1.8?'bpr-e':n>=1.3?'bpr-g':n>=0.8?'bpr-a':n>=0.5?'bpr-b':'bpr-p'; return `<span class="num ${c}">${n.toFixed(2)}</span>`; },
  calcBPR(k,d,mode){
    const c=BPR_C[mode]; if(!c) return null;
    const imp = k*c.b1 - d*c.b2;
    return imp/(3*c.sigma)+1;
  },
  // Slayer Rating: (HP K/Map) + (SND K/Map × 3) + (OL K/Map) — ~100 is gold standard
  // Requires all 3 modes to have been played, otherwise returns null
  calcSlayer(hpK,hpMaps,sndK,sndMaps,olK,olMaps){
    if(hpMaps===0 || sndMaps===0 || olMaps===0) return null;
    return (hpK/hpMaps) + (sndK/sndMaps)*3 + (olK/olMaps);
  },
  pct(n,d){ return d>0 ? (n/d*100).toFixed(1)+'%' : '0%'; },
  clamp(v,min,max){ return Math.min(Math.max(v,min),max); },
  teamLogoId(tid){ return 'logo_'+tid; },
  playerImgId(pid){ return 'pimg_'+pid; },

  async loadImage(id){ 
    try { const r=await DB.get('images',id); return r?r.data:null; } catch{ return null; }
  },
  async logoSrc(tid){
    // User-uploaded logo wins, then bundled logo, then SVG fallback
    const d=await this.loadImage(this.teamLogoId(tid));
    if(d) return d;
    if(BUNDLED_LOGOS[tid]) return BUNDLED_LOGOS[tid];
    return `data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32'><rect width='32' height='32' rx='4' fill='${encodeURIComponent(U.team(tid).color)}'/><text x='16' y='22' text-anchor='middle' font-size='12' font-weight='bold' fill='%23fff' font-family='sans-serif'>${U.team(tid).abbr}</text></svg>`;
  },
  logoHTML(tid,cls='t-logo'){
    const src = BUNDLED_LOGOS[tid] ||
      `data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32'><rect width='32' height='32' rx='4' fill='${encodeURIComponent(U.team(tid).color)}'/><text x='16' y='22' text-anchor='middle' font-size='12' font-weight='bold' fill='%23fff' font-family='sans-serif'>${encodeURIComponent(U.team(tid).abbr)}</text></svg>`;
    return `<img class="${cls}" src="${src}" data-teamid="${tid}" alt="${U.team(tid).abbr}" onerror="this.style.display='none'">`;
  },
  async updateLogos(){
    document.querySelectorAll('img[data-teamid]').forEach(async img=>{
      const src=await U.logoSrc(img.dataset.teamid);
      img.src=src;
    });
  },
  teamTag(tid,cls='t-logo'){
    const t=U.team(tid);
    return `<span class="team-tag">${this.logoHTML(tid,cls)}<span>${t.name}</span></span>`;
  },
  escHTML(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); },
};

// ── STANDINGS COMPUTATION ─────────────────────────────────────────
function computeStandings(eventFilter=null){
  const rows = {};
  TEAMS.forEach(t=>{
    rows[t.id]={tid:t.id, cdlPts:0, mw:0, ml:0, mapW:0, mapL:0, qualWins:0};
  });

  // Points awards
  S.points.forEach(p=>{
    if(!rows[p.teamId]) return;
    if(eventFilter && p.eventId!==eventFilter) return;
    rows[p.teamId].cdlPts += p.pts;
    if(p.type==='qualWin') rows[p.teamId].qualWins++;
  });

  // Match W/L
  S.matches.forEach(m=>{
    if(eventFilter && m.eventId!==eventFilter) return;
    const t1score = S.maps.filter(mp=>mp.matchId===m.id && mp.winner===m.team1Id).length;
    const t2score = S.maps.filter(mp=>mp.matchId===m.id && mp.winner===m.team2Id).length;
    const totalMaps = S.maps.filter(mp=>mp.matchId===m.id).length;
    if(!rows[m.team1Id]||!rows[m.team2Id]) return;
    if(t1score > t2score){ rows[m.team1Id].mw++; rows[m.team2Id].ml++; }
    else if(t2score > t1score){ rows[m.team2Id].mw++; rows[m.team1Id].ml++; }
    rows[m.team1Id].mapW += t1score; rows[m.team1Id].mapL += (totalMaps-t1score);
    rows[m.team2Id].mapW += t2score; rows[m.team2Id].mapL += (totalMaps-t2score);
  });

  const arr = Object.values(rows);
  arr.sort((a,b)=>{
    if(b.cdlPts!==a.cdlPts) return b.cdlPts-a.cdlPts;
    const awp=(a.mw)/(a.mw+a.ml||1), bwp=(b.mw)/(b.mw+b.ml||1);
    if(Math.abs(awp-bwp)>0.001) return bwp-awp;
    const amp=a.mapW/(a.mapW+a.mapL||1), bmp=b.mapW/(b.mapW+b.mapL||1);
    return bmp-amp;
  });
  return arr;
}

// ── PLAYER STATS COMPUTATION ──────────────────────────────────────
function computePlayerStats(opts={}){
  const {eventId='', team='', mode='', showInactive=false} = opts;
  const out={};
  S.players.forEach(p=>{
    if(!showInactive && !p.active) return;
    if(team && p.teamId!==team) return;
    out[p.id]={pid:p.id, name:p.name, teamId:p.teamId, active:p.active,
      kills:0, deaths:0, damage:0, maps:0,
      hpK:0,hpD:0,hpMaps:0, sndK:0,sndD:0,sndMaps:0, olK:0,olD:0,olMaps:0,
      bprTotal:0, bprCount:0};
  });

  S.pstats.forEach(stat=>{
    const mapObj = S.maps.find(m=>m.id===stat.mapId);
    if(!mapObj) return;
    const match = S.matches.find(m=>m.id===mapObj.matchId);
    if(!match) return;
    if(eventId && match.eventId!==eventId) return;
    if(mode && mapObj.mode!==mode) return;
    const row = out[stat.playerId];
    if(!row) return;
    row.kills  += stat.kills||0;
    row.deaths += stat.deaths||0;
    row.damage += stat.damage||0;
    row.maps   += 1;
    const m = mapObj.mode;
    if(m==='HP')  { row.hpK+=stat.kills||0;  row.hpD+=stat.deaths||0;  row.hpMaps++; }
    if(m==='SND') { row.sndK+=stat.kills||0; row.sndD+=stat.deaths||0; row.sndMaps++; }
    if(m==='OL')  { row.olK+=stat.kills||0;  row.olD+=stat.deaths||0;  row.olMaps++; }
    const bpr = U.calcBPR(stat.kills||0, stat.deaths||0, m);
    if(bpr!==null){ row.bprTotal+=bpr; row.bprCount++; }
  });

  return Object.values(out)
    .filter(r=>r.maps>0)
    .map(r=>({
      ...r,
      kd: r.deaths>0?r.kills/r.deaths:r.kills,
      kpg: r.maps>0?r.kills/r.maps:0,
      bpr: r.bprCount>0?r.bprTotal/r.bprCount:null,
      slayer: U.calcSlayer(r.hpK,r.hpMaps,r.sndK,r.sndMaps,r.olK,r.olMaps),
    }));
}

// ── H2H ────────────────────────────────────────────────────────────
function h2h(t1,t2){
  const res={w:0,l:0,mapW:0,mapL:0,matches:[]};
  S.matches.forEach(m=>{
    const involves = (m.team1Id===t1&&m.team2Id===t2)||(m.team1Id===t2&&m.team2Id===t1);
    if(!involves) return;
    const myId = m.team1Id===t1?m.team1Id:m.team2Id;
    const opId = m.team1Id===t1?m.team2Id:m.team1Id;
    const myMaps = S.maps.filter(mp=>mp.matchId===m.id && mp.winner===myId).length;
    const opMaps = S.maps.filter(mp=>mp.matchId===m.id && mp.winner===opId).length;
    if(myMaps>opMaps) res.w++; else if(opMaps>myMaps) res.l++;
    res.mapW+=myMaps; res.mapL+=opMaps;
    res.matches.push({...m, myMaps, opMaps});
  });
  return res;
}

// ── SORT HELPER ───────────────────────────────────────────────────
function sortBy(arr, col, dir, ns='main'){
  const d = S.sortDir[ns]||'desc';
  return [...arr].sort((a,b)=>{
    let av=a[col], bv=b[col];
    if(av==null) av = d==='asc'?Infinity:-Infinity;
    if(bv==null) bv = d==='asc'?Infinity:-Infinity;
    if(typeof av==='string') av=av.toLowerCase(), bv=(bv||'').toLowerCase();
    if(av<bv) return d==='asc'?-1:1;
    if(av>bv) return d==='asc'?1:-1;
    return 0;
  });
}

function renderMatches(){
  const el=document.getElementById('tab-matches');
  const {eventId, team, search} = S.matchFilter;
  const evOpts=`<option value="">All Events</option>${EVENTS.map(e=>`<option value="${e.id}" ${e.id===eventId?'selected':''}>${e.name}</option>`).join('')}`;
  const teamOpts=`<option value="">All Teams</option>${TEAMS.map(t=>`<option value="${t.id}" ${t.id===team?'selected':''}>${t.name}</option>`).join('')}`;

  let filtered=[...S.matches].filter(m=>{
    if(eventId && m.eventId!==eventId) return false;
    if(team && m.team1Id!==team && m.team2Id!==team) return false;
    if(search){
      const q=search.toLowerCase();
      const t1=U.team(m.team1Id).name.toLowerCase(), t2=U.team(m.team2Id).name.toLowerCase();
      if(!t1.includes(q)&&!t2.includes(q)) return false;
    }
    return true;
  }).sort((a,b)=>matchSortValue(b)-matchSortValue(a));

  const grouped = {};
  for(const m of filtered){
    const key = m.date || 'Undated';
    (grouped[key] ||= []).push(m);
  }
  const dayKeys = Object.keys(grouped).sort((a,b)=>{
    if(a==='Undated') return 1;
    if(b==='Undated') return -1;
    return matchSortValue({date:b,time:'23:59'}) - matchSortValue({date:a,time:'23:59'});
  });

  const matchCards = filtered.length===0 ?
    `<div class="empty"><div class="empty-ico">📭</div><div class="empty-lbl">No matches found</div><p>Try different filters.</p></div>` :
    dayKeys.map(day=>{
      const label = day==='Undated' ? 'Undated Matches' : new Date(day+'T12:00:00').toLocaleDateString(undefined,{weekday:'long', month:'long', day:'numeric', year:'numeric'});
      const cards = grouped[day].sort((a,b)=>matchSortValue(b)-matchSortValue(a)).map(m=>buildMatchCard(m)).join('');
      return `<section class="match-day"><div class="match-day-hd">${label}</div><div class="match-day-list">${cards}</div></section>`;
    }).join('');

  el.innerHTML=`
    <div class="sh"><div><div class="sh-title">Match Results</div><div class="sh-sub">${filtered.length} matches</div></div>
      
    </div>
    <div class="fbar">
      <div class="fg"><label>Event</label><select onchange="S.matchFilter.eventId=this.value;renderMatches()">${evOpts}</select></div>
      <div class="fg"><label>Team</label><select onchange="S.matchFilter.team=this.value;renderMatches()">${teamOpts}</select></div>
      <div class="fg"><label>Search</label><input type="text" placeholder="Team name…" value="${U.escHTML(search)}" oninput="S.matchFilter.search=this.value;renderMatches()"></div>
    </div>
    ${matchCards}`;
  U.updateLogos();
}

function buildMatchCard(m){
  const t1=U.team(m.team1Id), t2=U.team(m.team2Id);
  const allMaps=S.maps.filter(mp=>mp.matchId===m.id).sort((a,b)=>a.mapNum-b.mapNum);
  const s1=allMaps.filter(mp=>mp.winner===m.team1Id).length;
  const s2=allMaps.filter(mp=>mp.winner===m.team2Id).length;
  const ev=U.event(m.eventId);
  const hasStats = S.pstats.some(s=>allMaps.find(mp=>mp.id===s.mapId));

  // ── Series-level aggregated stats per player ──
  const allStats = S.pstats.filter(s=>allMaps.find(mp=>mp.id===s.mapId));
  const playerTotals = {}; // pid -> {kills,deaths,damage,bprSum,bprCount,maps}
  allStats.forEach(st=>{
    const mp=allMaps.find(x=>x.id===st.mapId);
    if(!playerTotals[st.playerId]) playerTotals[st.playerId]={kills:0,deaths:0,damage:0,bprSum:0,bprCount:0,maps:0,teamId:st.teamId};
    const r=playerTotals[st.playerId];
    r.kills  += st.kills||0;
    r.deaths += st.deaths||0;
    r.damage += st.damage||0;
    r.maps++;
    const bpr=U.calcBPR(st.kills||0,st.deaths||0,mp?.mode||'HP');
    if(bpr!=null){ r.bprSum+=bpr; r.bprCount++; }
  });

  const seriesPlayerRow=(pid,side)=>{
    const r=playerTotals[pid]; if(!r) return '';
    const pl=S.playerById(pid); if(!pl) return '';
    const kd=r.deaths>0?(r.kills/r.deaths).toFixed(2):r.kills.toFixed(2);
    const kdCls=parseFloat(kd)>=1?'green':parseFloat(kd)<1?'red':'';
    const bpr=r.bprCount>0?r.bprSum/r.bprCount:null;
    const t1kills=side==='t1'?r.kills:null, t2kills=side==='t2'?r.kills:null;
    const maxKills=40; // normalise bar
    const barW=Math.min(100,(r.kills/maxKills)*100).toFixed(0);
    const barCol=side==='t1'?t1.color:t2.color;
    return `<tr>
      <td class="bold">${pl.name}</td>
      <td class="num bold">${r.kills}</td>
      <td class="num">${r.deaths}</td>
      <td class="num ${kdCls}">${kd}</td>
      <td class="num text-muted">${r.damage||'—'}</td>
      <td>${U.fmtBPR(bpr)}</td>
      <td style="width:80px"><div class="kd-bar-wrap"><div class="kd-bar" style="width:${barW}%;background:${barCol}"></div></div></td>
    </tr>`;
  };

  // Build series panel player lists per team
  const t1pids=Object.entries(playerTotals).filter(([,r])=>r.teamId===m.team1Id).map(([k])=>k);
  const t2pids=Object.entries(playerTotals).filter(([,r])=>r.teamId===m.team2Id).map(([k])=>k);
  // sort by kills desc
  t1pids.sort((a,b)=>(playerTotals[b].kills)-(playerTotals[a].kills));
  t2pids.sort((a,b)=>(playerTotals[b].kills)-(playerTotals[a].kills));

  const seriesPanel=`
    <div class="sv-panel on" id="sv-${m.id}-series">
      ${!hasStats?`<div class="empty" style="padding:30px"><div class="empty-ico" style="font-size:24px">📊</div><div class="empty-lbl">No player stats recorded for this series</div></div>`:`
      <div class="series-tbl tbl-wrap">
        <table>
          <thead>
            <tr><th>Player</th><th>K</th><th>D</th><th>K/D</th><th>Dmg</th><th>BPR</th><th></th></tr>
          </thead>
          <tbody>
            <tr class="team-sect-hd"><td colspan="7" style="border-left:3px solid ${t1.color}">${t1.name}</td></tr>
            ${t1pids.map(pid=>seriesPlayerRow(pid,'t1')).join('')}
            <tr class="team-sect-hd"><td colspan="7" style="border-left:3px solid ${t2.color}">${t2.name}</td></tr>
            ${t2pids.map(pid=>seriesPlayerRow(pid,'t2')).join('')}
          </tbody>
        </table>
      </div>`}
    </div>`;

  // ── Per-map panels ──
  const mapPanels = allMaps.map((mp,i)=>{
    const stats=S.pstats.filter(s=>s.mapId===mp.id);
    const t1stats=stats.filter(s=>S.players.find(p=>p.id===s.playerId&&p.teamId===m.team1Id))
                       .sort((a,b)=>(b.kills||0)-(a.kills||0));
    const t2stats=stats.filter(s=>S.players.find(p=>p.id===s.playerId&&p.teamId===m.team2Id))
                       .sort((a,b)=>(b.kills||0)-(a.kills||0));
    const win1=mp.winner===m.team1Id, win2=mp.winner===m.team2Id;

    const playerMapRow=(st,side)=>{
      const pl=S.playerById(st.playerId); if(!pl) return '';
      const bpr=U.calcBPR(st.kills||0,st.deaths||0,mp.mode);
      const kd=st.deaths>0?((st.kills||0)/st.deaths).toFixed(2):(st.kills||0).toFixed(2);
      const kdCls=parseFloat(kd)>=1?'green':parseFloat(kd)<1?'red':'';
      const maxK=side==='t1'?Math.max(...t1stats.map(s=>s.kills||0),1):Math.max(...t2stats.map(s=>s.kills||0),1);
      const barW=Math.min(100,((st.kills||0)/maxK)*100).toFixed(0);
      const barCol=side==='t1'?t1.color:t2.color;
      return `<tr>
        <td class="bold">${pl.name}</td>
        <td class="num bold">${st.kills||0}</td>
        <td class="num">${st.deaths||0}</td>
        <td class="num ${kdCls}">${kd}</td>
        <td class="num text-muted">${st.damage||'—'}</td>
        <td>${U.fmtBPR(bpr)}</td>
        <td style="width:80px"><div class="kd-bar-wrap"><div class="kd-bar" style="width:${barW}%;background:${barCol}"></div></div></td>
      </tr>`;
    };

    return `<div class="sv-panel" id="sv-${m.id}-map${i}">
      <div class="map-score-banner">
        <div class="map-score-team">
          ${U.logoHTML(m.team1Id,'t-logo')}
          <div class="map-score-name">${t1.name}</div>
          <div class="map-score-val ${win1?'w':win2?'l':'d'}">${mp.score1??'?'}</div>
        </div>
        <div>
          <div class="map-score-sep">—</div>
          <div style="text-align:center;margin-top:4px">${U.modePill(mp.mode)}</div>
          <div style="text-align:center;font-size:11px;color:var(--text2);margin-top:2px">${mp.mapName||'Unknown'}</div>
          ${mp.duration?`<div style="text-align:center;font-size:10px;color:var(--text3)">${mp.duration}min</div>`:''}
        </div>
        <div class="map-score-team">
          ${U.logoHTML(m.team2Id,'t-logo')}
          <div class="map-score-name">${t2.name}</div>
          <div class="map-score-val ${win2?'w':win1?'l':'d'}">${mp.score2??'?'}</div>
        </div>
      </div>
      ${stats.length===0?`<div class="empty" style="padding:20px"><div class="empty-ico" style="font-size:20px">📋</div><div class="empty-lbl">No player stats for this map</div></div>`:`
      <div class="series-tbl tbl-wrap"><table>
        <thead><tr><th>Player</th><th>K</th><th>D</th><th>K/D</th><th>Dmg</th><th>BPR</th><th></th></tr></thead>
        <tbody>
          <tr class="team-sect-hd"><td colspan="7" style="border-left:3px solid ${t1.color}">${t1.name}</td></tr>
          ${t1stats.map(st=>playerMapRow(st,'t1')).join('')}
          <tr class="team-sect-hd"><td colspan="7" style="border-left:3px solid ${t2.color}">${t2.name}</td></tr>
          ${t2stats.map(st=>playerMapRow(st,'t2')).join('')}
        </tbody>
      </table></div>`}
    </div>`;
  }).join('');

  // ── Map tab labels ──
  const mapTabs = allMaps.map((mp,i)=>{
    const isWin=mp.winner===m.team1Id, isLoss=mp.winner===m.team2Id;
    // from perspective of team1
    const cls=isWin?'map-w':isLoss?'map-l':'';
    const dot=isWin?'●':isLoss?'○':'·';
    return `<button class="svt ${cls}" onclick="switchSVTab(this,'sv-${m.id}-map${i}','${m.id}')" data-mid="${m.id}">${dot} Map ${mp.mapNum} · ${mp.mode}${mp.mapName?' · '+mp.mapName:''}</button>`;
  }).join('');

  const bodyHTML=`
    <div class="mc-bd" id="mc-bd-${m.id}">
      <div class="sv-nav">
        <button class="svt on" onclick="switchSVTab(this,'sv-${m.id}-series','${m.id}')" data-mid="${m.id}">📊 Series Stats</button>
        ${mapTabs}
      </div>
      ${seriesPanel}
      ${mapPanels}
    </div>`;

  return `<div class="mc" id="mc-${m.id}">
    <div class="mc-hd" onclick="toggleMatch(${m.id})">
      <div class="mc-teams">
        ${U.logoHTML(m.team1Id)} <span class="bold">${t1.name}</span>
        <span class="mc-score"><span class="${s1>s2?'sw':'sl'}">${s1}</span>–<span class="${s2>s1?'sw':'sl'}">${s2}</span></span>
        <span class="bold">${t2.name}</span> ${U.logoHTML(m.team2Id)}
        ${allMaps.length>0?`<div style="display:flex;gap:3px;margin-left:8px">${allMaps.map(mp=>{
          const isW=mp.winner===m.team1Id,isL=mp.winner===m.team2Id;
          return `<span style="width:18px;height:18px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;background:${isW?'rgba(34,197,94,.2)':isL?'rgba(239,68,68,.15)':'var(--s3)'};color:${isW?'var(--green)':isL?'var(--red)':'var(--text2)'}">${mp.mode[0]}</span>`;
        }).join('')}</div>`:''}
      </div>
      <div class="mc-meta"><strong>${ev.name}</strong><br>${matchDateLabel(m)}<br><span class="text-muted text-sm">${m.format}</span></div>
      <div class="mc-actions">
        <button class="btn btn-secondary btn-xs" title="View stats" onclick="event.stopPropagation();toggleMatch(${m.id}, true)">View</button>
        
      </div>
    </div>
    ${bodyHTML}
  </div>`;
}

function switchSVTab(btn, panelId, mid){
  // Only affect panels within this match
  const mc=document.getElementById('mc-'+mid);
  if(!mc) return;
  mc.querySelectorAll('.svt').forEach(b=>b.classList.remove('on'));
  mc.querySelectorAll('.sv-panel').forEach(p=>p.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById(panelId)?.classList.add('on');
}

function toggleMatch(id, forceOpen=false){
  const bd=document.getElementById('mc-bd-'+id);
  if(!bd) return;
  const shouldOpen = forceOpen ? true : !bd.classList.contains('open');
  bd.classList.toggle('open', shouldOpen);
  const card=document.getElementById('mc-'+id);
  if(card) card.classList.toggle('open', shouldOpen);
  if(shouldOpen) requestAnimationFrame(()=>bd.scrollIntoView({block:'nearest', behavior:'smooth'}));
}

async function deleteMatch(id){ return; 
  if(!confirm('Delete this match and all its map/player data?')) return;
  await DB.del('matches', id);
  const maps=S.maps.filter(m=>m.matchId===id);
  for(const m of maps){
    await DB.del('maps', m.id);
    const ps=S.pstats.filter(s=>s.mapId===m.id);
    for(const s of ps) await DB.del('pstats', s.id);
  }
  await S.loadAll();
  renderMatches();
  toast('Match deleted','info');
}

function addMap(){
  const st=S.addMatch;
  const order=st.format==='BO7'?BO7:BO5;
  const mode=order[st.maps.length]||'HP';
  st.maps.push({mode, mapName:'', score1:null, score2:null, duration:null});
  renderAddMatch();
}

function removeMap(i){
  S.addMatch.maps.splice(i,1);
  renderAddMatch();
}

function clearMaps(){
  S.addMatch.maps=[];
  renderAddMatch();
}

async function saveMatch(){
  const st=S.addMatch;
  if(!st.team1||!st.team2){ toast('Select both teams','err'); return; }
  if(st.team1===st.team2){ toast('Teams must be different','err'); return; }
  if(!st.event){ toast('Select an event','err'); return; }
  if(!st.date){ toast('Enter a date','err'); return; }
  if(st.maps.length===0){ toast('Add at least one map','err'); return; }

  try {
    const matchId = await DB.add('matches',{
      eventId: st.event, date: st.date, format: st.format,
      team1Id: st.team1, team2Id: st.team2, ts: Date.now(),
    });

    for(let i=0;i<st.maps.length;i++){
      const mp=st.maps[i];
      const s1=mp.score1||0, s2=mp.score2||0;
      const winner = s1>s2 ? st.team1 : s2>s1 ? st.team2 : null;
      const mapId = await DB.add('maps',{
        matchId, mapNum:i+1, mode:mp.mode||'HP',
        mapName:mp.mapName||'Unknown', score1:s1, score2:s2,
        winner, duration:mp.duration||null, ts:Date.now(),
      });

      const t1p=S.teamRoster(st.team1, true); // include inactive — they played the match
      const t2p=S.teamRoster(st.team2, true);
      for(const p of t1p){
        const k=mp[`t1_${p.id}_k`]||0, d=mp[`t1_${p.id}_d`]||0;
        if(k||d) await DB.add('pstats',{mapId, playerId:p.id, teamId:st.team1, kills:k, deaths:d, damage:mp[`t1_${p.id}_dmg`]||null, assists:mp[`t1_${p.id}_ast`]||null, ts:Date.now()});
      }
      for(const p of t2p){
        const k=mp[`t2_${p.id}_k`]||0, d=mp[`t2_${p.id}_d`]||0;
        if(k||d) await DB.add('pstats',{mapId, playerId:p.id, teamId:st.team2, kills:k, deaths:d, damage:mp[`t2_${p.id}_dmg`]||null, assists:mp[`t2_${p.id}_ast`]||null, ts:Date.now()});
      }
    }

    // Auto-award qualifier stage wins
    const ev=U.event(st.event);
    if(ev.type==='qualifiers'){
      const maps=st.maps;
      const s1=maps.filter(m=>(m.score1||0)>(m.score2||0)).length;
      const s2=maps.filter(m=>(m.score2||0)>(m.score1||0)).length;
      const winner = s1>s2?st.team1:s2>s1?st.team2:null;
      if(winner){
        await DB.add('points',{teamId:winner,eventId:st.event,reason:'Qualifier Stage Win',pts:10,type:'qualWin',ts:Date.now()});
        toast(`+10 CDL pts → ${U.team(winner).name} (Qualifier Win)`, 'ok', 4000);
      }
    }

    await S.loadAll();
    S.addMatch={maps:[],team1:null,team2:null,event:null,format:'BO5'};
    toast('Match saved successfully!','ok');
    renderAddMatch();
  } catch(e){
    console.error(e);
    toast('Error saving match: '+e.message,'err',5000);
  }
}

function psSort(col){
  const ns='ps';
  if(S.sortCol[ns]===col){
    // same column — toggle direction
    S.sortDir[ns]=S.sortDir[ns]==='asc'?'desc':'asc';
  } else {
    // new column — always start descending (highest first)
    S.sortCol[ns]=col;
    S.sortDir[ns]='desc';
  }
  renderPlayerStats();
}

function matchInSplit(match, split='ALL'){
  if(!split || split==='ALL') return true;
  const ev = U.event(match.eventId);
  if(/^M[1-4]$/.test(split)) return ev.major === Number(split.slice(1));
  return match.eventId === split;
}

function getPlayerMapLogs(playerId, split='ALL'){
  const rows=[];
  S.pstats.forEach(stat=>{
    if(stat.playerId !== playerId) return;
    const mapObj = S.maps.find(m=>m.id===stat.mapId);
    if(!mapObj) return;
    const match = S.matches.find(m=>m.id===mapObj.matchId);
    if(!match || !matchInSplit(match, split)) return;
    const player = S.playerById(playerId);
    const oppId = match.team1Id===stat.teamId ? match.team2Id : match.team1Id;
    rows.push({
      playerId,
      playerName: player ? player.name : playerId,
      teamId: stat.teamId,
      oppId,
      matchId: match.id,
      eventId: match.eventId,
      eventName: U.event(match.eventId).name,
      date: match.date || '',
      ts: match.ts || 0,
      format: match.format,
      mapId: mapObj.id,
      mapNum: mapObj.mapNum,
      mode: mapObj.mode,
      mapName: mapObj.mapName,
      kills: Number(stat.kills||0),
      deaths: Number(stat.deaths||0),
      damage: Number(stat.damage||0),
      assists: Number(stat.assists||0),
      kd: Number(stat.deaths||0)>0 ? Number(stat.kills||0)/Number(stat.deaths||0) : Number(stat.kills||0),
      score1: mapObj.score1,
      score2: mapObj.score2,
      winner: mapObj.winner,
      wonMap: mapObj.winner === stat.teamId,
    });
  });
  return rows.sort((a,b)=>{
    const ad = new Date((a.date||'1970-01-01')+'T12:00:00').getTime();
    const bd = new Date((b.date||'1970-01-01')+'T12:00:00').getTime();
    if(bd !== ad) return bd - ad;
    if((b.ts||0)!==(a.ts||0)) return (b.ts||0)-(a.ts||0);
    if(b.matchId!==a.matchId) return b.matchId-a.matchId;
    return b.mapNum-a.mapNum;
  });
}

function groupSeriesPerformance(logs, market){
  const byMatch = new Map();
  logs.forEach(r=>{
    if(!byMatch.has(r.matchId)) byMatch.set(r.matchId, []);
    byMatch.get(r.matchId).push(r);
  });
  const out=[];
  byMatch.forEach((rows, matchId)=>{
    rows.sort((a,b)=>a.mapNum-b.mapNum);
    const head = rows[0];
    let value = null;
    let label = '';
    let kills = rows.reduce((a,r)=>a+r.kills,0);
    let deaths = rows.reduce((a,r)=>a+r.deaths,0);
    let mapsUsed = rows.map(r=>r.mapNum);
    if(market==='MAPS123_KILLS'){
      const use = rows.filter(r=>r.mapNum<=3);
      if(!use.length) return;
      value = use.reduce((a,r)=>a+r.kills,0);
      kills = value;
      deaths = use.reduce((a,r)=>a+r.deaths,0);
      mapsUsed = use.map(r=>r.mapNum);
      label = 'Maps 1-3 Kills';
    } else if(market==='SERIES_KD'){
      value = deaths>0 ? kills/deaths : kills;
      label = 'Series K/D';
    } else {
      const targetMap = market==='MAP1_KILLS' ? 1 : market==='MAP2_KILLS' ? 2 : 3;
      const use = rows.find(r=>r.mapNum===targetMap);
      if(!use) return;
      value = use.kills;
      kills = use.kills;
      deaths = use.deaths;
      mapsUsed = [targetMap];
      label = `Map ${targetMap} Kills`;
    }
    out.push({
      matchId,
      eventId: head.eventId,
      eventName: head.eventName,
      date: head.date,
      ts: head.ts,
      oppId: head.oppId,
      teamId: head.teamId,
      value,
      label,
      kills,
      deaths,
      kd: deaths>0 ? kills/deaths : kills,
      mapsUsed,
      rows,
    });
  });
  return out.sort((a,b)=>{
    const ad = new Date((a.date||'1970-01-01')+'T12:00:00').getTime();
    const bd = new Date((b.date||'1970-01-01')+'T12:00:00').getTime();
    if(bd !== ad) return bd - ad;
    return (b.ts||0)-(a.ts||0);
  });
}

function summarizeNumeric(values){
  const arr = values.filter(v=>v!=null && !Number.isNaN(v));
  if(!arr.length) return {count:0, avg:0, median:0, best:null, worst:null};
  const sorted=[...arr].sort((a,b)=>a-b);
  const mid=Math.floor(sorted.length/2);
  return {
    count: arr.length,
    avg: arr.reduce((a,b)=>a+b,0)/arr.length,
    median: sorted.length%2 ? sorted[mid] : (sorted[mid-1]+sorted[mid])/2,
    best: sorted[sorted.length-1],
    worst: sorted[0],
  };
}


function sanitizeBetLineInput(v=''){
  let s = String(v ?? '').replace(/,/g,'.').replace(/[^0-9.]/g,'');
  const firstDot = s.indexOf('.');
  if(firstDot !== -1){
    s = s.slice(0, firstDot + 1) + s.slice(firstDot + 1).replace(/\./g,'');
  }
  return s;
}

function handleBetLineInput(v=''){
  const cleaned = sanitizeBetLineInput(v);
  S.betFilter.line = cleaned;
  const input = document.getElementById('bet-line-input');
  if(input && input.value !== cleaned) input.value = cleaned;
}

function commitBetLineInput(v=''){
  const cleaned = sanitizeBetLineInput(v);
  S.betFilter.line = cleaned;
  renderBettingLab();
}

function fmtBetValue(v, stat='kills'){
  if(v==null || Number.isNaN(v)) return '—';
  if(stat==='kd' || stat==='SERIES_KD') return Number(v).toFixed(2);
  if(stat==='damage') return Math.round(v).toString();
  return Number(v).toFixed(1).replace('.0','');
}

function renderMatchup(){
  const el=document.getElementById('tab-matchup');
  const {t1,t2,format}=S.muState;
  const teamOpts=(sel)=>TEAMS.map(t=>`<option value="${t.id}" ${t.id===sel?'selected':''}>${t.name}</option>`).join('');

  const record=h2h(t1,t2);
  const t1data=U.team(t1), t2data=U.team(t2);

  // Team stats summary
  const getStats=(tid)=>{
    const rows=computePlayerStats({team:tid});
    const totK=rows.reduce((a,r)=>a+r.kills,0);
    const totD=rows.reduce((a,r)=>a+r.deaths,0);
    const maps=rows.reduce((a,r)=>a+r.maps,0);
    const allMaps=S.maps.filter(m=>{
      const match=S.matches.find(mm=>mm.id===m.matchId);
      return match&&(match.team1Id===tid||match.team2Id===tid);
    });
    const wins=allMaps.filter(m=>m.winner===tid).length;
    return {totK,totD,maps,wins,losses:allMaps.length-wins,
      hpW:allMaps.filter(m=>m.mode==='HP'&&m.winner===tid).length,
      hpL:allMaps.filter(m=>m.mode==='HP'&&m.winner!==tid&&m.winner!==null).length,
      sndW:allMaps.filter(m=>m.mode==='SND'&&m.winner===tid).length,
      sndL:allMaps.filter(m=>m.mode==='SND'&&m.winner!==tid&&m.winner!==null).length,
      olW:allMaps.filter(m=>m.mode==='OL'&&m.winner===tid).length,
      olL:allMaps.filter(m=>m.mode==='OL'&&m.winner!==tid&&m.winner!==null).length,
    };
  };

  const s1=getStats(t1), s2=getStats(t2);

  const statBar=(v1,v2,label)=>{
    const tot=(v1||0)+(v2||0)||1;
    const pct1=((v1||0)/tot*100).toFixed(0);
    const pct2=((v2||0)/tot*100).toFixed(0);
    return `<div class="stat-cmp">
      <div class="scl" style="color:${t1data.color}">${v1??'—'}</div>
      <div class="sc-lbl">${label}</div>
      <div class="scr" style="color:${t2data.color}">${v2??'—'}</div>
    </div>
    <div style="display:flex;gap:2px;height:4px;border-radius:2px;overflow:hidden;margin-bottom:10px">
      <div style="width:${pct1}%;background:${t1data.color};border-radius:2px 0 0 2px"></div>
      <div style="width:${pct2}%;background:${t2data.color};border-radius:0 2px 2px 0"></div>
    </div>`;
  };

  // Map pick frequency
  const pickFreq=(tid,mode)=>{
    const allMaps=S.maps.filter(m=>{
      const match=S.matches.find(mm=>mm.id===m.matchId);
      return match&&(match.team1Id===tid||match.team2Id===tid)&&m.mode===mode;
    });
    const counts={};
    allMaps.forEach(m=>{ counts[m.mapName]=(counts[m.mapName]||0)+1; });
    return Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  };

  const modeOrder=format==='BO7'?BO7:BO5;
  const suggestedMaps=modeOrder.map((mode,i)=>{
    const f1=pickFreq(t1,mode), f2=pickFreq(t2,mode);
    const all={}; 
    f1.forEach(([m,c])=>{ all[m]=(all[m]||0)+c; });
    f2.forEach(([m,c])=>{ all[m]=(all[m]||0)+c; });
    const top=Object.entries(all).sort((a,b)=>b[1]-a[1])[0];
    return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)">
      <span class="text-muted" style="min-width:50px;font-size:11px">Map ${i+1}</span>
      ${U.modePill(mode)}
      <span class="bold" style="flex:1">${top?top[0]:'No data'}</span>
      ${top?`<span class="text-muted text-sm">${top[1]} plays</span>`:''}
    </div>`;
  }).join('');

  el.innerHTML=`
    <div class="sh"><div><div class="sh-title">Matchup Builder</div><div class="sh-sub">Head-to-head analysis & series projection</div></div></div>
    <div class="card" style="margin-bottom:14px">
      <div class="mu-grid">
        <div class="team-sel-card">
          <div class="fg" style="margin-bottom:8px"><label>Team 1</label>
            <select onchange="S.muState.t1=this.value;renderMatchup()">${teamOpts(t1)}</select>
          </div>
          <div style="text-align:center;padding:8px">${U.logoHTML(t1,'t-logo-lg')}</div>
          <div style="font-weight:800;text-align:center;color:${t1data.color}">${t1data.name}</div>
        </div>
        <div class="vs-div">VS</div>
        <div class="team-sel-card">
          <div class="fg" style="margin-bottom:8px"><label>Team 2</label>
            <select onchange="S.muState.t2=this.value;renderMatchup()">${teamOpts(t2)}</select>
          </div>
          <div style="text-align:center;padding:8px">${U.logoHTML(t2,'t-logo-lg')}</div>
          <div style="font-weight:800;text-align:center;color:${t2data.color}">${t2data.name}</div>
        </div>
      </div>
      <div style="text-align:center;margin-top:12px">
        <select style="width:auto;display:inline-block" onchange="S.muState.format=this.value;renderMatchup()">
          <option value="BO5" ${format==='BO5'?'selected':''}>Best of 5</option>
          <option value="BO7" ${format==='BO7'?'selected':''}>Best of 7</option>
        </select>
      </div>
    </div>

    <div class="g2">
      <div class="card">
        <div class="card-title">HEAD-TO-HEAD RECORD</div>
        ${record.matches.length===0?
          '<div class="empty" style="padding:30px"><div class="empty-ico" style="font-size:24px">📋</div><div class="empty-lbl">No H2H matches recorded</div></div>' :
          `<div style="text-align:center;margin-bottom:16px">
            <div style="display:flex;align-items:center;justify-content:center;gap:20px">
              <div><div style="font-size:36px;font-weight:800;color:${t1data.color}">${record.w}</div><div class="text-sm text-muted">SERIES W</div></div>
              <div style="font-size:20px;font-weight:800;color:var(--text2)">—</div>
              <div><div style="font-size:36px;font-weight:800;color:${t2data.color}">${record.l}</div><div class="text-sm text-muted">SERIES W</div></div>
            </div>
            <div class="text-muted text-sm" style="margin-top:8px">Maps: <span style="color:${t1data.color}">${record.mapW}</span> – <span style="color:${t2data.color}">${record.mapL}</span></div>
          </div>
          <div class="divider"></div>
          ${record.matches.slice(-5).reverse().map(m=>{
            const ev=U.event(m.eventId);
            return `<div class="mc-row">
              <span class="text-sm text-muted" style="flex:1">${ev.name} · ${U.fmtDate(m.date)}</span>
              <span class="num ${m.myMaps>m.opMaps?'green':'red'}">${m.myMaps}–${m.opMaps}</span>
            </div>`;
          }).join('')}
        `}
      </div>
      <div class="card">
        <div class="card-title">SEASON STATS COMPARISON</div>
        ${statBar(s1.wins,s2.wins,'Map Wins')}
        ${statBar(s1.hpW,s2.hpW,'HP Wins')}
        ${statBar(s1.sndW,s2.sndW,'SND Wins')}
        ${statBar(s1.olW,s2.olW,'OL Wins')}
        ${statBar(s1.totK,s2.totK,'Total Kills')}
      </div>
    </div>
    <div class="card">
      <div class="card-title">SUGGESTED ${format} MAP PICKS <span class="text-sm text-muted">Based on historical play frequency</span></div>
      ${suggestedMaps||'<p class="text-muted text-sm">No map data yet — add matches to see suggestions</p>'}
    </div>`;
  U.updateLogos();
}

async function toggleActive(pid){
  const p=S.players.find(pl=>pl.id===pid);
  if(!p) return;
  p.active=!p.active;
  await DB.put('players', p);
  await S.loadAll();
  renderRosters();
  toast(`${p.name} set to ${p.active?'Active':'Inactive'}`, 'info');
}

async function deletePlayer(pid){
  const p=S.players.find(pl=>pl.id===pid);
  if(!confirm(`Delete ${p?.name||'player'}? This also removes their stats.`)) return;
  await DB.del('players', pid);
  await S.loadAll();
  renderRosters();
  toast('Player deleted','info');
}

async function resetTeamColor(tid){
  const def = LOGO_COLORS[tid] || '#888888';
  const t = TEAMS.find(t=>t.id===tid);
  if(t) t.color = def;
  await DB.setSetting('teamcolor_'+tid, def);
  Modal.close();
  renderRosters();
  U.updateLogos();
  toast(`${U.team(tid).name} color reset`,'info');
}

async function saveTeamColor(tid){
  const hex=document.getElementById('tc-hex').value;
  if(!/^#[0-9a-fA-F]{6}$/.test(hex)){ toast('Enter a valid hex color e.g. #ff0000','err'); return; }
  const t = TEAMS.find(t=>t.id===tid);
  if(t) t.color = hex;
  await DB.setSetting('teamcolor_'+tid, hex);
  Modal.close();
  renderRosters();
  U.updateLogos();
  toast(`${U.team(tid).name} color updated`,'ok');
}

async function saveNewPlayer(teamId){
  const name=document.getElementById('np-name').value.trim();
  const active=document.getElementById('np-active').value==='true';
  if(!name){ toast('Enter a name','err'); return; }
  const id=`${teamId}_${name.toLowerCase().replace(/\s/g,'_')}_${Date.now()}`;
  await DB.add('players',{id, name, teamId, active, ts:Date.now()});
  Modal.close();
  await S.loadAll();
  renderRosters();
  toast(`${name} added`,'ok');
}

async function estimateDBSize(){
  try {
    const all=await Promise.all([
      DB.getAll('matches'),DB.getAll('maps'),DB.getAll('pstats'),
      DB.getAll('players'),DB.getAll('points'),DB.getAll('images'),
    ]);
    const bytes=JSON.stringify(all).length;
    if(bytes<1024) return bytes+'B';
    if(bytes<1048576) return (bytes/1024).toFixed(1)+'KB';
    return (bytes/1048576).toFixed(2)+'MB';
  } catch{ return 'Unknown'; }
}

async function uploadLogo(input){
  const file=input.files[0]; if(!file) return;
  const data=await scaleImage(file,200);
  await DB.put('images',{id:'app_logo',data,type:'logo'});
  const img=document.getElementById('hdr-logo');
  img.src=data; img.style.display='block';
  toast('Logo updated','ok');

async function uploadTeamLogos(input){
  let count=0;
  for(const file of input.files){
    const name=file.name.replace(/\.[^.]+$/,'');
    const team=TEAMS.find(t=>t.name.toLowerCase()===name.toLowerCase());
    if(!team){ toast(`No team match for: ${name}`,'err',4000); continue; }
    const data=await scaleImage(file,128);
    await DB.put('images',{id:U.teamLogoId(team.id),data,type:'teamlogo'});
    count++;
  }
  await U.updateLogos();
  toast(`${count} team logo(s) uploaded`,'ok');
}

function scaleImage(file,maxSize=256){
  return new Promise((res)=>{
    const reader=new FileReader();
    reader.onload=(e)=>{
      const img=new Image();
      img.onload=()=>{
        const sc=Math.min(1,maxSize/Math.max(img.width,img.height));
        const c=document.createElement('canvas');
        c.width=Math.round(img.width*sc); c.height=Math.round(img.height*sc);
        c.getContext('2d').drawImage(img,0,0,c.width,c.height);
        res(c.toDataURL('image/webp',0.85));
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function importData(input){
  const file=input.files[0]; if(!file) return;
  if(!confirm('This will MERGE imported data with existing data. Continue?')) return;
  try {
    const text=await file.text();
    const data=JSON.parse(text);
    let imp=0;
    const importStore=async(store,arr)=>{ for(const item of (arr||[])) { try{await DB.put(store,item);imp++;}catch(e){} } };
    await importStore('matches', data.matches);
    await importStore('maps', data.maps);
    await importStore('pstats', data.pstats);
    await importStore('players', data.players);
    await importStore('points', data.points);
    if(data.bprCoefficients) Object.assign(BPR_C, data.bprCoefficients);
    if(data.teamStats){ Object.assign(S.teamStats, data.teamStats); await S.saveTeamStats(); }
    await S.loadAll();
    toast(`Imported ${imp} records successfully`,'ok');
    IS.render(IS.tabs.current);
  } catch(e){
    toast('Import failed: '+e.message,'err',5000);
  }
}

async function clearAllData(){
  if(!confirm('⚠️ This will permanently delete ALL match data, player stats, standings, and points. This cannot be undone.\n\nType "DELETE" to confirm (just click OK to proceed, this is a browser prompt)')) return;
  const stores=['matches','maps','pstats','points','images'];
  for(const s of stores){
    await new Promise((res,rej)=>{
      const tx=DB.db.transaction(s,'readwrite');
      const rq=tx.objectStore(s).clear();
      rq.onsuccess=res; rq.onerror=rej;
    });
  }
  // Reset players to initial rosters
  await initPlayers(true);
  await S.loadAll();
  toast('All data cleared. Rosters reset to defaults.','info',4000);
  IS.render(IS.tabs.current);
}

async function initPlayers(force=false){
  const existing = await DB.getAll('players');
  if(existing.length>0 && !force) return;
  for(const [teamId, players] of Object.entries(ROSTERS_INIT)){
    for(const p of players){
      const id=`${teamId}_${p.n.toLowerCase().replace(/[^a-z0-9]/g,'_')}`;
      await DB.put('players',{id, name:p.n, teamId, active:p.active, ts:Date.now()});
    }
  }
}

async function replaceStore(store, rows){
  return new Promise((resolve,reject)=>{
    const tx = DB.db.transaction(store,'readwrite');
    const os = tx.objectStore(store);
    os.clear();
    (rows||[]).forEach(row => os.put(row));
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error || new Error('Failed writing '+store));
    tx.onabort = () => reject(tx.error || new Error('Aborted writing '+store));
  });
}

async function syncPublicBackup(){
  let backup;
  try{
    const res = await fetch('./data/public-backup.json', { cache:'no-store' });
    if(!res.ok) return false;
    backup = await res.json();
  }catch(err){
    console.warn('Public backup fetch skipped', err);
    return false;
  }

  const exported = backup?.meta?.exported || '';
  const prevExported = await DB.getSetting('publicBackupExported', '');
  const existing = await DB.getAll('matches');
  if(prevExported === exported && existing.length === (backup.matches||[]).length){
    return false;
  }

  await replaceStore('players', backup.players || []);
  await replaceStore('matches', backup.matches || []);
  await replaceStore('maps', backup.maps || []);
  await replaceStore('pstats', backup.pstats || []);
  await replaceStore('points', backup.points || []);
  await DB.setSetting('teamStats', JSON.stringify(backup.teamStats || {}));
  for(const [eventId, bracketState] of Object.entries(backup.bracketData || {})){
    await DB.setSetting('bracket_' + eventId, JSON.stringify(bracketState || {}));
  }
  await DB.setSetting('bprCoefficients', JSON.stringify(backup.bprCoefficients || {}));
  await DB.setSetting('publicBackupExported', exported);
  await DB.setSetting('publicBackupMeta', JSON.stringify(backup.meta || {}));
  return true;
}

async function boot(){
  try {
    await DB.open();
    const synced = await syncPublicBackup();
    await initPlayers();
    await S.loadAll();

    // Load any saved team color overrides
    for(const t of TEAMS){
      const saved = await DB.getSetting('teamcolor_'+t.id, null);
      if(saved) t.color = saved;
    }

    // Load saved bracket data
    await loadBracketData();

    // Load app logo — prefer the repo branding asset, then uploaded override, then hardcoded fallback
    const logo=await DB.get('images','app_logo');
    const hdrImg=document.getElementById('hdr-logo');
    const hdrTitle=document.getElementById('hdr-title');
    hdrImg.onerror = function(){ this.onerror=null; this.src = logo?.data || DEFAULT_LOGO_URI; };
    hdrImg.src = './assets/img/branding/logo.png';
    hdrImg.style.display='block';
    hdrTitle.innerHTML = '<div class="line1">IRON SIGHT</div><div class="line2">STATS</div>';
    hdrTitle.style.display='flex';

    // Nav click handlers
    document.querySelectorAll('.nb').forEach(btn=>{
      btn.addEventListener('click',()=>IS.tabs.goto(btn.dataset.tab));
    });

    renderDashboard();
    U.updateLogos();
    toast(synced ? 'Public data synced ✓' : 'Iron Sight Stats Database loaded ✓','ok', 2500);
  } catch(e){
    console.error('Boot error:',e);
    document.getElementById('tab-dashboard').innerHTML=
      `<div class="empty"><div class="empty-ico">⚠️</div><div class="empty-lbl">IndexedDB Error</div>
      <p>${e.message}</p><p class="text-muted text-sm" style="margin-top:8px">Try opening this file in Chrome or Firefox with a local HTTP server.</p></div>`;
  }
}
